sauce koyo avec une généreuse sauce tomate et un aspect gras, Umami renforcé par l’onctuosité de l'aubergine.\n\n## Ingrédients\n- Une belle aubergine (une demie Aubergine par personne)\n- 200g de Tomate\n- 5 Shiitake séchés\n- Ail\n- Oignon (selon envies pour la quantité)\n- 10ml de Shoyu\n- 10ml de saké\n- 10ml de Mirin\n- Une pincée de Gomasio\n- Une pincée de Ciboulette\n- Ciboule\n- Graines de sésame\n- Fécule\n- Riz blanc cuit\n\n## Recette\n\n### Façon Koyo\n#### La sauce tomate\n1. Monder et éplucher les tomates.\n2. Faire sauter l'oignon et l'ail jusqu'à coloration, déglacer avec du saké et un trait de mirin.\n3. Ajouter les tomates émondées et coupées en morceaux.\n4. Porter à ébullition puis ajouter les shiitake.\n5. Lorsque la sauce tomate compote, mixer et ajuster l'assaisonnement avec du shoyu, du mirin et du sucre.\n\n#### L'aubergine et dressage\n1. Trancher les aubergines en long et en biais (des tranches épaisses d'un à deux centimètres), les enrober légèrement de fécule puis les faire frire.\n2. Dans une poêle, faire sauter les oignons sans coloration, déposer les tranches d'aubergines, et faire revenir quelques secondes.\n3. Ajouter le mirin, saké et shoyu en proportion relativement égales\n\t1. Sachant qu'habituellement on prépare une pipette de shoyu et une pipette de mélange de saké / mirin. Il faut donc mettre deux fois plus de saké / mirin que de soja dans cette configuration.\n4. Faire réduire et épaissir la sauce puis déposer délicatement dans une petite colline de riz sur laquelle on aura déposé généreusement du gomashio.\n5. Ajouter un trait généreux de sauce tomate et garnir de graines de sésame, de ciboulette et d'un petit tas de ciboule.\n\n### Façon maison\nPour la version maison, on peut largement se passer de la sauce tomate. Tout est plus condensé en un sens.\n\n1. Trancher les aubergines en long et en biais puis les enrober légèrement de fécule.\n2. Dans une poêle faire chauffer une bonne quantité d'huile et cuire les aubergines jusqu'à coloration des deux côtés (il faut donc retourner les tranches).\n3. Débarrasser les aubergines et faire revenir les oignons jusqu'à ce qu'ils soit translucides.\n4. Ajouter à nouveau les aubergines, le shoyu, le saké et le mirin.\n5. Faire réduire jusqu'à ce que la sauce soit suffisamment épaisse puis déposer joliment sur une colline de riz. Garnir de ciboulette, ciboule, sésame et autre. \n\t1. Ajouter une pointe de sauce tomate pour apporter une acidité intéressante et complémentaire mais pas nécessaire.\n\n## Références\n- Recette élaborée au Koyo\n- Appui général : [@chenSoyGlazedEggplantDonburi2020]"}, {"id": "Negi-kosho", "title": "Negi kosho", "tags": ["recette/bizarre"], "cats": ["bizarre"], "origine": "", "body": "Cette recette suit le principe d'un Kiroo Kosho dans une variante d'un nouveau genre incluant des produits locaux pour développer de nouvelles saveurs. Le Gochugaru permet de rougir tout en complétant le piment.\n\n## Ingrédients\n\n| Ingrédient | Quantité nette | % de la recette |\n| ---------- | -------------- | --------------- |\n| Citron bio | 5,5            | 39,40%          |\n| Poireaux   | 3,338          | 23,91%          |\n| Eau        | 2,2            | 15,76%          |\n| Poires     | 1,2            | 8,60%           |\n| Gochugaru  | 1              | 7,16%           |\n| Piment     | 0,395          | 2,83%           |\n| Koji       | 0,2            | 1,43%           |\n| Sel        | 0,125          | 0,90%           |\n\n## Recette\n\n- Mixer l'ensembler grossièrement après avoir découpé les parties blanches en excès dans les citrons et les piments. Mettre en fermentation avec les poires réduites en purée avec le koji. Mixer le sel.\n- Quand la fermentation est terminée, ajouter le gochugaru au mixer plongeant.\n## Point de contrôle hygiène\n\n- Faible écart-type des température\n\t- Contrôle de l'atmosphère via dispositif Arduino\n- pH inférieur à 4,2\n- Apparition visible de poches de CO2 et gonflement de la préparation\n- Odeur fermentée caractéristiques du kimchi\n- Pas de développement de moisissures en surface ou ailleurs\n\n## Littérature & Références\n\n- @nguonCuisineFermentations402021"}, {"id": "Negi-Oil-Koyo", "title": "Negi Oil Koyo", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "Une huile à base de blancs de poireaux qui permet d'arômatiser de nombreux Ramen au Koyo.\n\n## Ingrédients\n- Blancs de Poireau\n- Huile de cuisson neutre\n\n## Recette\n\n1. Découper finement le poireau et l'ajouter à l'huile que l'on portera ensuite à ébullition.\n2. Réduire à frémissement jusqu'à cuisson et légère coloration du poireau.\n3. Mixer le tout et disposer dans un contenant hermétique.\n\n## Voir aussi\n\n- Koyo"}, {"id": "Oeuf-Ajitama-Koyo-Style", "title": "Oeuf Ajitama Koyo Style", "tags": ["recette/condiment", "recette/koyo"], "cats": ["condiment", "koyo"], "origine": "Japon", "body": "Les œufs ajitama (ajitsuke tamago) sont au fondement des Ramen le plus souvent. Il s'agit d'œuf molet marinés qui ont une texture crémeuse et un assaisonnement qui renforce leur goût. Au Koyo on utilise une marinade classique qui permet un résultat régulier.\n\n## Ingrédients\n\n- 20 (et jusqu'à 40) Oeuf\n- 800g d'eau\n- 200g de Shoyu\n- 200g de Mirin\n- 40g de Sucre blanc\n- 2g de Dashi en poudre \n\n### Variation oeufs clairs\n\n- 800g d'eau\n- 100g de Shoyu\n- 100g de usukuchi\n- 200g de Mirin\n- 40g de Sucre blanc\n- 2g de Dashi en poudre \n\n### Variation végétarienne\n\n- 800g d'eau\n- 200g de Shoyu\n- 200g de Mirin\n- 40g de Sucre blanc\n- 3 shiitaké cassés en plusieurs morceaux\n\n## Recette\n1. Piquer les œufs à la base avec une aiguille fine puis mettre ces derniers à cuire dans de l'eau bouillante pendant 7 minutes (ça dépend des calibres mais on est plus proche des 6min30) précisément. Pendant la première minute,m remuer les œufs pour obtenir une cuisson homogène.\n2. Retirer les œufs du feu et les refroidir rapidement.\n3. Assembler la sauce avec les ingrédients restant de la recette et plonger les œufs écaillé dans la sauce en prenant le soin de déposer une feuille de sopalin sur le dessus afin de maintenir les œufs sous la sauce.\n4. Mariner pendant 24h jusqu'à 48h (c'est mieux)\n\n## Voir aussi\n\n- Oeuf Onsen"}, {"id": "Oeuf-Onsen", "title": "Oeuf Onsen", "tags": ["recette/koyo", "recette/sousvide"], "cats": ["koyo", "sousvide"], "origine": "Fusion", "body": "Fiche simpliste de température et durée de cuisson pour préparer un Oeuf onsen (tel qu'utilisé au Koyo), soit un oeuf dont on imite la cuisson dans les sources chaudes (onsen) japonais. Il ressemble en tout point à l'oeuf parfait (avec un léger twist ici).\n## Ingrédients\n\n- Oeuf frais\n## Recette\n\n- Cuire les oeufs avec un thermoplongeur pendant **45 min à 64.5°C**\n- Réchauffer à 55°C au service\n## Références\n\n@sous-videCuireOeufParfait\n@vegetalgraphikOEufOnsen64\n## Voir aussi\n- Oeuf de Printemps de Kamozawa\n- Koyo"}, {"id": "Oeuf-Poché", "title": "Oeuf Poché", "tags": [], "cats": [], "origine": "France", "body": "Les œufs pochés sont la quintessence du brunch et de la gourmandise. Plutôt difficile à faire, il existe des tricks intéressants pour les préparer facilement.\n## Ingrédients\n\n- Oeufs\n- Vinaigre\n\n## Recette\n\n### Oeufs pochés pré-marinés\n\n1. Faire une marinade avec un ratio 2 d'eau pour 1 de vinaigre. Déposer les oeufs frais dedans et attendre qu'un fine pellicule se forme. Ensuite déposer les oeufs dans une eau très chaude mais pas bouillante et sortir quand ils sont prêts.\n\n### Oeufs déjà cuits et fini à l'eau\n\n1. Préparer des oeufs parfaits (ou façon Oeuf Onsen) et les pocher à l'envoi, cela permet d'obtenir un résultat stable et esthétique facile à faire en masse.\n\n## Références\n\n- @FoodNetworkInstagram2023\n\n## Voir aussi\n\n- Oeuf Parfait"}, {"id": "Oignons-caramélisés-au-miso", "title": "Oignons caramélisés au miso", "tags": ["recette/plat", "recette/vegan"], "cats": ["plat", "vegan"], "origine": "Fusion", "body": "# Oignons caramélisés au miso\nUn plat au goût fort, accompagnant volontier pâtes et riz, se positionnant en alternative végétarienne aux anchois notamment.\n\n## Ingrédients\n- Misozuke d'oignons\n- Huile d'olive\n\n## Recette\n1. Retirer les oignons du lit de Misozuke sans enlever les excédents de miso\n2. Disposer dans un plat allant au four en évitant de les empiler.\n3. Cuire à feu fort (200°C environs) pendant 15 minutes ou jusqu'à caramélisation d'un côté.\n4. Tourner, baisser le feu, et continuer la cuisson encore 30 minutes\n5. Sortir, arroser d'un filet d'huile d'olive et servir en antipasti ou accompagnement.\n\n## Voir aussi\nMisozuke"}, {"id": "Omelette-aux-pieds-de-porc-saouls", "title": "Omelette aux pieds de porc saouls", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Fusion", "body": "# Pieds de porc en galettes\n\n## Ingrédients\n\n- Deux Pieds de porcs saouls desossés, hachés fin au robot (pour en faire une sorte de crème)\n- 2 Oeuf\n\nLa Sauce Ketchup ou Sauce Bulldog fonctionnement comme un bon accompagnement\n\n## Phases\n1. Mélanger activement les oeufs et les pieds de porcs hachés fins pour atteindre un ensemble homogène, cuire à la poêle chaude graissée\n2. Rouler l'omelette, découper en morceaux et ajouter une sauce acidulée (ketchup ou bulldog)\n\n## Voir aussi\n- Omelette aux pieds de porc saouls\n- 14821 Pieds de porc en galettes"}, {"id": "Orenji-Sauce", "title": "Orenji Sauce", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Asie", "body": "Une sauce pour Kara Age qui vise à développer une certaine générosité et décadence associés à la fraîcheur de l'orange.\n## Ingrédients\n\n- 60g Beurre\n- 14g Miel\n- 25g sucre\n- 100g jus d'orange\n- zeste une orange\n- 2 gousses d'Ail\n- 10g Shoyu\n- 10g Yuzu Kosho\n- 10g jus de citron ou ponzu\n## Recette\n\n1. Faire cuire doucement l'ail haché dans le beurre jusqu'à ce qu'il soit doré\n2. Le débarrasser (filtrer à la passoire) et ajouter le reste des ingrédients\n3. Porter à ébullition et caramélisation\n4. Réserver avant utilisation\n\n## Voir aussi\n- Koyo\n- var. Sweet Lazy Kosho Sauce"}, {"id": "Oyakodon-Koyo-Style", "title": "Oyakodon Koyo Style", "tags": ["recette/koyo", "recette/plat"], "cats": ["koyo", "plat"], "origine": "Japon", "body": "Un plat réconfortant servit au Koyo en Donburi. Une variation a été conceptualisée pour augmenter le raffinement du plat et le transformer en version française / sudiste : remplacer la viande par du canard. Dans la continuité, une caille ou du pigeon pourrait apporter une sensation plus proche du gibier.\n\n## Ingrédients\n- Pour la sauce (2 portions)\n\t- 120ml de dashi (120ml d'eau + 2g de Dashi en poudre)\n\t- 30ml de Mirin\n\t- 30ml de Shoyu\n\t- 10g de Sucre blanc\n- Des Hauts de cuisse de poulet (1 par portion cuisinée)\n- 10ml de saké\n- Sichimi togarashi\n- Ciboule coupée finement\n- Oignon (Un quart ou demi par portion cuisinée)\n- Oeuf\n\n## Recette\n1. Faire sauter les oignons avec les hauts de cuisse coupés en gros morceaux dans une petite casserole avec de l'huile neutre\n2. Quand le poulet est bien coloré et les oignons tendres, ajouter la sauce puis ajouter les oeufs battus légèrement (histoire de casser les blancs et les jaunes, voir les instructions de Namiko[^1])\n3. Bien gérer la cuisson pour éviter de trop cuire les jaunes puis verser sur un bol de riz\n4. Servir avec de la ciboule et du sichimi.\n\n## Références\n- [@namiOyakodonChickenEgg2022]\n\n## Voir aussi\n- Koyo\n\n\n[^1]: !Pasted image 20230522182630.png"}, {"id": "Pain-d-épices-parfume", "title": "Pain d'épices parfume", "tags": ["recette/dessert/cake"], "cats": ["dessert"], "origine": "Europe", "body": "## Ingrédients\n\n- 160 g Lait entier\n- 215 g Miel toutes fleurs (ou miel de châtaignier)\n- 75 g Beurre doux\n- 15g zeste de mandarine\n- 5g de zeste déshydraté de yuzu\n- 235 g Farine T45\n- 75 g Sucre roux\n- 1,75 cc mélange 4 épices en poudre *homemade*\n\t- Cardamome noire\n\t- Anis étoilé\n\t- Muscade\n\t- Cannelle éventée (en grande quantité)\n\t- Gingembre en poudre\n\t- Poivre noir\n\t- Poivre de sichuan\n\t- Clou de girofle\n- 1 cc extrait naturel de vanille\n- 1,25 cc Bicarbonate de soude\n- 1 cc Levure chimique\n- Pincée de sel\n- **sirop**\n\t- Jus de mandarine\n\t- 50g de Miel\n\n## Recette\n\n- Préchauffer le four à 160° chaleur traditionnelle.\n- Dans une casserole, chauffer le lait, le miel, le beurre et le zeste d'agrume en mélangeant. Arrêter au moment de l'ébullition.\n- Dans un récipient, mélanger la farine, le sucre cassonade, le mélange 4 épices, l'extrait de vanille, le bicarbonate de soude, la levure chimique et le sel. Creuser un puits au milieu des ingrédients secs.\n- Verser le lait en 3 fois au centre des ingrédients secs en mélangeant entre chaque ajout pour obtenir une pâte lisse. Ne pas sur-mélanger, juste ce qu'il faut pour ne plus voir de farine.\n- Verser la pâte dans le moule puis enfourner 50min. Tester la bonne cuisson en plantant un pic en bois qui doit ressortir sec.\n- Lorsque le pain d'épice sort du four, l'arroser d'un sirop confectionné avec le jus de la mandarine zestée et du miel réduit jusqu'à obtenir une consistance sirupeuse. Ajouter encore un peu de zeste de mandarine pour la décoration.\n- Laisser tiédir puis démouler sur grille. Une fois refroidi, emballer le pain d'épice dans un film alimentaire puis dans une boite hermétique ou papier aluminium - important pour qu'il conserve son moelleux. Attendre si possible 24h pour le déguster, le temps qu'il développe tout son arôme.\n\n## Références\n\n@bakeryPainEpice2023\n\n## Voir aussi\n\n- Cake"}, {"id": "Pesto-de-shiso", "title": "Pesto de shiso", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Ultra fusion", "body": "Un pesto improvisé suite à une préparation de Goffre d'une huile verte de shiso. Accompagne bien des tempura de légume et pourrait finir en udon et donc finir en plat. \n\n## Ingrédients\n\n- Résidu solide d'une huile verte de Shiso\n- QS Shiro Miso\n- QS Huile verte de shiso\n- QS Huile d'olive\n- QS Poudre d'amande\n- QS Shoyu\n- QS Sel\n- QS Jus concentré de yuzu\n\n## Recette\n\n1. Mixer l'ensemble des ingrédients et consommer directement. C'est meilleur après quelques heures.\n\n## Références\n- Pesto Vegan\n\n## Voir aussi\n- Koyo"}, {"id": "Pesto-Vegan", "title": "Pesto Vegan", "tags": ["recette/sauce", "recette/vegan"], "cats": ["sauce", "vegan"], "origine": "Italie", "body": "## Ingrédients\n- 60g Basilic\n- 50g Noix de cajou\n- 40 d'huile d'olive \n- 15g Aka Miso\n- 5g Vinaigre\n- 2g de sel\n- 6g Ail\n- 10g de jus de citron (ou plus)\n- Pincée de poivre noir\n- *facultatif*\n\t- Une pincée de Piment\n\n## Recette\n1. Découper grossièrement les ingrédients (sauf le jus de citron) et les déposer dans le bol d'un blender (ou dans un mortier si on veut s'amuser)\n2. Mixer jusqu'à l'obtention d'une pâte pas complètement lisse et laisser reposer quelques heures avant d'utiliser idéalement"}, {"id": "Petits-pains-vapeur-au-levain-fourrés", "title": "Petits pains vapeur au levain fourrés", "tags": ["recette/dessert", "recette/fermentation", "recette/pain"], "cats": ["dessert", "fermentation", "pain"], "origine": "Fusion", "body": "# Petits pains vapeur au levain fourrés \nIl s'agit d'un dessert consistant mais également regressif en ce sens qu'il ramène un peu en enfance!\n\n## Ingrédients\n- 300g de Farine T60\n- 60g de Levain\n- 140g d'eau\n- 2 cuiliières d'Huile d'olive\n- 5g de sel\n- 25g de Sucre roux\n- 10g de Bicarbonate de soude\n- Farce :\n\t- Chocolatée :\n\t\t- Chocolat pâtissier en morceaux\n\t\t- Tahini au jugé\n\t- Haricots rouges\n\n## Recette\n1. Pétrir les ingrédients ensemble\n2. Laisser reposer jusqu'à ce que la pâte double\n3. Répartir la pâte en parts égales, les étaler de sorte à avoir de petits disques.\n4. Déposer des morceaux de chocolat au centre avec une petite cuillière de tahini.\n5. Cuire à la vapeur 15 minutes environs.\n\n## Références\n- La pâte est fortement inspirée de [@chenNikumanSteamedPork2020]\n\n## Voir aussi\n- 21821 Petit pain vapeur au levain\n\n## Journal de bord\n```dataview\nLIST FROM Petits pains vapeur au levain fourrés & #experimentation  \n```"}, {"id": "Pieds-de-porcs-saouls", "title": "Pieds de porcs saouls", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Chine", "body": "# Pieds de porcs saouls\nUne recette pleine de douceur qui accomode originalement les pieds de porc et permet de diversifier les utilisaiton du Jiuniang. On présume que le bon goût provient d'une longue marinade dans le vin de riz mais aussi de l'effet des Enzymes issue du jiuniang sur les protéines du porc.\n\n## Ingrédients\n- 1 kg de Pieds de porc\n- 250g de Jiuniang\n- 150g de Vin Shaoxing ou de Saké rustique à défault\n- 1 bonne cuilière de Sucre roux\n- 1 bonne pincée de sel\n- 20g Gingembre\n\n## Phases\n1. Blanchir à grand bouillon les pieds de porc pendant 5 minutes puis rincer.\n2. Cuire les pieds de porc dans de l'eau à fleur avec le poivre de sichuan et le gingembre pendant 2 heures.\n3. Refroidir complètement les pieds de porc dans le l'eau froide après les avoir égouttés.\n4. Les plonger dans la marinade composée du Jianqu, du vin de riz, du sucre et du selMariner au frais pendant 2 jours avant de consommer.\n\n## Références\n- @lumchanChineLivreCuisine2020\n\n## Voir aussi\n- 10821 Pieds de porc saouls^[Expérience réussie]"}, {"id": "Pizza-napolitaine-Indoor-Adapted", "title": "Pizza napolitaine Indoor Adapted", "tags": [], "cats": [], "origine": "Italie", "body": "Une recette très efficace, qui me permet de stabiliser une méthode simple pour produire une pâte à pizza satisfaisante. Il rejoint dès lors la Foccacia notamment au rang des recettes de pâte levée réussie.\n## Ingrédients\n\n- 613 g Farine T45 (00)\n- 368 g Eau Température ambiante\n- 0,5 g Levure Fraiche de Boulanger ou 0,3g de levure sèche\n- 18 g Sel\n## Recette\n\n#### Instructions sur la farine\n\n- La farine doit être **de blé tendre T45 (00)** de force moyenne, d'une valeur comprise entre **W 280 et W 320**. Le choix de cet ingrédient est essentiel pour avoir un bon produit final, les meilleurs moulins italiens préparent des farines spécifiques pour la pizza napolitaine, ce que vous devez savoir est qu'il y a des farines fortes et moins fortes.\n\t- Pour la pizza napolitaine est généralement utilisé une farine de force moyenne avec **11-12% de protéines.**\n\n#### Instructions sur le pétrissage\n\n- L'utilisation des mains ou **d'un pétrin** est autorisée pour pétrir ; la seconde permet une meilleure aération de la pâte, mais aussi une plus grande surchauffe de celle-ci, avec le risque conséquent de déchirer le réseau de Gluten, donc vous devez faire plus attention si vous voulez utiliser la machine.\n\n#### Procédure pour faire la pate à pizza napolitaine\n\n- Dans un bol ou dans le récipient d'un pétrin (pour ceux qui en ont un) verser toute l'eau et le sel, en remuant et en attendant qu'il fonde bien, afin de faciliter la maturation de la pâte.\n- Ajouter ensuite une petite quantité de farine (environ 10% ou utiliser une cuillère) et enfin la levure. Commencez à tourner avec une louche (avec le pétrin, utilisez la vitesse la plus basse) jusqu'à ce que la levure ait fondu.\n- Verser ensuite progressivement la farine et pétrir toujours pour qu'elle soit complètement absorbée par l'eau. Continuer jusqu'à ce que la farine soit terminée et complètement absorbée. Ce processus ne devrait pas durer plus de 10 minutes.\n- Si vous pétrissez à la main, vous devrez avoir une boule de pate qui vous colle un peu au doigts. Faites reposer la pate à couvert pendant 15 minutes.\n\t- Si vous pétrissez au pétrin, la pate doit devenir lisse et élastique. Sortez la du pétrin et faites une boule.\n- Si vous pétrissez à la main, après les 15 minutes de repos faites une série de rabats sur votre pate. Cette dernière va le lissez très rapidement. Faites une boule.\n\n\n#### Repos de la pâte à pizza\n\n- Placez votre boule de pate dans un récipient fermé hermétiquement préalablement oint avec un peu d'huile d'olive.\n- Laissez reposer pendant 18 à 20 heures à une température de 18 à 20 degrés.\n\n#### Pâtons et disque\n\n- Réalisez des pâtons entre 250 et 270 grammes\n- Laissez les reposer dans une caisse à pâton hermétique, à température ambiante pendant 3 à 4 heures.\n- Une fois que les patons ont doublé de volume, vous pouvez faire votre pizza napolitaine.\n\n## Références\n\n- @lorenzoRecetteOriginalePate2024\n\n## Voir aussi\n- Foccacia"}, {"id": "Polenta-gourmande", "title": "Polenta gourmande", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Italie", "body": "Une polenta onctueuse et réconfortante, façonnée à partir de semoule de maïs cuite dans un mélange d'eau et de crème. Rapide à préparer en seulement 10 minutes, elle se déguste seule ou en accompagnement de viandes, poissons ou légumes sautés. Des ratios à garder pour le carnet de recette de la Cantine Esperluette.\n## Ingrédients\n\n- 100 g de semoule de maïs (polenta fine express/instantanée)\n- 300 ml d'eau\n- 200 ml de crème liquide (ou lait pour une version plus légère)\n- 30 g de beurre (15 g pour la cuisson, 15 g pour la finition)\n- 1 pincée de sel\n- 1 pincée de poivre\n\n### Options pour enrichir et parfumer\n\n- mascarpone (en remplacement du beurre de finition)\n- parmesan râpé, au goût\n- noix de muscade râpée\n- herbes fraîches ciselées (basilic, romarin, thym)\n- bouillon de légumes ou de volaille (en remplacement de l'eau)\n\n## Recette\n\n- Faire fondre 15 g de beurre dans une casserole à feu doux\n- Verser la semoule de maïs dans la casserole, mélanger avec le beurre et laisser roussir une trentaine de secondes\n- Ajouter l'eau et la crème, puis cuire en mélangeant constamment pendant quelques minutes jusqu'à ce que la polenta se décolle des parois\n- Ajouter le sel, le poivre, et les 15 g de beurre restants (ou le mascarpone)\n- Mélanger et servir immédiatement\n- Ne pas trop cuire afin de conserver une texture légère\n\n## Références\n\n- [https://www.papillesetpupilles.fr/2020/02/polenta-cremeuse.html/](https://www.papillesetpupilles.fr/2020/02/polenta-cremeuse.html/)\n\n## Voir aussi\n\n- Polenta"}, {"id": "Porc-Char-Siu", "title": "Porc Char Siu", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Chine", "body": "# Porc Char Siu\n\n## Ingrédients\n\nPour 1 kg de Longe de porc (bien que d'autres parties soient appropriées, comme la poitrine)\n\n#### Marinade\n-   10 cl de Sauce Hoisin (140 g)\n-   10 cl de Sauce soja\n-   50g sauce huître\n-   7.5 cl de Vin Shaoxing\n-   7.5 cl de Miel (100 g)\n-   40 g de Sucre roux\n-   4 gousses d'Ail\n-   2 cm de Gingembre frais\n-   1 Oignon\n-   2 cuillières à café de Poudre de cinq épices\n-   1/2 CC de poudre de piment Piment\n-   20g de Koji de riz rouge réduit en poudre au mortier\n-   1 CC d'Huile de sésame\n\n#### Laquage\n- 1 à 2 (voire plus) cuillère à soupe de Miel ou de Sirop d'amazaké\n\n## Recette\n1. Hacher les gousses d'ail, l'oignon et le gingembre. Mélanger l'ensemble des ingrédients de la marinade au fouet. La marinade doit être clairement rouge. Ajouter du Koji de riz rouge si besoin.\n    \n2. Découper le porc en pavés ou lèches de 200 g. Faire mariner pendant une nuit (4 h minimum) voir plus si souhaité. Décanter et filtrer la marinade après utilisation.\n\n3. Préparer le laquage en mélangeant le miel (ou le sirop de glucose) et de la marinade rouge filtrée puis en la faisant réduire sur le feu jusqu'à atteindre une consistance sirupeuse.\n    \n4. Faire fumer les morceaux de porcs sur des crochets à température douce pendant 1 heure (ou jusqu'à ce que la température interne atteigne les 50°C à coeur) avant de laquer les morceaux. Si possible, placer un bac d'eau à l'intérieur du BBQ pour humidifier l'atmosphère et réduire le dessèchement. Réitérer cette opération de laquage plusieurs fois jusqu'à ce que la température à coeur atteigne la cible (60-65°C). Arrêter la cuisson avant d'atteindre la température cible et laisser reposer la viande avant de la tailler en fines tranches.\n\n5. Servir avec du riz \n\n## Références\n[@blocnoteculinaireCharSiuPorc]\n\n## Journal de bord\n```dataview\nLIST FROM Porc Char Siu & #experimentation  \n```"}, {"id": "Poudre-de-cinq-épices", "title": "Poudre de cinq épices", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "Chine", "body": "# Poudre de cinq épices\nLa poudre de cinq épices (ça sonne mieux en anglais) est un mélange chinois qui agrémente de nombreux plats. A la façon d'un curry, il est présent dans de nombreuses recettes notamment de la cuisine du Sichuan (avec le Porc Char Siu par exemple).\n\n## Ingrédients\nIl est possible de faire des variations, mais les cinq ingrédients de base (que l'on retrouve le plus souvent) sont les suivants :\n\n- 1 part de bâton de Cannelle\n- 2 part des Graines de fenouil\n- 1 part de Poivre de sichuan\n- 1/3 de part de Clous de girofle\n- 4 Anis étoilé (soit 1 part en l'état)\n\n## Recette\n1. Réunir les ingrédients non-moulu et les toaster à la poêle en remuant constamment pendant quelques temps (moins de 5 minutes), on ne recherche pas de coloration particulièrement.\n2. Mixer au blender ou au moulin à café ou au mortier.\n3. Conserver dans un bocal hermétique.\n\n## Références\n[@thewoksoflifeHowMakeFive2020]\n[@thespruceeatsMakeYourOwn]\n\n## Recettes\n```dataview\nLIST FROM Poudre de cinq épices & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Poudre de cinq épices  & #experimentation & !#template\n```"}, {"id": "Poudre-de-piment-doux-maison", "title": "Poudre de piment doux maison", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "Maison", "body": "# Poudre de piment doux maison\nLa poudre de piment doux maison a été produite en séchant les peaux de tomate, de piment et de poivrons qui ont été séparé de la chair (cette dernière servant à d'autres recettes). Réduites en poudres grossières, ces peaux apportent du goût aux bouillons et à des mélanges d'épices.\n\nIl n'y a pas de méthode à proprement parler, il faut avant tout collecter et sécher les peaux, puis les réduire en poudre grossière au mortier ou au moulin électrique, avant de les stocker dans un bocal hermétique. Tous les légumes d'été avec un peu de sucrosité peuvent être utilisés pour produire cette poudre (Tomate, Poivron rouge, Piment).\n\n## Recettes\n```dataview\nLIST FROM Poudre de piment doux maison & !#experimentation & !#template & !#ouvrage & #recette \n```\n## Experimentation\n```dataview\nLIST FROM Poudre de piment doux maison  & #experimentation & !#template\n```"}, {"id": "procédure-de-production-de-kombucha", "title": "procédure-de-production-de-kombucha", "tags": ["[]"], "cats": ["[]"], "origine": "", "body": "# Préparation de la recette\n\nComposition de la recette sur des bases de thé, de sucre. Soit un départ sur une idée personnelle, soit élaboration sur la base d'un souhait émis par un partenaire.\n\n# Lancement de la recette\n\nSelon le thé différent protocole d'infusion peuvent avoir lieu, avec différentes étapes, on pourra se référer à cette occasion à des notes complémentaires.\n\n1. Infusion du thé et diffusion du sucre avec la moitié de l'eau prévue pour la recette\n\t1. Un fork de cette méthode prévoit, si ajout de sirop cru, une étape de désalcoolisation est nécessaire en général selon ces infos ci, une quantité de sucre blanc est toujours intégrée pour équilibrer le moût :\n\t\t1. 80mbar - 55°C - 210rpm - 30 minutes pour 200g de préparation\n2. Prolongation de l'infusion et refroidissement une fois les étapes passées\n3. Ajout de la culture mère et du liquide froid complémentaire\n4. Enregistrement de la densité de départ et du °B ainsi que du pH.\n5. Lancement de la fermentation\n\n> [!WARNING] Point critique\n> La valeur nominale minimum de pH doit être de 4,5 au dessus, l'acidité n'est pas tolérée, ajouter plus de culture mère ou acidifier le mout avec du vinaigre\n\n\n> [!INFORMATION] Densité\n> On aime que la densité soit de 1,016 pour un départ avec suffisamment de sucres mais pas trop\n\n## Proportions habituelles\n- 3,5% sucre totaux\n- 0,08% thé, plus si rendu tannique nécessaire\n- 12% culture mère\n- 85% eau\n\n# Lancement de fermentation\n\n## Pilotage\nTous les deux jours : prélever un échantillons de 5ml, le filtrer à l'étamine, le dégazer en le mettant sous vide\nOn effectue les mesures suivantes : densité, °brix, pH, température, estimation alcool. Pendant le prélevage, aération du moût strictement nécessaire.\n\n\n> [!WARNING] Point critique\n> - Développement de moisissure sur le dessus, dans ce cas batch détruit\n> - Stagnation du pH mais baisse de la densité = production d'alcool majoritaire, surveillance nécessaire et analyse dans laboratoire nécessaire si aucun signe de baisse du pH\n> - Odeurs désagréable  surveillance nécessaire approfondie\n\n\n# Carbonatation\n\nTransfert de fût dans un réceptacle isobarrique dans lequel on injecte du CO2 pour prévenir la reformation d'une mère. Puis lancement d'une carbonatation naturelle à température ambiante jusqu'à 1 bar. Prélever un échantillon avant la prochaine étape pour analyse selon la méthode.\n\n# Cold Crash \n\nTransfert du fût en zone froide 4-6°C pendant 2 jours.\n\n# Mise en bouteille\n\n## Lavage des bouteilles\n- Nettoyage des bouteilles avec une solution désinfectante\n- Rinçage eau vinaigrée\n- Séchage\n\nPuis lavage et désinfection des outils de transfert.\n\n## Mise en bouteille\nPrélever trois échantillons : l'un pour analyse selon le protocole et un autre, si pertinent, pour analyse en laboratoire ainsi qu'un de référence en cas de rappel.\nMise en bouteille, contrôle de la carbonatation et de la pression constante.\nEncapsulage et stockage au froid à 4-6°C. Etablissement d'une ddm et application des étiquettes avant livraison si option choisie.\n\n# Suivi post livraison\n\nHotline mise en place pour le suivi et mise à disposition d'une application web pour le suivi de la traçabilité des ingrédients."}, {"id": "Purin-purin-no-Koyo", "title": "Purin purin no Koyo", "tags": ["recette/koyo", "recette/dessert"], "cats": ["dessert", "koyo"], "origine": "Koyo, Japon", "body": "Une recette de pudding japonais issu d'instagram puis travaillé par Léo du Koyo afin d'atteindre un dessert de qualité. Se sert avec du caramel, dans l'idéal le Shoyu Caramel et du Gomasio.\n\n## Ingrédients\n\n- 500g de Lait\n- 500g de Crème liquide\n- 150g de Sucre blanc\n- 6 Oeuf\n- 6 feuilles de gélatine\n- Une gousse de vanille\n\n## Recette\n\n1. Blanchir les œufs entier avec le sucre\n2. Chauffer le lait et la crème avec la vanille\n3. Tempérer les œufs en versant du lait dessus\n4. Remettre sur le feu pour cuire légèrement et ajouter la gélatine réhydratée puis égouttée\n5. Servir avec un caramel et du gomasio\n\n## Voir aussi\n- Koyo"}, {"id": "Pâte-de-foie-de-volaille-var-sauce-pas-poisson", "title": "Pâte de foie de volaille var sauce pas poisson", "tags": ["recette/bizarre"], "cats": ["bizarre"], "origine": "Fusion", "body": "Le paté de foie de volaille est un incontournable des recettes que j'emporte un peu partout parce qu'en plus très généreuse et franchement bonne, elle s'adapte à de nombreuses configurations et elle est plutot économique à produire.\n\nDe nombreuses variations peuvent etre imaginées sur cette base là mais cette recette a trouvé son aboutissement en faisant mes préparations pour mon premier midi au Maquis. Cette recette a trouvé son premier essort au Koyo néanmoins où nous la servions comme les izakaya et les restaurants de yakitori le font, en entrée d'une suite de plat intense. Néanmoins, cette recette nous a été partiellement inspirée par les méthodes de fabrication d'une cuisinière vietnamienne sur youtube qui nous montrait comment préparer le paté qui rejoint les banh mi.\n\nCette recette a rebondit ensuite au restaurant Ceba où l'inspiration heureuse d'Agathe a permis d'ajouter des épices nouvelles, les premières expériences avec la sauce pas poisson se sont concrétisées ici. Mais c'est vraiment au Maquis, là où il fallait klaxonner et envoyer des produits marqués, sans hésitations, que le paté a trouvé sa forme actuelle. Plus simple, plus directe, meilleure, elle saura ravir les papilles de tout un chacun.\n\n## Ingrédients\n\n- 500g de Foie de volaille\n- 200g beurre\n- 200ml sauce pas poisson\n- 500ml d'eau (avec du dashi si vous voulez un extra quick d'umami)\n- 2 gros oignons\n- Poivre noir\n- Poivre de sichuan ou timut\n- QS épices\n- QS de Sel\n- QS Vin blanc\n\n## Recette\n- Préparer un bouillon avec des épices (cannelle par exemple, poivre de timut en quantité modérée), un shiitaké déshydraté ou autre ainsi qu'un peu de vin blanc ou de saké\n- Couper finement les oignons et les ajouter au bouillon\n- Ajouter les foies et poursuivre la cuisson à frémissement pendant 10 minutes\n- Retirer les épices trop grosses et solides puis filtrer le tout pour ne garder en définitive que les foies et les oignons cuits.\n- Mixer au cutter idéalement ou au blender voire au mixeur plongeant et incorporer le beurre froid petit à petit jusqu'à obtenir une belle pâte bien émulsionnée. Ajouter la sauce pas poisson puis ajuster l'assaisonnement en factorisant le fait que le froid risque d'entraîner une baisse de sensation salée.\n- Laisser reposer 12h au frais, filmé au contact idéalement\n- Servir avec du pain grillé et des pickles\n\n## Voir aussi\n\n- Pâté de foie de volaille à l'Umeshu du Koyo\n- Pâté de foie de volaille Umeboshi Sancho"}, {"id": "Pâte-vegetal", "title": "Pâte vegetal", "tags": ["recette/vegan"], "cats": ["vegan"], "origine": "Fusion", "body": "## Ingrédients\n\n- 400g pain sec au Levain\n- 300g margarine\n- 300g courgettes\n- 300g carottes\n- 300g Oignon\n- 150g Levure maltée\n- 130g champignon de paris\n- 50g de Miso brun\n- Bouillon concentré\n- Sauce soja\n- Epices\n\n## Recette\n\n1. Faire tremper le pain sec dans un bouillon avec un peu de sauce soja\n2. Éplucher les légumes pour atteindre les proportions visée. Les passer au cutter en petits morceaux, pas une purée\n3. Dans le même temps faire fondre la margarine dans une poele et faire chauffer doucement avec les épices (herbes de provence, Poivre, Cannelle) et le miso pour faire infuser\n4. Faire revenir les légumes mixé dans la poêle 5 minutes puis mélanger au pain qui aura été égoutté et émietté en amont. Mélanger la levure maltée également\n5. Remplir des bocaux et les déposer dans un bain marie puis au four à 180°C pendant 30 minutes puis 130°C pendant encore 30 minutes\n\n## Voir aussi\n\n- Pâté de foie de volaille var. Sauce Pas Poisson"}, {"id": "Pâte-à-kimchi-basique", "title": "Pâte à kimchi basique", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Corée", "body": "Élément central lors d'une préparation d'un kimchi, cette pâte permet d'assurer une Fermentation pétillante et détonnante, forte en goût. Peaufinée dans son état classique pendant de nombreuses itérations, elle a été validée par les membres du Koyo. Cette recette vaut pour 3kg de Chou chinois.\n\n\n> [! Important] A savoir\n> Cette recette n'inclut pas la julienne de légumes qui peut fortement évoluer d'une recette à une autre mais son importance est centrale pour le goût final.\n\n## Ingrédients\n\n- 1 poire\n- 1 pomme\n- Splash de sauce poisson\n\t- Peut être retiré au prix d'un certain goût caractéristique\n- *facultatif* 20g de Sucre blanc\n- 40g Miel\n- *facultatif* 40g sirop de riz\n- 40g de rapadura\n- 1 Piment rouge long\n- 80g Ail\n- 80g Gingembre\n- 80g Oignon\n- 400ml dashi\n\t- Vegan ou non selon l'utilisation\n- 40g Shoyu\n- *facultatif* 40g Aka Miso\n- *facultatif* 40g Shiro Miso\n- 40g Gochujang\n- *facultatif* 20g hatcho miso\n- 20g Concentré de tomate\n- 40g de Mirin ou saké\n- 80g Gochugaru\n- 5g Paprika doux\n\n## Recette\n\n1. Mixer et mettre en fermentation avec des légumes salés et une julienne de légumes simples.\n\n## Références\n- 9423 Kimchi classique\n\n## Voir aussi\n- Kimchi d'écorce de pastèque"}, {"id": "Pâte-à-kimchi-fruitée", "title": "Pâte à kimchi fruitée", "tags": ["concept/culinaire"], "cats": ["concept"], "origine": "Corée", "body": "Dans le prolongement de la Pâte à kimchi basique, celle-ci fait office d'exploration culinaire et assume d'aller plus loin la combinaison des fruits utilisés. Cette pâte a une utilité pour l'équivalent de 5 Chou chinois environs.\n## Ingrédients\n\n- 100g poire\n- 100g orange\n- 50g pomme\n- 45g Gingembre\n- 30g Ail\n- 50g Kaki koso (voir 291223-I Kaki Koso)\n- 50g Cheong de coing (voir 301223 Cheong Coing)\n- 180g Oignon doux\n- 40g sauce poisson\n- 30g hatcho miso\n- 10g Shoyu\n- 100g gochugaru\n\n### Version végétarienne\n\n- 100g poire\n- 100g orange\n- 50g pomme\n- 40g Gingembre\n- 30g Ail\n- 50g 24324 Cheong Orange Amère\n- 50g Cheong de coing (voir 301223 Cheong Coing)\n- 200g Oignon jaune\n- 50g 29224 Sauce Alter-poisson\n- 30g Shiro Miso\n- 80g gochugaru\n- 20g paprika fort\n- Pâte\n\t- Bouillon végé 20cl\n\t- 40g farine / ou farine de riz gluant\n## Recette\n\n- Assembler le tout au blender et rectifier l’assaisonnement si nécessaire"}, {"id": "Pâte-à-Okonomiyaki-du-Koyo", "title": "Pâte à Okonomiyaki du Koyo", "tags": ["recette/koyo", "recette/pate"], "cats": ["koyo", "pate"], "origine": "Japon", "body": "Le résultat sur la texture fonctionne vraiment bien. Le ratio est vraiment efficace.\n## Ingrédients\n\n- 8 oeuf\n- 400g de bouillon dashi\n- 240g de farine\n- 80g fécule pomme de terre\n- 40g shoyu\n- Facultatif\n\t- Pincée de bicarbonate de soude\n\t- 100g de pomme de terre crue râpée\n\n\n## Recette\n\n- Tout passer au blender\n- Ajouter la pâte à des légumes en julienne\n- Cuire sur une poêle chaude comme une crêpe / galette\n- Servir avec de la mayo et de la sauce okonomiyaki ainsi que de l'ao nori, tenkasu, gari et autres joyeusetés.\n\n## Voir aussi\n- Koyo"}, {"id": "Pâtes-Carbonara-de-la-Mer", "title": "Pâtes Carbonara de la Mer", "tags": [], "cats": [], "origine": "Italien", "body": "# Pâtes Carbonara de la Mer\n\n## Ingrédients\n- Deux poches d'Œuf de Loup de Mer\n- Jus d'un demi-Citron\n- Poivre blanc\n- Une cuillère à café de Shoyu\n- Huile d'olive\n- 50g de Chapelure\n- Persil\n- Sel\n\n## Recette\n\n\n## Références\n\n## Voir aussi\n\n## Journal de bord\n```dataview\nLIST FROM Pâtes Carbonara de la Mer & #experimentation & !#template\n```"}, {"id": "Pâté-de-foie-de-volaille-Umeboshi-Sancho", "title": "Pâté de foie de volaille Umeboshi Sancho", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Fusion", "body": "## Ingrédients\n\n- 400ml de bouillon dashi\n- 400g de saké (ou en l'occurence mix Vin blanc / saké tant-pour-tant)\n- 2 gros oignons\n\n- 500g de Foie de volaille\n\n- 15g de Ume-su\n- 70g de Mirin 4 ans d'âge (ou autre alcool complexe) > Idéalement Umeshu\n- 20g de sauce soja\n- 30g de hatcho miso\n- 1g de Poivre sancho\n- 1g de poivre noir\n- 15g de Otsunamiso Ume\n\n- 200g de beurre \nhttps://www.nishikidori.com/fr/miso/2146-otsunamiso-ume-4963809114391.html\n## Recette\n- Couper finement les oignons et les cuire dans le bouillon et le saké portés à ébullition\n- Ajouter les foies quand les oignons sont cuits et poursuivre la cuisson à frémissement pendant 10 minutes\n- Mixer et incorporer le beurre froid petit à petit jusqu'à obtenir une belle pâte bien émulsionnée. Ajuster l'assaisonnement en factorisant le fait que le froid risque d'entraîner une baisse de sensation salée.\n- Laisser reposer 12h au frais, filmé au contact idéalement\n\n## Références\n- Expériences au Koyo et la recette de marmiton[^1]\n\n## Voir aussi\n- Pâté de foie de volaille à l'Umeshu du Koyo\n\n\n[^1]: https://www.marmiton.org/recettes/recette_pate-de-foie-de-volaille-facile-et-rapide_50660.a"}, {"id": "Pâté-de-foie-de-volaille-à-l-Umeshu-du-Koyo", "title": "Pâté de foie de volaille à l'Umeshu du Koyo", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "Fusion", "body": "## Ingrédients\n- 1kg de Foie de volaille\n- 4 gros oignons\n- 800ml de saké\n- 800ml de Mirin\n- 25cl d'Umeshu\n- Poivre noir\n- QS de Sel\n- QS Shoyu\n\n## Recette\n- Couper finement les oignons et les cuire dans le mirin et le saké portés à ébullition\n- Ajouter les foies quand les oignons sont cuits et poursuivre la cuisson à frémissement pendant 10 minutes\n- Ajouter dans un blender le reste des ingrédients, sauf le beurre ainsi que les foies et les oignons sans le jus de cuisson (on jette le jus de cuisson)\n- Mixer et incorporer le beurre froid petit à petit jusqu'à obtenir une belle pâte bien émulsionnée. Ajuster l'assaisonnement en factorisant le fait que le froid risque d'entraîner une baisse de sensation salée.\n- Laisser reposer 12h au frais, filmé au contact idéalement\n\n\n## Références\n- Marmiton :p\n\n## Voir aussi\n- Pâté de foie de volaille Umeboshi Sancho"}, {"id": "Ramen-provençal", "title": "Ramen provençal", "tags": ["recette/koyo", "recette/plat", "recette/vegan"], "cats": ["koyo", "plat", "vegan"], "origine": "Fusion", "body": "Ramen végétarien pensé pour le Koyo (et dans le cadre du menu-koyo-septembre-2023).\n## Ingrédients & Recette\n\n### Tare\n- Sake Shio Koyo Tare adapté avec un dashi de Basilic Shiso et shiitaké (donc base végétarienne)\n\n### Bouillon\n- Bouillon végétarien clair qui contient les éléments fondamentaux suivants :\n\t- Chou chinois\n\t- Ail\n\t- Oignon\n\t- Pomme / Fruit\n- Toute autre addition qui ajoute de la complexité est bienvenue\n\n### Toppings\n- Tomate (cuites au four très peu de temps) puis torchées à l'envoi\n- Légumes grillés du Donburi du soir\n- Pistou de Basilic Shiso préparé maison\n- Mizuna\n- Oeuf Onsen\n\n## Références\n\n- L'inspiration est venue de @tanguyFerrandiEcoleFrancaise2014\n\n## Voir aussi\n- Koyo"}, {"id": "Ratatouille-parfumée", "title": "Ratatouille parfumée", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Provencal", "body": "# Ratatouille parfumée\nUne sauce qui résonne comme une fin de saison, quand les fleurs ont rendu leurs graines et que les aubergines commencent à fatiguer, il reste sur ce fond nostalgique, un arrière-goût d'autonome qui bourgeonne et qui, avec sa fraîcheur fait tout de même voyager.\n\n## Ingrédients\n- 500g de Tomate pêlées\n- 5cl de Macvin\n- 3 gousses d'Ail\n- Huile d'olive\n- 1 pincée de Cumin\n- 1 pincée de Graines de fenouil\n- 1 pincée de Graines de coriandre\n- 1 Oignon\n- 100g de Poivron rouge ou d'autres couleurs (en l'occurence un mix)\n- 1 cuillière de Sucre roux\n- 2 Aubergines\n\n## Recette\n1. Faire revenir deux gousses d'ail hachées avec une pincée de fenouil et une pincée de cumin dans une cocotte avec de l'huile d'olive.\n2. Quand ça crépite ajouter l'équivalent de trois petites aubergines coupées en cubes et dessalées. Ajouter un oignon coupé en fine tranches.\n3. Faire revenir pendant 10 minutes à feu moyen pour cuire une première fois les aubergines.\n4. Ajouter une pincée de coriandre en graines et faire revenir encore quelques minutes.\n5. Ajouter la sauce tomate (500g de tomates pelées avec un fond de Macvin) et les poivrons découpés en fines lamelles. Ajouter un fond d'eau pour arriver à hauteur des aubergines.\n6. Mettre à mijoter à feu doux et avec le couvercle jusqu'à cuisson complète (à voir). Il est possible sur la fin de cuisson d'ajouter des courgettes mais ce n'est pas strictement obligatoire, la ratatouille se suffit à elle-même ainsi.\n7. Laisser reposer une nuit ou une demie journée idéalement avant de servir.\n8. Réchauffer et ajuster l'assaisonnement puis servir avec du riz ou des pâtes.\n\n## Voir aussi\n- 16921 Sauce tomate à l'aubergine : Cette expérimentation donne lieu à une recette de par la fraîcheur qu'elle apporte."}, {"id": "Rayu", "title": "Rayu", "tags": ["recette/koyo", "recette/condiment"], "cats": ["condiment", "koyo"], "origine": "Asie", "body": "Une huile aromatique qui sert principalement les Ramen en premier lieu mais dont la pertinence se situe à de nombreux autres recettes. La Rayu apporte un profil aromatique racé, fumé, piquant et complexe qui convient à de nombreux plats en plus d'un rouge pétant.\n## Ingrédients\n\n- Pour 2L d'huile neutre\n\t- 2 bâtons de Cannelle cassia\n\t- Une pincée de Poivre de Sichuan\n\t- Une Anis étoilé\n\t- Une gousse d'Ail\n\t- Une pincée de Poivre noir non moulu\n\t- 100g de Gochugaru\n\t- 10g sel\n\t- 20g Sucre blanc\n\t- 10g Shoyu\n\t- 20g huile neutre\n## Recette\n\n1. Faire revenir la Cannelle et l'anis étoilé ainsi que le poivre noir, puis arroser d'un peu d'eau et amener à réduction.\n2. Verser l'huile froide et ajouter la gousse d'Ail puis amener l'huile jusqu'à une température haute mais pas bouillante.\n3. Quand l'huile est bien chaude la verser sur le gochugaru mélangé à l'huile neutre, au sel, au sucre, au Shoyu et au Poivre de sichuan.\n4. Laisser redescendre à température puis infuser une nuit idéalement.\n\n## Références\n\n- Made with Lau notamment\n\n## Voir aussi\n\n- Koyo\n- Negi Oil Koyo"}, {"id": "Riz-au-lait-généreux", "title": "Riz au lait généreux", "tags": [], "cats": [], "origine": "Europe", "body": "La recette ultime du riz au lait généreux et simple qui saura ravir petits et grands. Elle ne nécessite aucun oeuf contrairement à la recette traditionnelle. Celle-ci est en volupté et s'accompagne volontiers d'un caramel.\n## Ingrédients\n\n- 250g de riz rond ou de riz à risotto\n- 1.5L de lait\n- 2 gousses de vanille\n- 100g de sucre blanc (jusqu'à 150g)\n- 40cl de crème liquide 30% ou plus\n\n## Recette\n\n1. Laver le riz une fois seulement puis l'ajouter au lait avec la vanille (gousse grattée avec la gousse toute entière aussi). Laisser cuire à feu doux en remuant occasionnellement pour éviter que ça accroche au fond. Au bout de 30 minutes de cuisson, ajouter le sucre, remuer et continuer pour encore 15 minutes (en général). Une fois que le riz est bien cuit l'ensemble doit être très crémeux, mettre au frais.\n2. Après quelques heures (voire idéalement une nuit) sortir le riz au lait du frigo, monter la crème en chantilly et l'ajouter progressivement à la Maryse sans trop remuer pour éviter de trop casser l'ensemble.\n3. Remettre au frais et consommer tel quel ou avec un coulis de fruit rouge ou encore une crème caramel ou d'un Shoyu Caramel.\n\n## Références\n\n- @VeganBrothNoodles (Magazine Yam)"}, {"id": "Rougail-Plantain", "title": "Rougail Plantain", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Ultra fusion", "body": "## Ingrédients\n- 1 Oignon\n- 3 gousses d'Ail\n- 500g de Tomate en dès (en boîte ou de tomates blanchies et pelées)\n- 100g - 200g d'Aubergine\n- QS Curcuma\n- QS Graines de coriandre\n- QS de Graines de fenouil\n- 100ml (ou QS) de dashi\n- 100ml (ou QS) de Shoyu\n- 10ml (ou QS) de Mirin / saké / Vin blanc\n- 1 Banane plantain plutôt mûre\n- 1 à 2 paquets de Nem Chua\n\n## Recette\n1. Faire revenir l'oignon et l'ail puis ajouter la banane plantain hachée finement ainsi que le Nem Chua, haché finement également.^\n2. Cuire quelques minutes jusqu'à coloration, déglacer au saké ou au mirin (ou vin blanc) et ajouter les tomates ainsi que les épices.\n3. Porter le tout à ébullition et à première réduction, puis ajouter le dashi et le shoyu, et les aubergines qu'on aura coupé en cube et fait frire (première cuisson donc al-dente) auparavant.\n4. Porter à ébullition puis mijoter le tout à feu doux et avec un couvercle 5 à 10 minutes, puis faire réduire, toujours à feu doux jusqu'à l'obtention de la texture souhaitée. Les aubergines doivent se tenir encore.\n\n## Références\nLIST FROM Aubergine & !#experimentation & !#template & !#ouvrage\n## Voir aussi\n- 16921 Sauce tomate à l'aubergine\n```dataview\nLIST FROM Rougail Plantain & #experimentation & !#template\n```"}, {"id": "Saba-no-Misoni", "title": "Saba no Misoni", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Japon", "body": "# Ingrédients\n\n-   4 morceaux de filets de Maquereau\n-   3-4 Cébette\n-   3 cm de cubes de Gingembre\n\n## La sauce mijotée\n\n-   80 g Mugi Miso ou autre orienté sel et protéine\n-   200 ml eau\n-   200 ml saké\n-   30g de sucre\n-   22ml de Mirin\n\n# Recette\n\n1. Découper les filets en gros rectangles en s'adaptant à la taille des morceaux. Inciser une croix au milieu puis blanchir les filets dans de l'eau bouillante (30 secondes ~ 1 minute) avant de les retirer et les laisser reposer dans une eau froide (avec des glaçons).\n\t1. !Pasted image 20220918173817.png\n2. Dans une poêle faire bouillir l'eau, le saké, le sucre et le mirin avec le gingembre et la cébette. Ajouter les filets de maquereau et faire pression au maximum pour qu'ils soient recouverts par le liquide pendant 2 minutes. Ajouter le miso dilué dans un peu d'eau et laisser mijoter jusqu'à épaississement.\n3. Servir avec de la cébette et du gingembre en julienne.\n\n# Références\n- [@yumikoSimmeredMackerelMiso2018]\n```dataview\nLIST FROM Untitled & #experimentation & !#template\n```"}, {"id": "Saint-Jacques-Oursin-Quellec-Style", "title": "Saint Jacques Oursin Quellec Style", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Europe", "body": "Une recette fraîche, simple, facilement twistable avec du fermenté dans le jeu.\n## Ingrédients\n- Saint jacques fraîche\n- Oursin\n- Huile d'olive\n- Livèche\n- Citron de caractère\n- Sel, poivre condiment\n\n## Recette\n- Couper les saint jacques en deux, arroser d'un jus de citron, sel et poivre\n- Oursin (ouvert), langue, rincée dans l'eau d'oursin filtré, mixé dans l'huile d'olive, jus de citron et sauce soja blanche (alternative large possible)\n- Langue d'oursin entière pour la mâche\n- Huile et purée de livèche\n- Déposer les saints jacques dedans\n## Référence\nhttps://www.instagram.com/reel/DU6d9BrEzTQ/?igsh=N3I5aWp2NWt0bDRm\n\n## Liens\n- Tartare de saumon estival"}, {"id": "Sake-Shio-Koyo-Tare", "title": "Sake Shio Koyo Tare", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "Le shio Ramen du midi pourrait devenir une institution au Koyo en se basant sur ce Tare très simple mais riche en goût. On sert ce tare avec un bouillon clair de poulet (asari) mélangé en double soupe avec un dashi travaillé. La negi oil reste la plus intéressante pour ce type de projet.\n\n## Ingrédients\n- 40 cl Kombu Dashi\n\t- 400 g eau\n\t- 15 g Kombu\n\t- 4g Dashi en poudre\n- 50 g Mirin\n- 100 g saké\n- 50 g sel\n- 1 cl de Vinaigre de riz\n- 2 cl de Shoyu (usukuchi de préférence)\n\n## Recette\n\n1. Faire chauffer et flamber (pour évaporer l'alcool) du mirin et saké\n2. Ajouter le kombu dashi et le sel (ainsi que le msg si souhaité et les autres éléments)\n3. Mélanger pour dissoudre le sel\n\n## Références\n- Inspiré par le saké tare de Ramen lord @satinoverBookRamen2020\n- L'ajout de vinaigre est inspiré par le livre @amanoRamenCuisineJaponaise2022"}, {"id": "Sakekasu-Marinade", "title": "Sakekasu Marinade", "tags": [], "cats": [], "origine": "Japon", "body": "Une marinade testée à l'occasion de la Journée fermentée aux Halles Tropisme 4-11-23 et qui fonctionne bien notamment avec du Poulet (particulièrement du blanc de Poulet) mais qui s'applique et se décline à d'autres ingrédients et légumes.\n## Ingrédients\n\n- 440g Sakekasu\n- 280g Miso\n- 120g Mirin\n- 300g eau\n-  5g sel non iodé\n## Recette\n\n1. Mélanger les ingrédients ensemble puis appliquer la marinade sur le substrat choisi pendant un minimum de 12h et jusqu'à 48h au frais.\n2. Soutient bien les cuissons douces, noircit sur des cuissons fortes.\n\n## Références\n\n- @VeganBrothNoodles\n\n## Voir aussi\n\n- Sakekasu"}, {"id": "Saké-rustique", "title": "Saké rustique", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Japon", "body": "# Saké rustique\nLe saké rustique, est un saké maison produit à partir d'Amazaké ensemmencé avec de la levure de bière pour produire un résultat léger mais sec, qui sert bien en cuisine. C'est un ingrédient à part entière, qui peut se consommer tel quel, mais qui sera moins savoureux qu'un alcool préparé avec soin. L'acide citrique apporte une acidité nette et la levure Wit M21 apporte un côté sec agréable et un faible taux d'alcool.\n\n## Ingrédient\n- Amazaké classique\n- Levure de bière - Belgium Wit M21\n- Acide citrique\n\n## Recette\n1. Préparer un Amazaké classique fortement tourné vers le sucre (autant que possible)\n2. Disposer l'amazaké qui a atteint le pic de sucrosité dans une dame-jeanne avec 0,7g d'acide citrique par litre d'amazaké (au jugé, on essaie pas de faire un truc impeccable). L'idée est de faire tomber le pH pour sécuriser le mout (on vise en dessous de 5 en gros)\n3. Ajouter la levure de bière et mettre à fermenter en mode hermétique.\n4. Quand le barbotteur arrête de blouper, filtrer le mout à travers un tissu propre.\n5. Effectuer plusieurs filtrage en fonction de la pureté recherchée.\n6. Goûter et utiliser comme du saké.\n\n```ad-info\n\nPlus il y a de dépôts dans le vin final, plus ils auront tendance à noircir et brûler à la cuisson. Il est mieux d'avoir un résultat final pas trop trouble tout de même.\n\n```\n\n\n## Recettes\n\n```dataview\nLIST FROM Saké rustique & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Saké rustique  & #experimentation & !#template\n```"}, {"id": "Satsuma-age-adaptées", "title": "Satsuma-age adaptées", "tags": [], "cats": [], "origine": "Japon", "body": "Des croquettes de poisson frites venant du Japon qu'on retrouve souvent dans un Oden. La recette est variable et adaptable mais globalement on utilise un poisson à chair blanche et, en mixant, on cherche à créer une émulsion style *nuggets*.\n\n## Ingrédients\n- 300 g Mulet ou autre poisson à chair blanche\n- 1 Oeuf\n- 2 cuillère à soupe de Farine T60\n- 1 cuillère à soupe de Fécule de pomme de terre\n- 1 pincée de sel ou une cuillère à soupe de Shoyu\n- 1 pincée de Poivre\n- 1 pincée de Nori ou autre algue\n- 1 cuillère à soupe de Jus de citron ou Saké rustique\n- De la Polenta à loisir ou Farine T60\n- 10 g de Gingembre émincé finement\n- 2 gousses d'Ail émincées finement\n- 1 Oignon\n- 1 Carotte\n\n## Recette\n1. Emincer l'oignon, la carotte, l'ail et le gingembre\n2. Préparer et lever les filets du poisson si nécessaire\n3. Mixer jusqu'à ce que ça devienne une pate grossière, c'est bien si des morceaux existent encore.\n4. Ajouter l'oeuf, le saké ou le citron et la fécule puis mixer à nouveau.\n5. Ajouter au mélange émulsionné, la sauce soja ou le sel ainsi que l'ail et le gingembre\n6. Mélanger les légumes émincés (oignon et carotte) avec la farine puis l'intégrer à la pate.\n7. Avec une cuillière prendre une partie de la pate et la rouler dans la polenta ou farine pour former des boules qu'on applatira ensuite avant de les mettre à frire.\n\t1. Il est possible d'effectuer une cuisson à la vapeur également.\n8. Faire attente à ne pas trop faire cuire pour éviter de sécher la boulette.\n\n## Références\n[@RecetteSatsumaageMelange2019]"}, {"id": "Sauce-gmb", "title": "Sauce gmb", "tags": [], "cats": [], "origine": "Asie", "body": "Une sauce terrible, efficace à souhait et fortement compatible avec de nombreux légumes en tête desquels la patate douce. Une sauce peaufinée au Koyo qui gagne à se répandre en utilisation. GMB pour Goma (sésame), Miso, Beurre.\n## Ingrédients\n\n- 25g beurre pommade de qualité\n- 15g tahini\n- 15g shiro miso\n\n## Recette\n\n1. Battre jusqu'à l'obtention d'une sauce homogène. Servir sur des légumes chaud accompagné d'une vinaigrette piquante et sucrée. Bien acidulée.\n\n## Références\n\n- @zenakStickyTahiniButter2023\n\n## Voir aussi\n- A ne pas confondre avec la Sauce Sésame"}, {"id": "Sauce-Gyoza-Koyo", "title": "Sauce Gyoza Koyo", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "La meilleure combinaison de sauce gyoza que j'ai connue à ce jour et que j'ai découverte au Koyo .\n\n## Ingrédients\n- 1 part de Vinaigre à sushi du Koyo (ou à défaut de riz, on perd un peu de sucre du coup)\n- 1 part d'Huile de sésame torréfiée.\n- 2 part de Shoyu\n- Graines de sésame\n\n## Recette\n1. Mélanger les ingrédients et servir avec des gyozas chaud. Fonctionne bien comme assaisonnement d'une salade à base de riz également.\n\n## Références\n[@koyoizakayaBoiteAuxRecettes2022]\n\n## Voir aussi\n- Gyozas de poulet"}, {"id": "Sauce-Hoisin", "title": "Sauce Hoisin", "tags": ["recette/sauce"], "cats": ["sauce"], "origine": "Chine", "body": "# Sauce Hoisin\nPlusieurs recettes américaines partent d'une sauce soja qu'elles augmentent avec de l'huile de sésame, de la mélasse et autre. Beaucoup de recettes semblent suggérer l'emploi de Douchi (à travers sa version transformée finale Sauce de haricots noirs^[@thedaringgourmetBESTAuthenticHoisin2016] (attention à ne pas confondre : on entend par haricot noir, du soja noir), mais les autres lectures, à la fois l'étiquette du pot de sauce Hoisin et le livre de cuisine \"Chine\"^@lumchanChineLivreCuisine2020, ainsi que la page Wikipédia^[@wikipediaSetier2021] et VietWorldKitchen^[@vietworldkitchenHomemadeHoisinSauce2017], semblent indiquer des \"Graines de soja salé fermenté\". Cela semble amène à une Miso constituée de soja. A ce terme générique, il est possible d'attribuer notamment, le miso.\n\n## Ingrédients et étapes\n- 75g de sucre brun\n- 30ml  d'eau\n- 50g de Sauce de haricots noirs ou de Miso (dans ce cas, aller vers un truc fort, style Mame miso)\n- 30g de sauce soja\n- 15g de vinaigre de riz (ou autre vinaigre léger)\n- 3g d'huile de sésame (ou Tahini)\n- 2g de Poudre de cinq épices\n- 4 pruneaux dénoyautés (probablement facultatif)\n\nMélanger au blender et, si trop liquide, ajouter de la farine de riz gluant et faire chauffer délicatement.\n\n## Utilisations\nLa sauce hoisin est une sauce servie avec du canard laqué notamment ou des fruits de mer, très présente dans les barbecues, et est issue de la cuisine cantonnaise. A noter cependant, qu'elle est centrale à l'élaboration du Porc Char Siu puisqu'elle constitue un élément incontournable.\n\n## Voir aussi\n- Umami\n\n## Recettes\n\n```dataview\nLIST FROM Sauce Hoisin & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Sauce Hoisin  & #experimentation & !#template\n```"}, {"id": "Sauce-huitre", "title": "Sauce huitre", "tags": ["recette/sauce"], "cats": ["sauce"], "origine": "", "body": "# Sauce huître\n\nLa sauce huître est une sauce produite à base d'huître longuement cuites et caramélisées. Aujourd'hui, les versions commerciales produisent des sauces très riches en Umami mais également très transformées.\n\n- C'est pourquoi une recette maison doit être élaborée\n\t- [ ] #task Concevoir une recette de sauce huître #personnel \n\n## Recettes\n```dataview\nLIST FROM Sauce huitre & !#experimentation & !#template & !#ouvrage & #recette \n```\n## Expérimentation\n```dataview\nLIST FROM Sauce huitre  & #experimentation & !#template\n```\n\n## Références\n@SauceHuitre2022"}, {"id": "Sauce-Kaeshi-express", "title": "Sauce Kaeshi express", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "# Sauce Kaeshi Express\n\nLa sauce Kaeshi est fréquemment utilisée au Koyo notamment pour produire de la sauce Tsuyu ou servir d'accompagnement à des riz ou autre. Elle est déclinée de façon express ici car la méthode plus traditionnelle inclus l'ajout de Katsuoboshi et de Kombu.\n\n## Ingrédients\n- 500ml Shoyu\n- 125ml Saké rustique\n- 425ml Mirin\n- 10g de Dashi en poudre\n\n## Recette\n1. Faire bouillir le saké et le mirin afin de faire évaporer l'alcool\n2. Réunir le reste des ingrédients ensemble et conserver au frais.\n\nCette sauce, une fois diluée, peut être utilisée pour faire des sauces Tsuyu et Mentsuyu.\n\n## Références\n- [@koyoizakayaBoiteAuxRecettes2022]\n- [@francoisRecetteSauceKaeshi2021]\n\n## Voir aussi\n- Recette fondamentale du Koyo"}, {"id": "Sauce-Mapo-Koyo", "title": "Sauce Mapo Koyo", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Chinois", "body": "Plat végétarien du midi proposé avec des udon et qui est optimisé pour l'envoi. Si la recette est fortement inspirée par Nami Chen[^1] et des modifications personnelles, elle reste tout de même peu conventionnelle, ni traditionnelle.\n\n## Ingrédients\n\n- 300g de Haricot noirs fermentés (Douchi)\n- 250g sauce Mappo\n- 150g de Concentré de tomate\n- 150g de saké\n- 100g de Mirin\n- 100g de Shoyu\n- 80g de Doubanjiang / Gochujang\n- 100g Ail\n- 100g Gingembre\n- 100g Sucre blanc\n- 2L de kombu dashi amélioré\n\t- Kombu\n\t- Shiitake\n\t- Cèpes séchés\n- QAS\n\t- Sel\n\t- Cannelle\n\t- Badiane\n\t- Graines de coriandre\n\t- Poivre de sichuan\n\t- Poivre sancho\n\n## Recette\n\n1. Faire revenir l'ail et le gingembre émincés avec les épices en poudre dans une bonne quantité d'huile neutre\n2. Quand le tout devient parfumé, ajouter les pâtes (haricot noir, tobanjiang, gochujang) sauf la sauce Mappo\n3. Déglacer au saké, amener à réduction puis ajouter le bouillon, le mirin et le reste des ingrédients.\n4. Amener à ébullition et maintenir 5 minutes.\n5. Préparer de la Maïzena avec de l'eau froide, ajouter pour épaissir la sauce, ajuster les saveurs et laisser reposer.\n\n### A l'envoi\n\n1. Faire revenir des oignons avec divers légumes (champignons, aubergines, courgettes, shiitaké), ajouter la sauce à mi-hauteur et amener à ébullition.\n2. Ajouter du Tofu soyeux coupé en petit cube, enrober de la sauce puis servir avec du riz ou des udon. Saupoudrer avec du poivre du sansho.\n\n## Références\n\n- Mapo Nasu\n\n## Voir aussi\n\n- Koyo\n- @mikeWhyDoesSichuan2025\n\n\n[^1]: @chenMapoEggplantMabo2020"}, {"id": "Sauce-mare-e-kimchi", "title": "Sauce mare e kimchi", "tags": ["recette/bizarre"], "cats": ["bizarre"], "origine": "Fusion", "body": "Une recette tout en simplicité exécutée par Ruben du Maquis situé au Vigan à l'occasion d'un midi spécial où on a cuisiné ensemble. Comme depuis le début de ma reconversion professionnelle j'ai passé quelques temps à devoir assouplir ma cuisine et la rendre plus douce, moins fermentée, ce moment où Ruben prend tous les pots de kimchi que j'avais amené puis celui de kkakdugi pour les mettre dans la sauce tomate a été libérateur. D'assumer si simplement sa cuisine en ayant une confiance absolue dans son palet, c'est toujours surprenant. Le résultat final m'a beaucoup plu. Si vous y soustrayez les éléments de la mer qui rendent cette recette si unique c'est avant tout la base des involtini à la courgette et au pélardon.\n## Ingrédients\n\n- 250g pulpe de tomate\n- 50g kimchi\n- 50g kkakdugi idéalement\n- 100g de coque\n- 100g de scipion\n- 100g de moules\n- QS Huile pimentée\n- QS Huile\n- QS Vin blanc\n- 1 Oignon\n\n## Recette\n\n1. Faire cuire les coques, les scippions et les moules à part\n2. Faire revenir l'oignon avec l'huile et la moitié du kimchi. Quand le tout a bien frit et qui l'huile a pris la couleur du kimchi, déglacer avec du vin blanc. Réduire puis déglacer à nouveau avec l'eau des fruits de mer, réduire à nouveau puis ajouter la pulpe de tomate.\n3. Faire mijoter une trentaine de minute puis ajouter le reste de kimchi et kkakdugi, cuire encore 5 minutes puis mixer finement. Ajuster les saveurs de l'huile pimentée, du sel, et éventuellement un peu de sucre\n4. Laisser reposer en chaleur tombante avant de réserver au frais avant la prochaine utilisation\n\n## Voir aussi\n\n- Sauce Tomate Pas Poisson"}, {"id": "Sauce-Oni", "title": "Sauce Oni", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Koyo", "body": "# Sauce Oni\nUne sauce piquante d'inspiration coréenne développée par mes soins au Koyo et qui vise à accompagner des fritures grasses (comme le Koyo fried chicken).\n\n## Ingrédients\n- 30g de Concentré de tomate\n- 50g de Sirop d'érable\n- 45g de Gochujang\n- 10g de Sucre roux\n- 15g de Vinaigre de riz\n- 10g de Shoyu ou Tamari\n- 5g d'Ail\n- 20g de Beurre\n- 10ml d'eau ou plus\n\n## Recette\n\n1. Combiner les ingrédients sauf le beurre\n2. Déposer dans une poêle avec le beurre et porter à ébullition brièvement.\n3. Ajouter de l'eau pour délayer le tout.\n\n## Voir aussi\n- Koyo\n```dataview\nLIST FROM Sauce Oni & #experimentation & !#template\n```"}, {"id": "Sauce-Piquante-Abricot-Sichuan", "title": "Sauce Piquante Abricot Sichuan", "tags": [], "cats": [], "origine": "Asie", "body": "Une recette créée dans la ferveur de l'été et qui aura superbement accompagné des recettes au Koyo. Elle permet de conserver l'essence de la fraîcheur de l'abricot et introduire la complexité du poivre de sichuan.\n## Ingrédients\n\n- 200g Abricot\n- 200g Piment long orange (entre le vert et le rouge)\n- 20g sel\n- 5g Poivre de sichuan\n## Recette\n\n1. Mix des ingrédients et mise en fermentation une à deux semaines\n2. Remix et ajout éventuel de vinaigre ou de jus de citron, un complément de fruit peut-être nécessaire\n\n## Accompagnement\n\n- Kawazaki (brochette / yakitori) de peau de poulet\n- Tartare de saumon estival\n## Références\n- 18723 Spicy Apricot x Sichuan"}, {"id": "Sauce-Piquante-Fermentée-Melon", "title": "Sauce Piquante Fermentée Melon", "tags": ["fermentation"], "cats": ["fermentation"], "origine": "Fermentation", "body": "Une Sauce piquante fermentée originelle qui m'a beaucoup suivi et qui est peu partie en levure de kham.\n\n## Ingrédients\n- 50 g Sucre blanc (soit 5%)\n- 35 g Sel (soit 3,5%)\n- 1 l d'eau\n- 2 pincées Poivre de sichuan (facultatif)\n- 2 pincées Poivre de Timut (facultatif)\n- 4 baies Cardamome (facultatif)\n- 500 g Piment de Cayenne et Espelette\n- 2 Oignon (gros de préférence)\n- 20 g Ail\n- 2  Tomate (petites)\n- 50 g Melon (facultatif)\n- 2 g Gingembre séché ou moins si frais\n- 5 cl Vinaigre de malt, de vin rouge ou de cidre\n\n## Recette\n\n### Préparation de la saumure\n\n- Faîtes bouillir la moitié de l'eau avec le poivre de Sichuan et de Timut, la cardamome, le sucre et le sel. Mélangez bien pour assurer une bonne dissolution du sel et du sucre.\n\n- Une fois arrivée à ébullition, versez la moitié de l'eau restante dans la casserole ou un contenant à part pour rendre plus rapide le refroidissement. Une fois à température ambiante, votre Saumure est utilisable.\n\n### Lancement de la Fermentation\n\n- Lavez les piments en surface et retirez le pédoncule, mais conservez les graines. Nul besoin de découper les piments. Ajoutez-les, tel quel, dans votre bocal refroidit avec les tomates grossièrement découpées (sans la peau, ni les pépins de préférence).\n\n- Découpez l'oignon et l'ail en de gros morceaux. Ajoutez-les par dessus les piments avec le gingembre et le melon découpé également. Tassez un coup les ingrédients en les poussant avec votre poing fraîchement lavé ou un ustensile propre.\n\n- Laissez fermenter à température ambiante durant une semaine à température ambiante (idéalement supérieure à 20°C) dans un endroit à l'abris du soleil\n\n#### Préparation de la sauce et stockage\n\n- Séparez la saumure des piments et épices.\n\n- Passez les piments et épices (les solides en somme) au mixer ou blender en ajoutant la saumure (10cl habituellement, si cela ne prend pas bien rajoutez-en petit à petit jusqu'à obtenir la consistance d'une sauce) et du vinaigre\n\n- Passez la sauce obtenue à travers une passoire fine ou un torchon (propre évidemment). Le liquide que vous obtenez sera vôtre sauce.\n\t- La pâte qui reste dans la passoire fine ou le torchon peut être séchée au four à basse température (50°C pas plus) ou au deshydrateur ou encore au soleil, pour obtenir une poudre piquante qui accompagnera volontiers vos pâtes et salades.\n\t- La saumure que vous n'aurez pas utilisée peut être ajoutée à une soupe, devenir un Bouillon ou servir de base à des sauces salades.\n\n- Globalement, tout comme la sauce piquante, la conservation au frigo est plutôt pérenne (je les conserve sur 6 mois, mais soyez toujours vigilants à l'odeur et si dans votre famille il y a des personnes fragiles, soyez doublement attentifs)\n\n## Références\n\n- @katzFermentationsLegumesFruits2018\n- @nguonCuisineFermentations402021"}, {"id": "Sauce-Sésame-X-Abricot-Fermenté", "title": "Sauce Sésame X Abricot Fermenté", "tags": ["recette/sauce"], "cats": ["sauce"], "origine": "Fermentation", "body": "Une sauce d'inspiration mixte provenant d'un échange avec Jo de UFO Laboratory. Cette sauce a une certaine complexité en bouche mais un gras qui vient compléter parfaitement les notes fermentées de l'Abricot. Elle doit pouvoir connaître un développement piquant en choisissant de pimenter la sauce dès le départ ou d'ajouter une huile pimentée. Elle a été préparée sur le pouce pour accompagner les Yakitori servie pendant la Journée fermentée aux Halles Tropisme 4-11-23.\n## Ingrédients\n\n- 8923-H Smooth Apricot x Sweet Chili > Full bocal\n- 200g de sésame non torréfié (en vrai c'est QS)\n- 200g d'Huile de sésame blond non torréfiée (en vrai c'est QS)\n## Recette\n\n1. Faire revenir le sésame dans une poele chaude et viser une coloration bien marquée mais pas brûlée\n2. Ajouter l'huile, chauffer légèrement puis verser sur la sauce fermentée d'Abricot et la passer au blender jusqu'à obtenir une consistance fine.\n3. Ajouter des graines de sésame pour la décoration et servir avec une viande ou des courgettes grillées.\n## Voir aussi\n\n- Fiches techniques Halles Tropismes 4-11"}, {"id": "Sauce-Ume-Hambagu", "title": "Sauce Ume Hambagu", "tags": [], "cats": [], "origine": "Japon", "body": "La version originale ne contient pas de prune umeboshi mais cette adaptation permet d'apporter une pointe d'originalité et une goût très puissant. Elle se trouve être plutôt salée, aussi il faut ajuster et gérer la consistance ainsi que la sensation de sel en s'appuyant sur le beurre.\n## Ingrédients\n\n- 15g Concentré de tomate\n- 10g Vinaigre de riz\n- 10g Mirin\n- 90g Vin rouge\n- 10g Umeboshi\n- 45g tonkatsu sauce\n- 15g Beurre\n\n## Recette\n\nCette sauce se pratique après cuisson d'une viande idéalement. On y ajoute l'ensemble des ingrédients (la prune doit être mixée ou hachée finement) sauf le beurre. On mélange bien et quand on arrive à une réduction satisfaisante on monte au beurre.\n\n## Références\n\n@namiJapaneseHamburgerSteak2020\n\n## Voir aussi\n\n- Hambagu"}, {"id": "Shio-Comtois-Tare", "title": "Shio Comtois Tare", "tags": ["recette/koyo", "recette/plat"], "cats": ["koyo", "plat"], "origine": "Fusion", "body": "Un tare à faire évoluer qui se destine à la proposition d'un ramen franc-comtois pour le Koyo.\n\n## Ingrédients\n- 40 cl Kombu Dashi\n\t- 400 g eau\n\t- 15 g kombu\n- 50 g Macvin\n- 100 g Savagnin ou Chardonnay jurassien\n- 50 g sel\n\n## Recette\n\n1. Mélanger et faire chauffer les alcools\n2. Ajouter le kombu dashi et le sel, mijoter et remuer pour dissoudre.\n\n## Références\n- Directement inspiré du \"Sake-based Shio Tare\" de @satinoverBookRamen2020\n\n## Voir aussi\n- Sake Shio Koyo Tare"}, {"id": "Shio-koji", "title": "Shio koji", "tags": ["fermentation/amino", "recette/fermentation"], "cats": ["fermentation"], "origine": "Japon", "body": "## Le principe\nLe shio koji  veut simplement dire Koji salé ce qui implique un mélange de koji, de sel et d'eau remis à fermenté. C'est un condiment populaire au Japon (qui sert notamment pour les tsukemono).^@nakamuraHandbookMakingSake2018\n\n## La méthode\nLes proportions varient entre les auteurs. Si certains préfèrent utiliser un ratio de 5% de sel sur le total du mélange eau et Koji, personnellement je préfère des teneurs en sel plus hautes, qui vont limiter la fermentation lactique ou alcoolique, et laisser la place aux enzymes Les enzymes du koji.\n\nMélanger donc tant pour tant (ratio 1:1 eau et koji) avec la quantité choisie de sel (entre 5% du total jusqu'à plus de 10% en fonction de vos envies, personnellement je navigue entre 7 et 10%). Ajouter d'éventuels condiments : poivre, pelures lavées de légume, champignons séchés.\n\nLaisser reposer le koji un minimum de quelques jours (3 ou 4) à température ambiante pour qu'il prenne de la saveur, même si, d'un point de vue enzymatique, il est déjà efficace. Selon la température ambiante, passé une semaine, mettre le shio koji au frais.\n\n## Le shoyu koji\nSublime variation, en lieu et place de l'eau et du sel, mélangez simplement du koji avec une sauce soja (ratio 1:1)^[@61degdegresShoyuKojiRecette] que vous laissez reposer à température ambiante quelques temps. Le goût de la sauce va changer et devenir bien plus intense. Cela peut être intéressant pour revitaliser une sauce soja qui serait ouverte depuis trop longtemps.\n\n## Le koji\nIl est recommandé d'utiliser un grain avec une plus forte concentration en protéines pour faire du shio koji (style orge) et une variété de koji-kin qui sera plus tournée vers la protéase (c'est souvent indiquer sur les sites au moment de la sélection des sporesLe koji-kin (spores)). Il est d'ailleurs recommandé de ne pas incuber le koji à plus de 30°C et de veiller qu'il ne monte pas trop en température afin d'optimiser la génération des protéases.^@umanskyKojiAlchemyRediscovering2020\n\nLa variation luchensis du koji produit de l'acide citrique qui est intéressant dans les marinades et produit une bonne quantité de protéase si elle pousse sur de l'orge, aussi, j'aime beaucoup utiliser cette variété.\n\n## Les utilisations\nLe shio koji peut servir principalement en marinade, mais fonctionne également très bien pour les Tsukemono.\nLe shio koji peut servir à mariner aussi bien du poulet, que du boeuf. Il faut varier le temps de marinade en fonction de l'épaisseur du morceau. En somme, plus le morceau est fin, plus il est recommandé de faire durer la marinade.\n\nA titre d'anecdote, je me suis un jour servi du shio koji pour faire mariner du céleri rave. Je l'ai épluché et coupé en tranches pour ensuite le faire frire façon KFC^[Voir 11921 Poulet KFC Premium & @weissmanKFCChickenSandwich2021]. L'impact honnêtement du shio koji n'était pas déterminant, outre le fait que le céleri était dès lors bien salé. Mais ce qui est intéressant c'est que l'eau des céleri était sortie et s'était mélangée au shio koji, j'ai alors voulu filtrer le tout (en utilisant un filtre à café). Le liquide obtenu était incroyable. Il m'a servi de bouillon pour produire un risotto gorgé d'umami. Comme quoi, il faut tester, dériver pour se surprendre avec des résultats forts en goût.\n\nDe même, je n'ai jamais produit de gigot d'agneau aussi puissant en goût que celui mariné dans un shio koji d'orge. La texture et le goût de la viande sont fortement augmentés.\n\n## Références\n@redzepiGuideFermentationNoma2018\n@nakamuraHandbookMakingSake2018\n@umanskyKojiAlchemyRediscovering2020\n\n## Recettes\n\n```dataview\nLIST FROM Shio koji & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Shio koji  & #experimentation & !#template\n```"}, {"id": "Shio-Koji-Koyo-Tare", "title": "Shio Koji Koyo Tare", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "# Koyo Shio Koji Tare\n\nLe Tare du Shio Ramen présenté au Koyo en été. C'est un assaisonnement léger qui permet de bien renforcer le bouillon sans apporter de corps gras supplémentaire.\n\n## Ingrédients\n- 1200g de Shio koji de riz\n- 48g de Dashi en poudre\n- 112g de sel\n- 240g de Shoyu usukuchi\n\n## Recette\n- Mélanger les ingrédients au blender et servir avec un bouillon de poulet idéalement.\n\n## Voir aussi\n- KSK Ramen"}, {"id": "Shiro-Goma-Koyo-Tare", "title": "Shiro Goma Koyo Tare", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Koyo", "body": "Un Tare simple mais efficace qui fonctionne à merveille au Koyo. Très compatible avec un Bouillon de Poulet mais aussi avec une variation terre-mer et un bouillon plus orienté sur le poisson, il permet d'ajouter un aspect crémeux au plat.\n\n## Ingrédients\n- 1L Sake Shio Koyo Tare\n- 400g de Tahini\n- 200g de Peaux de poulet cuites à l'eau\n- 100g à 200g de jus de cuisson de porc\n- 50g ou plus de Yuzu Kosho\n- QS de jus de citron (un demi en taille standard)\n\n## Recette\n- Ajouter l'ensemble des éléments dans un blender et mixer à vive allure pendant 2 à 5 minutes. Le temps nécessaire pour obtenir une texture crémeuse sans grumeaux.\n\n## Références\n- Il s'agit d'une élaboration à partir du ramen produit par Christophe Alary du restaurant Blend\n\n## Voir aussi\n- Koyo"}, {"id": "Shoyu-Caramel", "title": "Shoyu Caramel", "tags": ["recette/koyo", "recette/condiment"], "cats": ["condiment", "koyo"], "origine": "Koyo", "body": "Un caramel très simple mais excellent qui fonctionne très bien avec un pudding japonais ou qui pourrait aller fort bien en conjonction avec un Gomasio. Recette élaborée avec Léo pour le Koyo.\n\n## Ingrédients\n\n- 200g Sucre blanc\n- 150g eau\n- 40g Shoyu (moins si on veut un goût plus léger)\n- 20g Mirin\n\n## Recette\n\n- Mélanger le sucre et l'eau et amener à coloration sur feu fort.\n- Ajouter le shoyu et le mirin puis attendre que le tout soit homogène, laisser refroidir.\n- Si on veut une consistance plus liquide, il faudra ajouter plus d'eau.\n\n## Voir aussi\n- Koyo"}, {"id": "Shoyu-de-pois-cassés", "title": "Shoyu de pois cassés", "tags": [], "cats": [], "origine": "", "body": "# Shoyu de pois cassés\n\n## Ingrédients\n- Koji de Pois cassés verts mixé à de la Farine T60 (en proportion 2/3 de pois cassés verts et 1/3 de farine)\n- Safran\n- Eau (le poids en eau doit être égal au poids du koji de pois cassés verts et de la farine)\n- Sel environ 10 à 12% du poids total\n\nAinsi pour exemple :\n- 600g de pois cassés verts cuits\n- 300g de blé ou de farine de blé torréfiée\n- 900g d'eau\n- 180g de sel\n- Quelques pistils de safran\n\n## Recette\n- Torréfier la farine et la mélanger avec les pois cassés verts cuits *al-dente*\n- Incuber les pois cassés verts avec des Spores de koji a. sojae\n- Une fois le koji developpé, mélanger le tout avec la Saumure à laquelle on ajoute le Safran.\n- Mélanger tous les jours pendant deux semaines puis toutes les semaines pendant 3 mois à 12 mois.\n\n## Références\n@redzepiGuideFermentationNoma2018 > Inspirée par la recette du Shoyu de pois cassés jaune\n@umanskyKojiAlchemyRediscovering2020\n\n## Voir aussi\nShoyu\n\n## Journal de bord\n```dataview\nLIST FROM Shoyu de pois cassés & #experimentation & !#template WHERE econtains(recette, Shoyu de pois cassés)\n```"}, {"id": "Sirop-d-amazaké", "title": "Sirop d'amazaké", "tags": ["recette/dessert", "recette/sauce"], "cats": ["dessert", "sauce"], "origine": "Corée", "body": "# Sirop d'amazaké\nLe sirop d'amazaké consiste à produire un liquide sirupeux chargé en sucres naturellement obtenus par l'action des Enzymes de Koji qui décomposent l'amidon du riz. Il faudra choisir un koji fortement orienté sur la production de sucre via l'Amylase.\n\n## Ingrédients\n- Amazaké classique\n\n## Etapes\n1. Filtrer le koji en le passant soit à l'étamine soit au chinois\n2. Amener à ébulition très lentement et surveiller pour éviter que le sirop ne carbonise.\n3. Conserver le concentré au frais.\n\n### Utilisation brillance\nLe sirop d'amazaké peut servir à glacer les légumes au barbecue, apporter du sucre dans des sauces (Sauce Ketchup ou Sauce Bulldog ou encore Sauce Hoisin).\n\n### Facilitateur de fermentation\nIl peut servir également pour apporter des sucres fermentiscibles pour des pâtes levées.\n\n## Références\n[@maangchiHomemadeRiceSyrup]\n\n## Voir aussi\n- Amazaké\n\n## Recettes\n\n```dataview\nLIST FROM Sirop d'amazaké & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Sirop d'amazaké  & #experimentation & !#template\n```"}, {"id": "Sirop-de-gochugaru", "title": "Sirop de gochugaru", "tags": [], "cats": [], "origine": "Fusion", "body": "## Ingrédients\n- 1 part de Su
