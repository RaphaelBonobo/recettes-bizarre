<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recettes — Atelier Bizarre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F8F5F0;
      --card-bg:  #FFFFFF;
      --sidebar:  #18181B;
      --side-t:   #E4E4E7;
      --accent:   #C2410C;
      --border:   #E7E3DA;
      --text:     #1C1917;
      --muted:    #78716C;
      --radius:   8px;
      --sidebar-w: 210px;
      --header-h:  56px;
    }

    html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

    /* ── Header ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      display: flex; align-items: center; gap: 16px; padding: 0 24px;
      background: var(--sidebar); z-index: 200; border-bottom: 1px solid #27272A;
    }
    .site-title {
      font-family: 'DM Serif Display', Georgia, serif; font-size: 18px;
      color: #E4E4E7; letter-spacing: 0.02em; white-space: nowrap;
    }
    .site-title em { color: var(--accent); font-style: italic; }
    .search-wrap { flex: 1; max-width: 420px; margin-left: auto; }
    #search {
      width: 100%; padding: 7px 14px; border-radius: 6px;
      border: 1px solid #3F3F46; background: #27272A; color: #E4E4E7;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s;
    }
    #search::placeholder { color: #71717A; }
    #search:focus { border-color: var(--accent); }

    /* ── Layout ── */
    .layout {
      display: flex; padding-top: var(--header-h); height: 100vh;
    }

    /* ── Sidebar ── */
    aside {
      position: fixed; top: var(--header-h); bottom: 0; left: 0;
      width: var(--sidebar-w); background: var(--sidebar);
      overflow-y: auto; padding: 20px 0; z-index: 100;
    }
    .side-section { margin-bottom: 8px; }
    .side-label {
      font-size: 10px; font-weight: 500; letter-spacing: .12em;
      text-transform: uppercase; color: #52525B; padding: 0 16px 8px;
    }
    .cat-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 7px 16px; background: transparent; border: none;
      color: #A1A1AA; font-family: inherit; font-size: 14px;
      cursor: pointer; text-align: left;
      transition: color .15s, background .15s;
      border-left: 2px solid transparent;
    }
    .cat-btn:hover { color: #E4E4E7; background: #27272A; }
    .cat-btn.active { color: #fff; background: #27272A; border-left-color: var(--accent); }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cat-count { margin-left: auto; font-size: 12px; color: #52525B; }
    .cat-btn.active .cat-count { color: #71717A; }

    /* ── Grid area ── */
    .grid-area {
      margin-left: var(--sidebar-w); flex: 1;
      overflow-y: auto; padding: 28px 28px 60px; position: relative;
    }
    .grid-meta { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    /* ── Cards ── */
    .card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      cursor: pointer; transition: box-shadow .15s, transform .1s;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); transform: translateY(-2px); }
    .card-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 16px; line-height: 1.3; margin-bottom: 10px; color: var(--text);
    }
    .card-origine { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: 11px; font-weight: 500; padding: 2px 8px;
      border-radius: 999px; color: #fff; letter-spacing: .02em;
    }

    /* ── Detail panel ── */
    #detail {
      position: fixed;
      top: var(--header-h); left: var(--sidebar-w); right: 0; bottom: 0;
      background: var(--bg); overflow-y: auto;
      transform: translateX(100%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 150;
    }
    #detail.open { transform: none; }
    .detail-inner { max-width: 720px; margin: 0 auto; padding: 36px 40px 80px; }
    .detail-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); cursor: pointer;
      border: none; background: none; font-family: inherit;
      padding: 0 0 28px; transition: color .15s;
    }
    .detail-back:hover { color: var(--text); }
    .detail-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 30px; line-height: 1.2; margin-bottom: 10px;
    }
    .detail-origine { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .detail-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid var(--border);
    }
    /* Rendered markdown */
    .body h1, .body h2, .body h3, .body h4 {
      font-family: 'DM Serif Display', Georgia, serif;
      margin: 1.4em 0 .5em; color: var(--text);
    }
    .body h2 { font-size: 20px; }
    .body h3 { font-size: 17px; }
    .body p  { margin-bottom: .75em; }
    .body ul, .body ol { padding-left: 1.4em; margin-bottom: .75em; }
    .body li { margin-bottom: .25em; }
    .body li ul, .body li ol { margin-top: .2em; margin-bottom: 0; }
    .body strong { font-weight: 500; }
    .body em { font-style: italic; color: var(--muted); }
    .body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    .body blockquote {
      border-left: 3px solid var(--border); padding-left: 16px;
      color: var(--muted); margin: 1em 0;
    }
    .body a { color: var(--accent); text-decoration: none; }
    .body a:hover { text-decoration: underline; }
    .body table { border-collapse: collapse; width: 100%; margin-bottom: .75em; }
    .body th, .body td { border: 1px solid var(--border); padding: 6px 10px; }
    .body th { background: #F0EDE6; font-weight: 500; }

    /* ── Empty ── */
    .empty {
      grid-column: 1 / -1; text-align: center;
      padding: 80px 20px; color: var(--muted);
    }
    .empty-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 20px; color: var(--text); margin: 12px 0 6px;
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      :root { --sidebar-w: 0px; }
      aside { display: none; }
      .cat-pills { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; }
      .grid-area { padding: 16px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .detail-inner { padding: 24px 20px 60px; }
      #detail { left: 0; }
    }
  </style>
</head>

<script>
const RECIPES    = [{"id": "Ajvar-Macédonien", "title": "Ajvar Macédonien", "tags": ["recette/sauce", "recette/vegan"], "cats": ["sauce", "vegan"], "origine": "Balkan", "body": "# Ajvar Macédonien\n\n## Ingrédients\n- 1200g poivron rouge (ou plus précisémment paprika des balkans)\n- 450g d'Aubergine (35%)\n- QS Poivre noir\n- 7g sel (0,6%)\n- 70g d'Huile d'olive (6%)\n- 20g de Vinaigre (1,6%)\n- 1 Tomate pelée en boîte\n\n## Recette\n1. Cuire, de préférence sur un barbecue, le poivron rouge et l'aubergine afin de noircir la peau et de rendre l'épluchage plus simple.\n2. Une fois les légumes cuits, les déposer dans une marmite avec un couvercle et laisser reposer environs 1h\n3. Peler les légumes et enlever les graines.\n4. Mixer au blender ou au couteau, ajouter l'ail, le vinaigre, le sel et l'huile.\n5. Déposer le mélange dans une casserole et faire mijoter une demie heure environs.\n6. Déguster avec des pâtes ou en tartinade sur du pain.\n\n## Références\n- [@AjvarMacedonienBonobo2020]\n- [@VeganBrothNoodles]"}, {"id": "Amazaké", "title": "Amazaké", "tags": ["concept/culinaire"], "cats": ["concept"], "origine": "", "body": "# Amazaké\n\nL'amazaké est une boisson japonaise sucrée obtenue par la Fermentation de riz (ou autre céréale) avec du koji^@katzFermentationsLegumesFruits2018. L'amazaké constitue à peu de choses près la première étape dans la production du saké^[Voir la fabrication du shubo @shirakamiTextbookSakeBrewing2016].\n\nL'approche classique consiste à mélanger du koji avec une céréale cuite (dans certaines recettes il n'y a pas de céréale ajouté, c'est le cas dans celle du Noma^@redzepiGuideFermentationNoma2018) encore chaud dans de l'eau (certaines recettes n'apportent de l'eau qu'à postériori de la fermentation^@katzFermentationsLegumesFruits2018) et d'essayer de garder le tout aussi chaud que possible, autour de 60°C. Grâce à cette température et un ratio important de koji, les Enzymes vont être proactives.\n\n## Les recettes\n!Amazaké classique\n!Amazaké acidulé\n\n## Variations & Détails\n!Les variations autour de l'amazaké\n!Le matériel pour l'amazaké\n\n## Applications\n!Les applications de l'amazaké\n\n## Références littéraires\n- @redzepiGuideFermentationNoma2018\n- @nakamuraHandbookMakingSake2018\n- @katzFermentationsLegumesFruits2018\n- @shirakamiTextbookSakeBrewing2016\n- @umanskyKojiAlchemyRediscovering2020\n\n## Voir aussi\n- Koji"}, {"id": "Amazaké-acidulé", "title": "Amazaké acidulé", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Japon", "body": "# L'amazaké acidulé\nL'amazaké acidulé provient de deux méthodes différentes pour arriver à un résultat similaire mais différent sur de nombreux plans.\n\nUmansky et Shih^@umanskyKojiAlchemyRediscovering2020 ont développé une approche où ils créent un amazaké avec plus d'eau et le laissent à température ambiante plus longtemps afin de favoriser l'émergence des lacto-bactéries. Pour l'amazaké \"lactique\" :\n\n> Ratio de 1:1:4 (koji, céréale, eau) -> maintenir à 55°C-60°C pendant 10 à 14h, filter et maintenir à température ambiante pendant une semaine. Conserver au frais.\n\nLa méthode du Noma^@redzepiGuideFermentationNoma2018 se repose sur l'utilisation d'un koji-kin (variété d'aspergillus) différentes, soit l'aspergillus luchensis qui produit naturellement de l'acide citrique. Le Noma fait ensuite refermenter l'amazake avec de la levure de chardonnay pour obtenir une boisson peu alcoolisée (style cidre). Pour l'amazaké \"citrique\" :\n\n> Ratio de 1:1,3 (eau et koji) -> mixer et maintenir à 60°C pendant 6 à 8h -> filter et ajouter une levure de chardonnay -> stopper la Fermentation assez tôt pour conserver des sucres.\n\n## Références\n@redzepiGuideFermentationNoma2018\n@umanskyKojiAlchemyRediscovering2020\n\n## Voir aussi\n\nLien vers la note originale : Amazaké\nKoji"}, {"id": "Amazaké-classique", "title": "Amazaké classique", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Japon", "body": "# L'amazaké classique\nDe nombreux ratios et recettes existent avec une variété de combinaisons entre riz cuit et koji. Une expérience^@katzFermentationsLegumesFruits2018 compare trois ratios et trois température d'incubation différentes amène la conclusion suivante :\n\n> Plus il y a de koji et plus la température est chaude, et plus le processus de saccharification et de liquéfaction est fort et rapide. Autrement dit, plus il y a de koji et plus le mélange est chaud (pas au delà de 60°C) et plus le résultat est sucré rapidement.\n\nGénéralement, l'approche pour faire un amazaké sucré est de suivre la procédure suivante : \n\n> Ratio de 1:1:2 (koji, céréale, eau) -> mixer pour augmenter la surface (pas obligatoire) -> maintenir à 55°C-60°C pendant 10 à 14h (même moins, c'est l'expérience qui dira). Conserver au frais une fois refroidit^@umanskyKojiAlchemyRediscovering2020.\n\nIl est possible pour stabiliser le résultat obtenu de le faire légèrement bouillir (pour atteindre une température de 73°C mais les Enzymes contenues dans le mélange ne seront plus opérationnellesà, soitde le mettre au frais. Une fois au frigo, les processus de transformation vont continuer et il y a une bonne chance pour que le mélange devienne alcoolisé.\n\nIl est également possible d'aromatiser à postériori en ajoutant du Gingembre notamment. Selon la consistance recherchée, il est possible enfin d'ajouter de l'eau pour diluer.\n\n## Références\n@katzFermentationsLegumesFruits2018\n@umanskyKojiAlchemyRediscovering2020\n\n## Voir aussi\nKoji\nLien vers la note originale : Amazaké"}, {"id": "Aubergines-piquantes-en-Sauce-Miso", "title": "Aubergines piquantes en Sauce Miso", "tags": ["recette/plat", "recette/vegan"], "cats": ["plat", "vegan"], "origine": "Japonais", "body": "Un plat rapide et efficace qui peut se décliner dans une logique de banchan ou en portions généreuses avec du riz et un accompagnement supplémentaire. \n\n## Ingrédients\n- 340g d'aubergine\n- 120ml de dashi végétarien ou d'eau (ou de dashi en poudre tout court)\n- 4g de miel (ou sirop d'érable)\n- 38g aka miso ou mieux, mame miso\n- 20g gochugaru (en fonction de la piquance souhaitée, ajuster) ou 10g gochujang\n- 7ml de vinaigre doux (riz ou cidre)\n- un petit morceau de gingembre râpé\n\n## Recette\n1. Détailler les aubergines en dés et les faire frire sur une cuisson sans coloration.\n2. Préparer la sauce en mélangeant l'ensemble des ingrédients sauf le vinaigre. Amener à frémissement puis ajouter les aubergines frites, faire mijoter quelques minutes.\n3. Ajouter le vinaigre et le gingembre râpé, servir avec des graines de sésame et de la ciboule.\n\n## Références\n- Recette tirée et légèrement adaptée de l'ouvrage : [@shurtleffBookMisoSavory2018]\n\t- Voir @shurtleffBookMisoSavory2018"}, {"id": "Biscuit-Jurassiques", "title": "Biscuit Jurassiques", "tags": [], "cats": [], "origine": "Europe", "body": "Une recette originelle légèrement twistée pour faire plaisir à Noé qui se régale bien dessus et qui lui change des Cake finalement.\n## Ingrédients\n\nPour les biscuits  \n- 1 œuf entier + 1 jaune d’œuf  \n- 60 g de sucre roux  \n- 140 g de farine  \n- 70 g de farine complète  \n- 40 g de farine de seigle  \n- 125 g de beurre  \n- 1 c. à s. de sucre vanillé (ou un trait d'extrait de vanille)\n- 20g de poudre d'amande ou de noisette\n- ½ c. à c. de sel\n\nPour le nappage  \n- 150 g de chocolat (noir ou au lait, comme vous préférez !)\n\n## Recette\n\nPour les biscuits  \n- Préchauffez le four à 180°C.  \n- Battez les sucres, le sel, l’œuf et le jaune d’œuf. Ajoutez les farines et mélangez bien.  \n- Enfin, ajoutez le beurre ramolli et coupé en petits morceaux. Mélangez du bout des doigts, jusqu’à obtention d’une belle boule de pâte bien lisse. Vous allez voir, elle est très agréable à travailler !  \n- Farinez le plan de travail, étalez votre pâte et découpez des biscuits à l’aide d’emporte-pièces en forme de dinosaures. Bon vous pouvez toujours découper des étoiles ou des cœur (ou toute autre forme qui vous inspire! ), mais ce sera moins drôle !  \n- Déposez les biscuits sur une plaque recouverte de papier sulfurisé. Faites cuire au four pendant 15 à 20 min. Les biscuits doivent être bien dorés ! Ensuite, laissez-les tranquillement refroidir.\n\n## Références\n- @JurassiquesFaconDinosaurus2013"}, {"id": "Biscuits-Cuillières", "title": "Biscuits Cuillières", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "Europe", "body": "Une recette de biscuits cuillères très utiles dans la confection d'un Tiramisu du Koyo ou Tiramisu grassois\n## Ingrédients\n\n- 110 g blancs d’œufs (3 pièces)  \n- 85 g sucre semoule  \n- 60 g jaunes d’œufs (3 pièces)  \n- 5 g vanille liquide  \n- 40 g farine T55  \n- 40 fécule de pomme de terre  \n- QS sucre glace  \n\n## Recette\n\n1. Séparer le blanc de jaune. Préchauffer le four à 180°C\n2. Monter les blancs délicatement et doucement en ajoutant le sucre en deux fois\n3. A la fin augmenter la vitesse du batteur augmenter la vitesse fortement\n4. Ajouter les jaunes en mélangeant durant seulement deux secondes\n5. Ajouter la farine et la fécule tamisée\n6. Créer des biscuits à la poche à douille puis cuire 15 minutes.\n\n## Références\n- @lesRecetteBiscuitCuillere\n\n## Voir aussi\n- Biscuit Jurassiques"}, {"id": "Bouillon-de-poulet-Koyo-Shio-Ramen", "title": "Bouillon de poulet Koyo Shio Ramen", "tags": ["recette/koyo", "recette/plat"], "cats": ["koyo", "plat"], "origine": "Japon", "body": "La recette de préparation du Bouillons de ramen du Koyo (ici une version orientée chintan)\n\n## Ingrédients\n- L'équivalent de trois / quatre carcasses de poulet\n- Les os de hauts de cuisses de poulet prélevés pour faire brochettes et kara age\n- Un sachet de pattes de poulet\n- 3 oignons\n- 3 Pommes Nashi\n- 3 grosses carotte\n- 4 tête d'ail\n- Un chou chinois\n- 3 grosses branches de gingembre\n- Une poignée de poivre noir\n- 400ml de sauce poisson\n- Deux bonnes poignées de shiitake séchés\n- Une botte de verts de poireaux\n\n## Recette\n1. Décongeler les os de poulet et les pattes dans de l'eau froide.\n2. Déposer les os et couvrir d'eau, porter à ébullition et écumer vigoureusement.\n3. Quand l'écume n'est plus chargée, ajouter les shiitaké, la sauce poisson et le poivre.\n4. Après trois heures de cuisson (voire plus), laver et découper les légumes en gros morceaux et les ajouter au bouillon. Nul besoin de les éplucher si la peau est propre après nettoyage.\n\n> [!ATTENTION] Pour la découpe des légumes, il faut que les morceaux soient gros mais pas trop, ni trop petits afin qu'ils ne fondent pas dans le bouillon. \n\n5. Laisser cuire une à deux heures supplémentaire puis filtrer et refroidir.\n\n## Voir aussi"}, {"id": "Bouillon-Vegan-Savoureux-du-Koyo", "title": "Bouillon Vegan Savoureux du Koyo", "tags": ["recette/koyo", "recette/vegan", "recette/plat"], "cats": ["koyo", "plat", "vegan"], "origine": "Ultra fusion", "body": "Une recette développée à la force des essais et qui se révèle plutôt fonctionnelle, très marquée en goût et plutôt équilibrée. Elle s'accord tout particulièrement avec un Sweet Miso Koyo Tare Vegan Edition et permet d'élaborer un ramen vegan complet, satisfaisant.\n\n## Ingrédients\n\n- 200g carotte\n- 200g céleri branche[^2]\n- 200g verts de poireaux\n- 100g de pomme de terre coupée en petits boûts\n- 500g de chou chinois\n- 2 Pomme\n- 2 tête d'ail\n- 60g de gingembre\n- 200g d'oignon\n- 200g de cébette (oignon blanc)\n- 15g de Cèpes séchés\n- 10g de graines de coriandre\n- 3g de cardamome\n- 3g de badiane\n- 2 clous de girofle\n- 5g de cannelle\n- *Pour le déglaçage*\n\t- 20cl de shoyu\n\t- 10cl de saké\n\t- 10cl de mirin\n\t- 100g de Concentré de tomate\n- *Pour le kombu dashi*\n\t- 60g de kombu\n\t- 30g de shiitake\n\t- 10L d'eau\n- 100g de graines de soja réhydratées (mais crues)\n- *Facultatif*\n\t- 30g de levure maltée (idéalement intégrée à la fin)\n\n## Recette\n1. Faire revenir les différents légumes lavés et découpés en morceaux grossiers dans une quantité généreuse d'huile en remuant régulièrement.\n2. Quand le fond de la casserole commence à marquer nettement, déglacer avec les ingrédients prévus à cet effet.\n3. Amener à réduction puis ajouter le kombu dashi (dans lequel on aura fait tremper les ingrédients à minima 30 minutes avant utilisation et au mieux une nuit avant).\n4. Ajouter les graines de soja puis, quand le mélange atteint le frémissement, retirer le kombu, puis laisser à petit bouillon (couvert de préférence) pendant 3 heures idéalement.\n5. 30 minutes avant la fin de cuisson, ajouter la levure maltée.\n6. Filtrer, presser les légumes quitte à ajouter un peu d'eau pour vraiment extraire un maximum de saveur.\n7. Passer au tamis dans l'idéal mais ce n'est pas obligatoire.\n\n## Références\n- Voir les recherches effectuées ici\n\n## Voir aussi\n- Koyo"}, {"id": "Boulettes-de-thon-de-la-madre", "title": "Boulettes de thon de la madre", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Madre", "body": "Les boulettes que ma mère prépare traditionnellement, inspirées d'une version sicilienne, il manque ici par rapport à d'habitude, les pignons.\n## Ingrédients\n- 500g de Thon (un mélange incluant ventrèche et partie plus musculaire serait souhaitable)\n- 2 oeuf\n- 100g de panko\n- 1 gousse d'ail\n- 1 bouquet de persil\n- QS feuilles de menthe\n- 50g de parmesan\n- Poivre noir ou blanc\n- 10g de sucre\n- QS Huile d'olive\n## Recette\n1. Hâcher le thon et le mélanger aux autres ingrédients finement découpés. Utiliser une grille large pour le hachage afin de conserver des bouts. Il est possible d'ajouter de l'oignon finement ciselé si cela est souhaité.\n2. Réfrigérer la farce puis former des petites boules (tailles selon l'envie) et faire cuire dans une poêle dont le fond a été rempli d'huile.\n3. Tourner les boulettes pendant la cuisson et ne pas hésiter à mettre le couvercle pour s'assurer d'une cuisson uniforme.\n4. Servir avec une sauce tomate\n\n## Voir aussi\n- Cette farce pourrait devenir une farce à Tsukune en ajustant un peu les proportions."}, {"id": "Boulettes-de-thon-del-Rapha", "title": "Boulettes de thon del Rapha", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Italie", "body": "Une variation des Boulettes de thon de la madre en utilisant une partie d'ingrédients japonais. La cuisson assure un fondant des boulettes. Délicieux en sandwich avec une petite sauce tomate à l'origan et de l'huile verte de shiso.\n## Ingrédients\n\n- 130g de ventrêche de thon\n- 500g de filet de thon\n- 1 oignon doux\n- 1 oeuf\n- Le zeste d'un citron\n- Le jus d'un demi citron\n- 1 trait d'huile d'olive\n- 10g de sauce huître\n- 10g de concentré de tomate\n- 30g de shiso\n- 30g de persil\n- 30g de pistache\n- 30g de panko ou chapelure\n- 10g de pecorino\n- 6g de sel\n- Poivre blanc\n\n## Recette\n\n1. Hacher le thon au hachoir avec la grille la plus large.\n2. Ajouter le reste des ingrédients et l'oignon en brunoise ainsi que le shiso ciselé fin, le pecorino râpé et les pistache concassées finement.\n3. Rouler des boulettes après avoir laissé la farce reposer au frais pendant une heure.\n4. Rouler les boulettes dans la semoule de blé fine ou dans du panko puis aligner dans un plat au four.\n5. Arroser d'huile et mettre à cuire 10 minutes à 200°C\n6. Baisser le feu, tourner les boulettes, arroser de pecorino rapé en plus et couvrir avec un couvercle ou de l'aluminium. Poursuivre la cuisson 5 minutes.\n7. Servir avec de la sauce tomate idéalement.\n\n## Références\n\n- @jamieoliver.comTunaMeatballsFish %% la honnnnte %%\n- @shawTunaMeatballsRecipe2015\n\n## Voir aussi\n\n- Boulettes de thon de la madre"}, {"id": "Brownie-redzepi-tweaked", "title": "Brownie redzepi tweaked", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "USA", "body": "Un brownie assez proche du Miso Chocolate Fudge mais avec une variation moins fat.\n## Ingrédients\n\n- 200g chocolat amer (300)\n- 110g beurre salé (165)\n- 30g miso (shiro ou aka selon les envies)\n- 200g sucre (120 blanc + 40 rapadura + 40 blond) (300)\n- 2 gros oeufs 3\n- 1 gousse vanille\n- 35g farine de seigle (112)\n- 40g farine t60\n- 20g cacao poudre amer (30)\n- 7g levure chimique (1 sachet)\n- Pincée de sel\n- 100g chocolat blanc\n\n## Recette\n\n- Préchauffer le four à 180°C\n- Faire fondre le chocolat amer au bain marie avec le beurre ainsi que le miso\n- Blanchir et monter en ruban les oeufs avec le sucre et les graines de la gousse de vanille\n- Ajouter le chocolat fondu avec les oeufs et mélanger jusqu'à incorporation complète\n- Ajouter les ingrédients secs tamisés puis le chocolat blanc en morceaux au mélange et envoyer dans une plaque rectangulaire en cuisson pendant 25 à 30 minutes, ne pas surcuire\n\n## Références\n\n- Savourer, Nadine Redzepi\n\n## Voir aussi"}, {"id": "Buns-burger-vegan", "title": "Buns burger vegan", "tags": ["recette/pain"], "cats": ["pain"], "origine": "", "body": "La fameuse recette des buns burger vegan\n## Ingrédients\n\nPour 10 buns de 125g environ :\n\n- 625g farine forte\n- 10g sel\n- 75g sucre\n- 125g biga (80g farine / 40g eau / 1g levure)\n- 100g huile d'olive\n- 331g eau\n- 12g Levure fraîche\n\n## Recette\n\n- Tout mixer, et faire bien attention au développement du réseau de glutan\n\n## Références\n\n- Recette Daveloza\n\n## Voir aussi\n\n- Petits pains vapeur au levain fourrés"}, {"id": "Cake-au-Choco-Noisette-Sulpice", "title": "Cake au Choco-Noisette Sulpice", "tags": ["recette/dessert/cake"], "cats": ["dessert"], "origine": "France", "body": "Il s'agit d'un cake issu de la collection de recettes de Jean Sulpice. Un gâteau au chocolat puissant, moelleux et satisfaisant. De quoi contenter toutes les bouches.\n## Ingrédients\n\n- 30g miel\n- 60g sucre\n- 35g poudre noisette (ou amande dans la version originale)\n- 60g farine t45\n- 4g levure chimique\n- 10g poudre cacao\n- 2 oeufs\n- 80g de crème liquide\n- 2g de rhum (ou autre alcool compatible)\n- 35g beurre\n- 35g chocolat noir 66%\n- **Sirop chocolat** (divisé par deux en vrai)\n\t- 110g eau\n\t- 70g sucre\n\t- 2g cacao en poudre\n\t- 5g jus de citron\n\t- 10g de liqueur de cacao (ou autre alcool)\n\n## Recette\n\n1. Mélanger miel, sucre, poudre de noisette, farine, levure et cacao.\n2. Ajoutez les oeufs mélangés à la crème puis le rhum.\n3. Faire chauffer le chocolat et le beurre à 45°C et ajouter au cake.\n4. Cuire à 160°C pendant 50 minutes (vérifier à partir de 40 minutes)\n5. Préparer le sirop en portant l'ensemble des ingrédients à ébullition puis le verser sur le cake à la sortie du four.\n\n## Références\n\n@sulpiceCakeCakesEtonnants2022\n## Voir aussi\n\n- Cake"}, {"id": "Cake-au-Citron", "title": "Cake au Citron", "tags": ["recette/dessert/cake"], "cats": ["dessert"], "origine": "Europe", "body": "Un cake multi-influence en partie inspiré par Sulpice. L'amour du cake au citron est très forte.\n## Ingrédients\n\n- 65g de beurre fondu froid\n- 30g huile d'olive\n- 1 gros citron (non traité)\n- 150g de sucre en poudre\n- 3  oeufs\n- 2 cuillère à soupe de limoncello\n- 95g de crème liquide entière\n- 180g de farine\n- 10g maïzena (ou fécule)\n- 4g levure chimique\n- 1 pincée de sel\n- 1 pincée de poivre sansho\n- 1 pincée de poivre de sichuan\n- Sirop citron\n\t- 50g d'eau\n\t- 50g de sucre en poudre\n\t- 25g jus de citron\n\t- 25g eau de fleur d'oranger\n\n## Recette\n\n- Faites fondre le beurre.Réservez.\n- Zestez le citron et mélangez les zestes au sucre en poudre. Réservez.\n- Préchauffez le four à 180° (th5) chaleur tournante et graissez un moule à cake de 20cm de long.\n- Dans le bol du robot, cassez les oeufs entiers et ajoutez le sucre parfumé au citron. Fouettez pour que le mélange blanchisse. \n- Ajoutez le limoncello, la crème entière et le sel et fouettez à nouveau.\n- Tamisez la farine avec la levure et ajoutez la progressivement au mélange précédent en mélangeant délicatement avec une maryse. Ajoutez enfin le beurre fondu refroidi et mélanger doucement. \n- Versez la pâte dans le moule et enfournez pour 40 minutes environ.\n- Pendant la cuisson du cake, préparez le sirop d'imbibage. Retirez du feu et ajoutez le jus de citron, mélangez.\n- Avant que le cake ne refroidisse, posez le sur une grille puis versez la totalité du sirop sur le gâteau. Laissez refroidir à température ambiante.\n## Références\n\n- @CakeAuCitron2015 \n\n## Voir aussi\n\n- Cake"}, {"id": "Cake-au-Yaourt-Agrume-et-Fleur-d-oranger", "title": "Cake au Yaourt Agrume et Fleur d'oranger", "tags": ["recette/dessert/cake"], "cats": ["dessert"], "origine": "Europe", "body": "Un riff du Cake Yaourt aux Pépites de Chocolat marqué sur les saveurs de mon enfance et qui développe un travail autour de l'agrume sans aller en chercher l'acidité (donc seulement les zestes).\n## Ingrédients\n\n- 190 g Farine T60\n- 7g  sachet de Levure chimique\n- 2  oeufs\n- 140 g Sucre blanc\n- 175g Yaourt\n- 50ml Huile neutre\n- 50ml Huile d'olive\n- 25g Eau de fleur d'oranger\n- le zeste d'un Pamplemousse\n- 5g zeste de yuzu\n- une bonne pincée de Poivre sancho\n## Recette\n\n- Préchauffer le four à 180°.\n- Mélanger la farine avec la Levure chimique, puis réserver.\n- A part, battre les œufs entiers avec le sucre en poudre et la vanille liquide. Ajouter un Yaourt bien mélanger. Ajouter l'eau de fleur d'oranger, les zestes et le poivre sancho\n- Incorporez en pluie le mélange farine-levure à votre appareil pour éviter les grumeaux.\n- Ajouter ensuite les huiles en filet.\n- Verser le tout dans un moule à Cake beurré et fariné et enfourner pendant 50 minutes environ. Tester la cuisson à l'un pic en bois. Laisser tiédir sur grille avant de démouler.\n## Références\n\n- Un riff de cette recette : @bakeryCakeAuxPepites2011\n## Voir Aussi\n\n- Cake"}, {"id": "Cake-Marbré", "title": "Cake Marbré", "tags": ["recette/dessert/cake"], "cats": ["dessert"], "origine": "No lo se", "body": "Un Cake merveilleux, extrêmement simple à produire mais avec lequel papy Brossard peut aller se rhabiller. Des twists sont permis dans les différentes pâtes, et notamment une version où le marbré est fait avec une poudre matcha par exemple. \n\nIl faut dès lors exploser au moyen de l'ouvrage @coucquytFoodpairingScienceGout2021 les différentes associations que les deux pâtes permettent dès lors qu'un contraste visuel est également perceptible.\n## Ingrédients\n\n- 100 g Beurre doux ramolli\n- 100 g Sucre blanc\n- 50 g Sucre rapadura ou complet\n- 3  gros oeufs (à température ambiante)\n- 200 g Lait entier (ou demi-écrémé)\n- 1 cs extrait naturel de vanille ou 15g d'amaretto\n- 50 g Huile neutre (type tournesol, colza...)\n- 100 g Crème liquide entière 30%mg\n- 270 g Farine T60\n- 2 cc Levure chimique\n- Une pincée de sel\n- 22g cacao amer en poudre\n- Si nécessaire : 15g Matcha \n- *Sirop*\n\t- 50 g eau\n\t- 20 g Sucre blanc\n\n## Recette\n\n- Préchauffer le four à 175° chaleur traditionnelle. Beurrer et chemiser de papier cuisson un moule à cake (le mien fait 27x10cm).\n- Dans un grand récipient, fouetter le Beurre ramolli et les deux sucres, pour avoir une texture crémeuse. Ajouter les oeufs et mélanger pour homogénéiser le tout.\n- A part, mélanger les ingrédients secs : farine, levure chimique et sel.\n- A part, mélanger les ingrédients humides : lait, huile, crème et vanille.\n- Incorporer ensuite, dans le grand récipient, la moitié des ingrédients humides, puis la moitié des ingrédients secs. Terminer par le reste des ingrédients humides et le reste des ingrédients secs.  Ne pas trop mélanger la pâte (juste le nécessaire) pour préserver le moelleux du cake.\n- Diviser la pâte en deux parts égales dans deux récipients : dans l'un d'eux incorporer le cacao amer tamisé et mélanger, dans l'autre faire de même avec le matcha.\n- Pour créer l'effet marbré dans le moule à cake : verser d'abord un tiers de pâte nature puis la moitié de la pâte chocolat. Ensuite, ajouter un tiers de pâte nature, puis la dernière moitié de la pâte chocolat. Terminer par le restant de pâte nature.\n- Enfourner pour 45 à 55 minutes environ (cela varie beaucoup selon les fours). Le dessus du cake doit être bien doré. Pour savoir s'il est cuit à coeur, planter un pic en bois : il doit ressortir sec ou avec quelques miettes. Laisser tiédir puis démouler sur grille.\n- (Optionnel) Pendant la cuisson du cake : préparer le sirop d'imbibage (qui permet de garder le dessus du cake encore plus moelleux). Dans une petite casserole, porter à ébullition l'eau et le sucre. Napper avec un pinceau sur le dessus du cake à la sortie du four.\n\n\n## Références\n\n- @bakeryCakeMarbreTres2023\n\n## Voir aussi\n\n- Cake"}, {"id": "Cake-Yaourt-aux-Pépites-de-Chocolat", "title": "Cake Yaourt aux Pépites de Chocolat", "tags": ["recette/dessert/cake"], "cats": ["dessert"], "origine": "Europe", "body": "Un Cake simple mais très enfantin dans sa déclinaison. Il me rappelle le meilleur des gâteaux au Yaourt généreux. Une variation pourrait inclure l'ajout de Noix de coco.\n## Ingrédients\n\n- 190 g farine\n- 7g  sachet de Levure chimique\n- 2  oeufs\n- 140 g sucre en poudre\n- 0,5 cc extrait naturel de vanille / ou amaretto\n- 125g Yaourt\n- 50g crème fraîche épaisse\n- 100 ml huile\n- 200 g Chocolat pâtissier noir et/ou au lait\n\n## Recette\n\n- Préchauffer le four à 180°.\n- Mélanger la farine avec la Levure chimique, puis réserver.\n- A part, battre les œufs entiers avec le sucre en poudre et la vanille liquide. Ajouter un Yaourt et la Crème fraîche, bien mélanger.\n- Incorporez en pluie le mélange farine-levure à votre appareil pour éviter les grumeaux.\n- Ajouter ensuite l'huile en filet.\n- Enfin, verser le chocolat noir et au Lait grossièrement haché en pépites (effet très gourmand!) puis mélanger.\n- Verser le tout dans un moule à Cake beurré et fariné et enfourner pendant 40 minutes environ. Tester la cuisson à l'un pic en bois. Laisser tiédir sur grille avant de démouler.\n## Références\n\n- @bakeryCakeAuxPepites2011\n\n## Voir aussi\n\n- Cake\n- Cake Marbré"}, {"id": "Cake-yaourt-vanille-huile-d-olive", "title": "Cake yaourt vanille huile d'olive", "tags": ["recette/dessert/cake"], "cats": ["dessert"], "origine": "Europe", "body": "## Ingrédients\n\n- 190 g farine\n- 7g  sachet de Levure chimique\n- 2  oeufs\n- 140 g sucre en poudre\n- 1 gousse de vanille\n- 175g Yaourt de brebis\n- 100 ml huile d'olive\n\n## Recette\n\n- Préchauffer le four à 180°.\n- Mélanger la farine avec la Levure chimique, puis réserver.\n- A part, battre les œufs entiers avec le sucre en poudre et la vanille . Ajouter le yaourt.\n- Incorporez en pluie le mélange farine-levure à votre appareil pour éviter les grumeaux.\n- Ajouter ensuite l'huile en filet.\n- Verser dans un moule beurré\n- Cuire pendant 40 minutes environ\n## Références\n\n- Cake Yaourt aux Pépites de Chocolat\n\n## Voir aussi\n\n- Cake au Yaourt Agrume et Fleur d'oranger\n- Cake"}, {"id": "Castella", "title": "Castella", "tags": ["recette/koyo"], "cats": ["koyo"], "origine": "Japon", "body": "Un gâteau japonais bien connu, très moelleux qui peut être à la base de nombreuses préparations. Cette reste est formalisée par Léo du Koyo et finalisée pendant le menu d'août (voir menu-koyo-aout-2023). Il sert aussi à la réalisation du Tiramisu du Koyo.\n## Ingrédients\n\n- 25g lait \n- 45g miel \n- 100g farine \n- 125 sucre \n- 6 œufs & 3 jaunes\n## Recette\n\n1. Mélange lait+miel pour que ca soit homogène \n2. On sépare les jaunes des blancs sur les six oeufs et on ajoute les trois jaunes en plus\n4. Incorpore moitié sucre et les jaunes d'œufs \n5. Ajoute le mélange miel au jaune\n6. Monte les blanc puis incorpore le reste de sucre \n7. Incorpore mélange jaune au blanc \n8. Ajoute farine tamisée\n9. Cuisson 20min chaleur haut bas puis 10min chaleur tournante à 180°C\n## Voir aussi\n- Koyo\n- Cake"}, {"id": "Chasu-de-poulet-citronné", "title": "Chasu de poulet citronné", "tags": ["recette/koyo", "recette/plat", "recette/sousvide"], "cats": ["koyo", "plat", "sousvide"], "origine": "Koyo", "body": "Chasu de poulet que l'on prépare au Koyo régulièrement.\n\n## Ingrédients\n- Blancs de poulet\n- 1% du poids en blanc de poulet en sel\n- QS Huile d'olive\n- Zeste de citron (environs 1 citron par kilo de poulet)\n\n## Recette\n1. Retirer les parties trop saignantes du poulet, puis ajouter le sel, l'huile (il ne faut pas inonder le poulet, seulement l'enduire) et les zeste de citron.\n2. Mettre sous vide et cuire à 62°C pendant 1h10 (à vérifier)"}, {"id": "Cheong", "title": "Cheong", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "", "body": "Voir Koso Dorinku même si les variations sur le temps de fermentation peuvent avoir lieu (environs 3 mois) et avec la quantité de sucre, le principe général reste le même."}, {"id": "Chou-farci-façon-asiatique", "title": "Chou farci façon asiatique", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Fusion", "body": "Une variation d'inspiration asiatique autour du chou farci qui se base sur une adaptation de la composition de la farce à gyoza pour créer une recette riche mais aussi originale.\n## Ingrédients\n\n- Un chou frisé\n- Farce\n\t- 300g de porc haché\n\t- 200g de crevette grise hachée crue\n\t- Lait\n\t- Panko\n\t- Ail haché finement\n\t- Poivre\n\t- Sauce Huître\n\t- Un oeuf\n\t- Un quart de chou frisé blanchi\n\t- Sel\n\t- Huile de sésame\n- Bouillon de cuisson\n\t- Dashi en poudre\n\t- Concentré de tomate\n\t- Carcasses de crevettes\n\n## Recette\n\n1. Blanchir une minute le chou frisé dans l'eau bouillante salée puis le mettre à refroidir. Effeuiller et ne garder que les plus belles feuilles, les autres iront dans la farce.\n2. Hacher les crevettes après les avoir décortiquées et les mélanger au reste des ingrédients de la farce. Ajouter le chou frisé réservé et finement haché.\n3. Faire revenir les carcasses de crevettes et déglacer avec du saké ou du vin blanc. Ajouter de l'eau et le pieds ainsi que le coeur du chou frisé dans un demi-litre d'eau avec du dashi en poudre. Faire frémir 10 minutes, filtrer et réserver.\n4. Assembler et rouler les feuilles de chou avec la farce. Les disposer dans un plat beurré allant au four et verser par dessus le bouillon.\n5. Mettre au four à 180°C pendant 30 minutes environs. Finir la cuisson à couvert (aluminium) si jamais trop de coloration ou d'évaporation.\n\n## Références\n\n@VeganBrothNoodles\n## Voir aussi\n\n- Chou farci végétarien\n- Gyozas de poulet"}, {"id": "Chou-farci-végétarien", "title": "Chou farci végétarien", "tags": ["recette/végétarien", "recette/plat"], "cats": ["plat", "végétarien"], "origine": "Fusion", "body": "# Chou farci végétarien\n\nUne expérimentation qui joue sur la texture apportée par le riz et le pain. On assume ici la légèreté d'une farce et d'un bouillon purement végétaux. C'est une recette qui s'adapte bien et peut produire, accompagnée de riz, de nombreux repas.\n\n## Ingrédients\n- 100g de Chapelure grossière\n- 100g de reste de Riz blanc cuit\n- 2 gousses d'Ail\n- une branche de Persil\n- 1 Oeuf\n- 25 g de Graines de sésame\n- Du Parmesan (remplacer par un mélange Panko et de Levure maltée)\n- 250g de Yaourt (ici un mélange de 100g de Yaourt et 150g de kéfir de lait qui apporte une acidité bienvenue)\n- 10 cl de Jiuniang ou de Vin blanc ou rien au pire\n- 50 cl de bouillon de Safran ou n'importe quel bouillon\n- 1 Chou frisé\n- 100g de Shiitake\n\n### Variation de farce\n- Ricotta\n- Panko\n- Oeuf\n- Shiitake et trompettes de la mort\n- Katsuoboshi\n- Sel\n- Poivre\n- Carottes cuites\n\n## Étapes\n1. Préparer la farce en mélangeant le pain dur réduit en chapelure grossière, l'ail et le persil émincé et l'huile d'olive avec le yaourt et le riz, assaisonner en fonction des envies. Ajouter l'oeuf jusqu'à obtenir un mélange homogène. Ajouter les shiitakes après les avoir fait revenir avec un peu d'huile et de sauce soja\n2. Effeuiller le chou, retirer la nervure centrale et les blanchir deux minutes.\n3. Rincer les feuilles à l'eau froide et les éponger avec un torchon délicatement.\n4. Déposer la farce (quantité variable en fonction de la taille des feuilles) dans une feuille puis la rouler de sorte à obtenir un chou farci.\n5. Aligner ces chou dans un plat beurré\n6. Verser le bouillon par dessus à hauteur, arroser généreusement de parmesan\n7. Mettre au four à 180°C pendant 40 minutes à 1 h, l'idée étant de réduire un maximum le liquide.\n8. Servir avec le fond de bouillon s'il en reste.\n\n## Journal de bord\n```dataview\nLIST FROM Chou farci végétarien & #experimentation & !#template\n```\n\n## Référence\nUne recette qui m'a servi d'inspiration : https://www.uneaiguilledanslpotage.com/2021/03/chou-farci-au-riz-et-ricotta-dottolenghi-vegetarien.html"}, {"id": "Coco-melon", "title": "Coco melon", "tags": ["recette/dessert", "recette/koyo", "recette/vegan"], "cats": ["dessert", "koyo", "vegan"], "origine": "Laos", "body": "# Coco Melon\n\nUn dessert laotien que j'ai découvert au Koyo.\n\n## Ingrédients\n- 1 Melon de taille moyenne (voire deux dans l'idéal)\n- 110g (voir 100g) de Sucre roux\n- 75g (voir QS) de Perles de tapioca\n- 400ml de Lait de coco homogénéisé\n- 400ml de Crème de coco\n\n## Recette\n1. Préparer les perles de tapioca en les faisant tremper dans l'eau froide quelques minutes puis en les faisant cuire dans une eau bouillante pendant 3 minutes avant de faire cuire à feu doux pendant 5 minutes ou jusqu'à ce qu'elles commencent à être transparente. Egouter puis rincer et réserver. \n2. Préparer le melon en le coupant en huit tranches égales puis en retirant fibres, pépins et peaux. Détailler ensuite en fines tranches.\n3. Préparer le caramel coco : faire un caramel à sec, dès que le sucre a intégralement fondu, ajouter la crème de coco mélangée au lait de coco petit à petit, doucement et remuer entre chaque ajout afin de bien émulsionner. Garder le mélange sur le feu pendant l'ensemble de la procédure.\n4. Mélanger le tout et laisser reposer quelques heures au frigo avant de servir."}, {"id": "Confiture-de-cerise-épicée", "title": "Confiture de cerise épicée", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "France", "body": "Une confiture qui pourra bien remplir un Muffin Fluffy ou accompagner une Crêpe express.\n\n## Ingrédients\n- 3kg de Cerise\n- 2kg de Sucre blanc\n- 8g d'Agar-agar (voire moins si souhaité)\n- Cannelle de ceylan\n- Poivre de sichuan\n\n### Ratios\n- 1 cerise\n- 66% sucre\n- 0,2% d'agar-agar\n- QS d'épices\n\n## Recette\n- J1 - Faire macérer les cerises dans le sucre et les épices\n- J2 - Faire une première cuisson et emmener à ébullition\n- J3 - Faire une seconde cuisson, emmener à ébullition et retenir quelques minutes\n- J4 - Faire une troisième cuisson, emmener à ébullition et retenir quelques minutes\n- J5 - Faire une quatrième cuisson, emmener à ébullition, tenir quelques minutes en remuant, puis redescendre à petits bouillons, ajouter l'agar-agar, remuer et mettre en bocaux."}, {"id": "Cookies-decadents", "title": "Cookies decadents", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "USA", "body": "Des \ncookies immenses, chargés en goût, qui sont un véritable plaisir coupable. La décharge pour ton corps est sans appel. L'addiction arrive un peu, puis pleinement. C'est le pinacle de la fusion entre gras et sucre. Il est possible de jouer sur le sel en le remplaçant par un peu de Miso ou de Doenjang.\n## Ingrédients\n-   240g de Beurre\n-   135g de Sucre rapadura\n-   100g de Sucre roux\n-   2 gros Oeuf\n-   120g de Farine à gateau\n-   180g de Farine T60\n-   1 cuil. à café Levure chimique\n-   1 cuil. à café de Bicarbonate de soude\n-   1/2 cuil. à café de fleur de sel\n-   200g de Chocolat pâtissier\n-   150g d'autres chocolats (Chocolat blanc ou Chocolat au lait)\n-   125g de Noisette\n-   125g de Noix\n\n## Recette\n1. Battre le beurre qu'on aura fait ramollir en amont avec le sucre jusqu'à incorporation.\n2. Ajouter les oeufs au mélange.\n3. Une fois le tout bien incorporé, ajouter les farines, la levure, le sel et le bicarbonate de soude. Mélanger doucement jusqu'à ce que le mélange soit relativement homogène.\n4. Verser le chocolat en morceau grossier, les noix et noisettes en morceau également et mélanger à la maryse.\n5. Faire d'énormes boules (8 ou un plus plus) et les poser en tas sur une plaque de cuisson.\n6. Cuire à 200°C dans un four préchauffé pendant ~10 minutes.\n7. Laisser refroidir et servir !\n\n## Références\n\n- @delscookingtwistCookiesNewYorkaisChez2018\n\n## Voir aussi\n\n- Cookies"}, {"id": "Crumble-du-Koyo", "title": "Crumble du Koyo", "tags": [], "cats": [], "origine": "Koyo", "body": "Le crumble qui accompagne la majorité des desserts au Koyo. Il est très compatible avec des fruits frais et de la chantilly. Possibilité d'introduire des variations en ajoutant du sel de mer ou des sucres plus spéciaux.\n\n## Ingrédients\n\n- 250g de farine T60\n- 165g de Poudre d'amande\n- 165g de beurre\n- 125g de sucre blanc\n\n## Recette\n\n- Mixer les ingrédients de sorte à obtenir une texture sableuse.\n- Cuire à 180°C pendant 20-30 minutes jusqu'à légère coloration.\n\n## Voir aussi\n\n- *Variation* : Crumble Sésame Noir du Koyo"}, {"id": "Crumble-Sésame-Noir-du-Koyo", "title": "Crumble Sésame Noir du Koyo", "tags": [], "cats": [], "origine": "Koyo", "body": "Une variation récemment introduite pour diversifier les possibilités.\n\n## Ingrédients\n\n- 270g de Farine T60\n- 165g de Poudre d'amande\n- 165g de Beurre\n- 125g de Sucre blanc\n- 100g de pâte de sésame noir sucrée\n- 20g de graines de sésame noir\n- 3 / 4 pincées de sel de guérande\n\n## Recette\n\n- Mixer préalablement le beurre, la pâte de sésame noir avec un peu d'Huile de sésame de sorte à obtenir un tout homogène.\n- Mixer les ingrédients de sorte à obtenir une texture sableuse.\n- Cuire à 180°C pendant 20-30 minutes jusqu'à légère coloration.\n\n## Voir aussi\n\n- *Variation from* : Crumble du Koyo"}, {"id": "Crème-aux-oeufs-mugicha---caramel", "title": "Crème aux oeufs mugicha & caramel", "tags": ["recette/dessert", "recette/sousvide"], "cats": ["dessert", "sousvide"], "origine": "Europe", "body": "Une recette qui permet de fabriquer des crèmes aux oeufs facilement. Elles sont crémeuses et savoureuses, cuites à point. Elles se conservent magnifiquement. C'est un plaisir régressif incroyable.\n## Ingrédients\n\n- **Ingrédient pour la réalisation du caramel**\n- 100 gr de Sucre blanc\n- 40 gr d’eau\n- 30 gr de sirop de glucose (ou Miel ou sirop de riz)\n\n- **Ingrédients pour l’appareil à crème au caramel**\n- 750g de Lait entier\n- 250g de Crème liquide (ces proportions peuvent changer en faveur de plus ou moins de crème mais la texture sera impactée)\n- 3 Oeuf entiers (150 gr)\n- 6 jaunes d’Oeuf (60 gr environ)\n- 100gr de Sucre blanc\n- 1/2 gousse de vanille\n- Une petite poignée d'orge pour Mugicha\n\n## Recette\n\n1. Préparer le caramel en faisant fondre le sucre dans l'eau, puis en faisant brunir suite à l'ajout de sirop de glucose (ou alternative).\n\t1. Quand on atteint la consistance souhaitée, tapisser le fond des bocaux Le Parfait\n2. Préparer l'appareil à crème prise en mélangeant les oeufs (jaune et entier) avec le sucre (sans blanchir) puis verser petit à petit le lait et la crème portés à ébullition qui aura infusé la vanille et le mugicha.\n3. Mélanger vigoureusement puis répartir l'appareil dans les bocaux le parfait.\n4. Cuire au bain marie avec un thermoplongeur pendant 1h30 à 80°C.\n5. Sortir, refroidir dans de l'eau à température ambiante idéalement puis laisser prendre au frais quelques heures avant de consommer.\n\n## Références\n\n@CremeRenversanteAu2018\n@FlanTraditionnelAu2017"}, {"id": "Crème-aux-oeufs-simple", "title": "Crème aux oeufs simple", "tags": [], "cats": [], "origine": "France", "body": "Comme une crème aux oeufs ça devrait toujours être un dessert simple, je l'ai décliné via une recette marmiton. Même si la Crème aux oeufs mugicha & caramel sera probablement meilleure, cette recette aura le mérite d'être plus rapide.\n## Ingrédients\n\n- 8 oeufs entiers\n- 150g sucre\n- 1 litre de lait (ou 750g lait + 250g crème ou combinaison similaire)\n- Aromate :\n\t- Cardamome\n\t- Vanille\n\t- Mugicha\n\n## Recette\n\n1. Faire chauffer le lait (ou mélange lait crème) avec l'aromate\n2. Pendant ce temps mixer les oeufs avec le sucre jusqu'à obtenir un mélange mousseux\n3. Disposer avec ou sans caramel au fond du moule dans un four à 180°C pendant 30 minutes jusqu'à 40-45 en fonction de la profondeur du moule.\n\n## Références\n\n- @marmiton-aufemininCremeAuxOeufs\n\n## Voir aussi\n\n- Crème aux oeufs mugicha & caramel"}, {"id": "Crème-de-tofu", "title": "Crème de tofu", "tags": ["recette/koyo", "recette/vegan", "recette/tapas"], "cats": ["koyo", "tapas", "vegan"], "origine": "Fusion", "body": "Une recette développée au Koyo qui sert de support à des courgettes ou autre légume grillé. Servi avec une sauce vierge la synergie est complète.\n## Ingrédients\n\n- 2 blocs de Tofu soyeux (800g environ)\n- 3g Dashi en poudre de shiitaké ou algue\n- 15g mayu, Rayu ou huile d'Ail, ou negi oil\n- 35g Shoyu\n- 8g Huile de sésame\n\n## Recette\n\n- Passer au blender le tout, compléter et ajuster avec du poivre"}, {"id": "Crème-glacée-au-café-supérieure", "title": "Crème glacée au café supérieure", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "Monde", "body": "# Crème glacée au café supérieure\nCette recette a le goût le plus intense associée avec une texture fondante comme il faut. Le soucis, c'est peut-être la grande quantité de grain que demande cette méthode, et l'impossibilité de les réutiliser directement. A voir cela dit, s'il est possible de les congeler pour une seconde utilisation.\n\n## Ingrédients\n- 360 ml  de Lait de vache\n- 150 g de Sucre roux\n- 120 g de Grains de café\n- 360 g de Crème liquide (c'est mieux mais crème fraîche passe aussi)\n- 5 jaunes d'Oeuf\n- Pincée de sel\n\n## Recette\n1. Faire chauffer doucement le lait, la crème, le sel et les grains de café. Aux premiers frémissements, éteindre le feu et couvrir. Laisser reposer pendant 1 heure ou plus.\n2. Dans un bol à part, mélanger les jaunes d'oeufs avec le sucre sans les aérer.\n3. Réchauffer le mélange de lait et de café doucement, et, lorsqu'il est à frémissement, en verser une petite portion sur les oeufs en battant constamment. Ajouter une nouvelle petite portion une fois la première incorporée, puis ajouter le tout. Mélanger.\n4. Repasser le mélange sur le feu doux et mélanger activement jusqu'à atteindre la consistance d'une Crème anglaise. Retirer du feu.\n5. Filtrer le mélange et presser les grains de café pour extraitre le maximum de saveur laisser le mélange refroidir au frigo.\n6. Turbiner jusqu'à obtenir une crème glacée de grande qualité.\n\n## Alternatives\nL'ajout d'une Sauce Amino pourrait relever le tout. Une sauce soja ou, mieux encore, un Shoyu de café serait du meilleur effet. 10cl ou moins, concentré en lieu et place de la vanille sûrement.\n- [ ] Expérimenter cette alternative #task #personnel\n\n## Références\n- @instagramCoffeeIceCream\n\n## Voir aussi"}, {"id": "Crêpes-express", "title": "Crêpes express", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "France", "body": "## Ingrédients\n- 4 Oeuf (on peut faire fonctionner avec juste 3)\n- 250g de farine (ou mélange 100g maïzena / 150g farine)\n- 50cl de Lait\n- 10cl d'alcool au choix (ou jus de fruit adapté)\n- 20g de Beurre fondu\n- Pincée de sel\n- 10g de Sucre blanc\n\n## Recette\n- Tout passer au blender en mettant les éléments liquides en premier\n- Laisser reposer un minimum de 30 minutes tout de même[^1]\n\n## Références\n- @maincent-morelCuisineReferenceTechniques2021\n\n\n[^1]: On est pas des sauvages"}, {"id": "Dashi", "title": "Dashi", "tags": ["concept/culinaire"], "cats": ["concept"], "origine": "Japon", "body": "Le dashi est un Bouillon japonais qui est au fondement de la culture gastronomique japonaise. Ce bouillon initialement fait à partir de Kombu, shiitaké et Katsuoboshi connait de très nombreuses déclinaisons. Il est souvent intégré aux Ramen et au Tare ainsi qu'aux bases de nimono ou aux oeufs ajitama. Le principe consiste à produire un liquide riche en Umami qui va réhausser l'ensemble des préparations effectuées avec ce dernier.\n## Ingrédients\n\n## Recette\n\n## Références\n\n## Voir aussi\n\n- Bouillons de ramen#^c2b703"}, {"id": "Daube-de-poulpe", "title": "Daube de poulpe", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Provencal", "body": "# Daube de poulpe\n\nUne recette qui dénote bien du sud de la France et qui marque un goût fort, prononcé et agréable. Proche d'une daube classique dans sa déclinaison, le poulpe relâche des composés qui permettent d'assurer un liant dans la sauce. De plus, la présence d'eau de mer dans les tentacules assurent l'assaisonnement parfait du tout sans ajouter beaucoup de complément en sel ou en huile. Un plat léger donc mais fort en goût.\n\n## Ingrédients\n- 0,5L de Vin rouge, en l'occurence, un Château Fontanès Pic Saint-Loup Rouge de 2018\n- Un gros Poulpe\n- Une pincée d'Origan\n- Une princée de Thym\n- Une princée de Sarriette\n- Une pincée de Romarin\n- 3 Oignon doux des Cévènnes\n- Une feuille de Feuille de laurier\n- Deux-trois feuilles de Céleri séché ou frais\n- 3 gousses d'Ail grossièremment hâchées\n- Une demie cuillière de Vinaigre de vin rouge\n- Une demie cuillière de Pissala\n\n## Phases\n- Blanchir le poulpe, rincer et découper en morceaux\n- Faire revenir les oignons découpés en tranche jusqu'à ce qu'ils deviennent translucides\n- Ajouter le poulpe découpé, les herbes de provence et le céleri\n- Ajouter le vin rouge, ajuster de l'eau pour couvrir le tout\n- Porter à ébulition puis réduire le feu et faire mijoter doucement pendant 2-3h\n- Ajouter une demie cuillière de Vinaigre de vin rouge et demie cuillière de Pissala\n- Servir chaud avec du riz\n\n## Références\n[@VeganBrothNoodles]\n\n## Journal de bord\n```dataview\nLIST FROM Daube de poulpe & #experimentation & !#template WHERE econtains(recette, Daube de poulpe)\n```"}, {"id": "Daube-Fruitée", "title": "Daube Fruitée", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Europe", "body": "Cette recette qui aura le mérite d'évoluer avec le temps, a été confectionnée dans le cadre d'un concours organisé avec ma mère pour savoir qui ferait la meilleure daube. Bien qu'elle ne soit pas qualifiée de daube par certains des jurés qui la trouve trop originale, il s'agit bel et bien d'une recette authentique dont certains traits, en l’occurrence les agrumes, ont été exacerbés.\n\nCette recette a connu tellement de petits ajustements, qu'il serait vain d'essayer d'introduire une notion précise des quantités. Et, par ailleurs, comme pour beaucoup de plats mijotés, l'alchimie se fait au fil de la cuisson et se précise au réchauffage. Mais le résultat aura été si iconique de ma cuisine, que j'ai souhaité le consigner.\n\nIl s'agit d'une daube qui inclut des variations japonaises (avec des éléments de Dashi) et des agrumes japonais (notamment le Yuzu). Elle est volontairement portée sur le fruit, sur une sucrosité plus marquée, aux antipodes de ma conception habituelle de la daube : un plat fort, rustique et racé.\n## Ingrédients\n\n- 1kg de joue de boeuf\n- La moitié d'un pied de veau\n- 300g de poitrine fumée\n- 1 bouteille d'un vin nature Clos de la Barthassade Pure C 2022, 100% Cépage Cinsault\n- 2 Shiitake\n- 4 gousses d'Ail\n- 5 Carotte\n- Une orange (zeste et jus)\n- 4 filets d'anchois au sel\n- 6 câpre au sel\n- Un bouquet de Persil\n- 6 olive noire\n- 1 Oignon\n- 4 Clous de girofle\n- Concentré de tomate\n- Herbes de provence : Sarriette, Thym, Romarin, Feuille de laurier\n- Un petit morceau d'algue Kombu\n-  Katsuoboshi\n- Ecorce de Yuzu séché\n- Huile d'olive\n- Poivre noir\n- Sauce poisson (toute petite quantité)\n- Shoyu (toute petite quantité)\n- Aka Miso (toute petite quantité)\n- Mirin (toute petite quantité)\n\n## Recette\n\n1. Confectionner la marinade\n\t1. Détailler les morceaux de joues de boeuf dans la taille désirée, si trop petit risque de délitement, si trop gros risque de sous cuisson\n\t2. Découper les carottes façon rengoku\n\t3. Réunir les herbes de provence, le Kombu, shiitaké, le vin, l'oignon coupé en quatre et piqué des clous de girofle, un trait d'huile d'olive, la sauce poisson ainsi qu'une pincée d'écorce de yuzu. Ajouter la viande et les carottes ainsi que deux gousses d'ail écrasées. Ajouter une pincée de sel et un tour de moulin à poivre.\n\t4. Laisser mariner 12h et jusqu'à 48h au frais.\n2. Sortir la marinade et filtrer l'ensemble. Débarrasser à part les morceaux de boeuf et les sécher soigneusement. Réserver les carottes ainsi que l'oignon et l'ail. Disposer des herbes de provences. Puis porter le vin de la marinade à faible frémissement avec le shiitaké, le kombu et le katsuo. Laisser infuser 5 minutes puis débarrasser.\n3. Prendre le temps de bien marquer la joue de boeuf dans une cocotte en y allant en plusieurs fois si nécessaire, on veut obtenir un fond de casserole bien coloré. Quand les morceaux de boeuf sont bien colorés, les débarrasser.\n4. Une fois la cocotte libérée, faire sauter la poitrine fumée découpée en lardons avec l'ail et l'oignon que l'on aura pris le soin de finement hacher. Après une belle coloration, ajouter le concentré de tomate, déglacer avec un peu de mirin puis ajouter la viande et le vin de la marinade ainsi que le pieds de veau que l'on aura fait blanchir à part.\n5. Ajouter une pincée d'herbes de provence et une pincée d'écorce de yuzu. Porter le tout à faible ébulition puis attendre la réduction d'un tiers.\n6. En attendant préparer la pâte aromatique :\n\t1. Hacher les filets d'anchois ainsi que les capres (rincés pour débarrasser le sel), les deux autres gousses d'ail, le zeste d'une orange et le jus de la même orange, une bonne pincée d'écorce de yuzu, les olives noires et le persil avec un peu d'Huile d'olive. Passer le tout au mortier jusqu'à obtenir une consistance d'une pâte grossière.\n7. Lorsqu'un tiers de la marinade s'est évaporé, ajouter la pâte confectionnée auparavant ainsi que les carottes. Faire mijoter le plus longtemps possible à 90°C.\n8. Faire refroidir la daube et conserver au frais 12h au minimum avant.\n9. Dégraisser et chauffer, ajuster l'assaisonnement avec du miso et de la shoyu. Saupoudrer d'un peu d'écorce de yuzu et servir avec une purée ou des gnocchi ainsi que des légumes glacés dans un jus d'orange.\n\n## Références\n\n@godardCuisineAmour1988\n## Voir aussi\n\n- Daube de poulpe"}, {"id": "Fabrication-du-Douchi", "title": "Fabrication du Douchi", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Chine", "body": "# Fabrication du Douchi\nSelon l'approche @kieferDouchiIntroductionBeverage2020, les temps de Fermentation est moins longs que Katz mais le procédé général est approximativement le même. Le temps de Fermentation navigue autour d'un mois à 38-40°C dans une Saumure qui inclus du vin de riz.\n\nSelon Katz^[voir Douchi & Hamanatto à la page 328 @katzFermentationsLegumesFruits2018] on procède ainsi :\n1. Tremper une nuit les grains de soja\n2. Cuire jusqu'à ce qu'ils soient tendres\n3. Inoculer, une fois refroidis, avec des spores de koji (a. sojae) Le koji-kin (spores). \n4. Incubés jusqu'à sporulation (~72h)\n5. Lavés pour retirer le Koji\n6. Mis à fermenter dans une saumure parfois composée de sucre, de pâte pimantée de 4 à 6 mois\n7. Mis à sécher\n\nSelon la méthode Koji alchemy [voir la méthode pour le \"Sunflower Seed Douchi\" à la page 139 @umanskyKojiAlchemyRediscovering2020] procède avec des graines de tournesol. Ceci étant on peut percevoir des points intéressants : \n1. Le douchi vise une approche portée sur les protéines, il faut donc choisir un substrat en cohérence.\n2. Leur saumure est à 5% de sel, elle doit recouvrir, dans le bocal, l'intégralité des grains incubés et nettoyés.\n3. Leur durée de fermentation est proche de 3 mois à température ambiante.\n\n## Références\n- @umanskyKojiAlchemyRediscovering2020\n- @katzFermentationsLegumesFruits2018\n- @kieferDouchiIntroductionBeverage2020\n\n## Voir aussi\n- Douchi"}, {"id": "Fish-and-Chips", "title": "Fish and Chips", "tags": ["recette/plat"], "cats": ["plat"], "origine": "UK", "body": "Le **fish and chips** (poisson frit dans une pâte à beignet ou une déclinaison proche de la pâte à tempura accompagné de frites) est un plat d'une grande simplicité mais, comme on peut le retrouver au Japon notamment, une maîtrise de chaque élément est nécessaire pour atteindre le paroxysme d'un goût réconfortant.\n## Ingrédients\n\n### Poisson\n\n- Choisir un poisson blanc à chair ferme du style du Cabillaud bien que le Muge ou le Mulet se prête très bien à l'exercice. On choisit environ des filets d'environ 200g par personne.\n\n### Pâte à frire (pour 5-6 personnes)\n\n- 100g de farine T60\n- 35g de maïzena ou fécule de maïs\n- 165g de bière fraîche blonde\n- 5g de levure chimique\n- Une pincée de sel\n\n### Frites\n\n- Environ 400g de pomme de terre (poids net) spécialisées dans la friture\n\n## Recette\n\n### Préparation du poisson\n\n- Immerger les filets dans une saumure à 3% de sel pendant une heure, puis sécher au torchon les filets et les laisser à l'air libre si la température s'y prête sinon au frigo pour sécher complètement.\n- Les fariner et les plonger dans la pâte à frire à l'envoi. Cuire dans un bain d'huile 3 à 5 minutes à une température de 160-170°C.\n\n### Préparation de la pâte\n\n- A la dernière minute, mélanger l'ensemble des ingrédients et passer à la passoire fine ou au tamis pour se débarrasser des grumeaux.\n\n### Préparation des frites\n\n- Voir Frites\n\n### Service\n\n- Servir avec du vinaigre, du citron ou une mayonnaise citronnée au Yuzu Kosho.\n\n## Références\n\n@VeganBrothNoodles\n\n## Voir aussi\n\n- Dans le style friture de poisson succulente : Nanbanzuke de Maquereau qui peut d'ailleurs être décliné avec du Mulet."}, {"id": "Foccacia", "title": "Foccacia", "tags": [], "cats": [], "origine": "Italie", "body": "Une recette dont je suis particulièrement fier qui a émergé pendant le confinement et qui se trouve être tellement utile de façon générale que je devrais l'importer au Koyo. C'est une recette très simple qui prend le temps d'une matinée de Mise en place mais est très réduite en terme de logistique et de temps actif continu.\n## Ingrédients\n\n- 500 g Farine T60\n- 410 g Eau\n- 10 g Levure fraîche de boulanger\n- 12,5 g Sel\n- 10 à 20 g d'aromates\n- Un peu de  temps\n- 10 ml Huile d'olive\n\n## Recette\n\n- Mélangez grossièrement 360g eau (on garde les 50g restants pour plus tard) et la levure fraîche.\n    \n    ![focaccia-2](https://bonobocuisine.com/wp-content/uploads/2020/08/wp-1597926839420-300x240.jpg \"Focaccia Facile 4\")\n    \n- Ajoutez la farine et mélangez jusqu'à obtenir une masse homogène. Point de pétrissage nécessaire!\n    \n    ![focaccia 3](https://bonobocuisine.com/wp-content/uploads/2020/08/wp-1597926839482-300x200.jpg \"Focaccia Facile 5\")\n    \n- Ajoutez les aromatiques, ici du Thym, et mélangez à nouveau. Toujours pas de pétrissage. Laissez reposer 30 minutes.\n    \n    ![focaccia 4](https://bonobocuisine.com/wp-content/uploads/2020/08/20200820103112_IMG_7341-300x200.jpg \"Focaccia Facile 6\")\n    \n- Ajoutez le restant de l'eau (donc 50g) dans laquelle vous aurez dilué le sel et mélangez jusqu'à ce que l'eau soit bien incorporée. Attention, on ne pétrit pas. Laissez reposer entre 15 et 30 minutes. Globalement s'il fait plus de 25°C chez vous, comptez plutôt 15 minutes, en dessous plutôt 30 minutes, la levure de boulanger s'active très vite, parfois trop, d'où cette variation.\n    \n    ![focaccia 5](https://bonobocuisine.com/wp-content/uploads/2020/08/wp-1597926839592-300x200.jpg \"Focaccia Facile 7\")\n    \n- La partie \"technique\" commence ici, et ça reste simple vous allez voir. Je vous montre ici un extrait sous la forme d'un gif mais vous pouvez trouver les [vidéos intégrales](https://bonobocuisine.com/focaccia-facile#focacciavideo). Concrètement, on humidifie bien ses doigts pour éviter que la pâte n'adhère trop à vos mains (ça va coller un peu, mais raisonnablement), on pince la pâte, on tire un peu vers le haut sans la casser et on la ramène au centre. Une fois que c'est fait, on effectue un quart de tour et on reproduit l'action 3 fois, afin de faire un tour complet, en se mouillant les doigts entre chaque pli.\n    \n    ![focaccia 14](https://bonobocuisine.com/wp-content/uploads/2020/08/Animated-GIF-downsized_large4-300x225.gif \"Focaccia Facile 8\")\n    \n- On va faire 4 à 5 sessions de pliage qu'on espace de 15 à 30 minutes selon la température ambiante. L'objectif est de partir d'un ensemble TRÈS liquide pour arriver à un final qui se tient et qui laisse apparaître des bulles qui seront le fondement d'une jolie focaccia!\n    \n#### Le repos au frais\n\n- Une fois la focaccia pliée au moins 4 fois, on peut la laisser reposer au frais pendant un minimum de 6h jusqu'à 48h bien que je recommanderais dans l'idéal 12h, soit le temps qu'elle dorme bien.\n    \n    ![focaccia 16](https://bonobocuisine.com/wp-content/uploads/2020/08/20200821123454_IMG_7363-300x200.jpg \"Focaccia Facile 9\")\n    \n\n#### La cuisson de la focaccia\n\n- Sortir la pâte du frigo et la transférer depuis le saladier vers un moule à gratin rectangulaire très généreusement huilé, l'idéal bien que peu écologique, est d'ajouter une feuille de papier cuisson huilée entre le plat/moule et la pâte, je trouve que ça donne de meilleurs résultats. Laissez-la à température ambiante, la pâte est tellement humide qu'elle ne croûtera pas au contact de l'air, mais si vous avez peur des petites bêtes, un torchon humide fera l'affaire.\n    \n    ![focaccia 17](https://bonobocuisine.com/wp-content/uploads/2020/08/20200821123236_IMG_7358-300x200.jpg \"Focaccia Facile 10\")\n    \n- Préchauffez votre four à 250°C et laissez le chauffer une bonne demie-heure et jusqu'à une heure (au delà l'intérêt me paraît assez faible, l'idée est surtout d'avoir un four très chaud).\n    \n    ![focaccia 18](https://bonobocuisine.com/wp-content/uploads/2020/08/20200821123714_IMG_7367-300x200.jpg \"Focaccia Facile 11\")\n    \n- Avant d'enfourner la focaccia arrosez d'Huile d'olive généreusement.\n    \n    ![focaccia 12](https://bonobocuisine.com/wp-content/uploads/2020/08/Animated-GIF-downsized_large-300x225.gif \"Focaccia Facile 12\")\n    \n- Répartissez l'huile à la main en glissant cette dernière sur la surface.\n    \n    ![focaccia 13](https://bonobocuisine.com/wp-content/uploads/2020/08/Animated-GIF-downsized_large3-300x225.gif \"Focaccia Facile 13\")\n    \n- Formez des petits trous en appuyant du bout des doigts.\n    \n    ![focaccia 15](https://bonobocuisine.com/wp-content/uploads/2020/08/Animated-GIF-downsized_large5-300x225.gif \"Focaccia Facile 14\")\n    \n- Laissez cuire pendant 20 à 40 minutes (là, ça dépend vraiment des fours) jusqu'à ce que le dessus soit bien croustillant et qu'une lame de couteau ressorte nette de la focaccia.\n    \n    ![focaccia 19](https://bonobocuisine.com/wp-content/uploads/2020/08/20200821141440_IMG_7393-300x200.jpg \"Focaccia Facile 15\")\n    \n- N'attendez pas pour la sortir du moule et la déposer sur une grille ou tout autre élément qui permet au dessous de la focaccia de sécher.\n    \n- Dégustez quand vous voulez même si c'est meilleur après une petite heure de repos, à vous de voir!\n    \n    ![focaccia 20](https://bonobocuisine.com/wp-content/uploads/2020/08/20200821141846_IMG_7411-300x300.jpg \"Focaccia Facile 16\")\n## Références\n\n- @FocacciaFacileBonobo2020\n\n## Voir aussi\n\n- 9921 Foccacia de Kasuzuke à l'aubergine"}, {"id": "Frites-lactofermentees", "title": "Frites lactofermentees", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "", "body": "---\ntype: Fermentation\norigine: fusion\n---\n\n## Ingrédients\n- 20cl de Saumure de betteraves fermentées\n- 1l de Saumure à 3%\n- 900g de Pomme de terre Charlotte coupées en bâtonnets\n\n## Phases\n1. Préparer la saumure et mélanger avec la saumure de betteraves fermentées\n2. Ajouter dans le pot nettoyé les pommes de terre découpées en bâtonnets\n3. Laisser fermenter au moins 12h et plus si affinité.\n\n## Journal de bord\n```dataview\nLIST FROM Frites lactofermentees & #experimentation & !#template\n```\n\n## Voir aussi\nLactofermentation"}, {"id": "Furikake", "title": "Furikake", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "Japon", "body": "# Furikake\nLe Furikake est un condiment japonais qui accompagne fort bien le riz, les oeufs, les soupes et autre encore. Il s'agit du reste solide de Mentsuyu ou de Dashi, qui sont séchés et conservés.\n\n## Ingrédients\n- 15g de Kombu\n- 30g Katsuoboshi\n- 5g de Sucre roux\n- 12g Graines de sésame toastées\n- un petit morceau Nori\n- 5ml Sauce soja (dans le cas où le kombu et katsuoboshi ne viendrait pas d'un Mentsuyu)\n- 1g de sel\n\n## Recette\n1. Réunir le Katsuoboshi et le Kombu découpé en petits morceaux et cuire dans une poêle\n\t1. Une fois que le tout commence à sécher, ajouter de la sauce soja si le kombu et le katsuoboshi ne viennent pas d'un Mentsuyu.\n2. Ajouter le sucre et le sel mélanger, continuer de cuire jusqu'à ce que le katsuoboshi soit bien croquant.\n3. Etaler dans un plat et ajouter les nori ou les graines de sésame toastées selon les envies.\n4. Le tout peut se conserver deux semaines au frigo (je pense plus personnellement) et 1 mois au congélateur.\n\n## Références\n[@chenTsukemonoMisozukeMiso2019]\n\n## Voir aussi\n- Mentsuyu\n\n## Recettes\n\n```dataview\nLIST FROM Furikake & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Furikake  & #experimentation & !#template\n```"}, {"id": "Garum-moderne", "title": "Garum moderne", "tags": ["fermentation/amino", "recette/fermentation"], "cats": ["fermentation"], "origine": "Rome antique", "body": "Il est difficile d'établir une recette de garum moderne sur la seule base de ce que le Noma peut apporter. Nous disposons à ce stade plus d'une méthodologie culinaire qui reprend le principe de fabrication du garum (voir Garum traditionnel) sans s'en rapprocher véritablement. On pourrait qualifier ce garum moderne de Sauce Amino comme l'entendent finalement Umansky et Shih dans leur livre \"Koji Alchemy: Rediscovering the Magic of Mold-Based Fermentation\" de Jeremy Umansky, Rich Shih en 2019(voir @umanskyKojiAlchemyRediscovering2020)\n\n## Les ingrédients\n- Une source de protéines animales peu riches en graisses (pour éviter que cette dernière ne tourne)\n- Une source d'Enzymes : on choisira plus souvent le Koji mais les protéases de cochon ou issues d'ananas pourraient tout aussi bien fonctionner. L'avantage du koji provient de la diversité des enzymes qui permettent de décomposer les graisses et les amidons pour apporter des arômes plus complexes.\n- Une source de sel : on se contentera de sel de mer ou de montagne, en bonne quantité, de 12 à 25% du poids en poissons ou en protéine.\n\n## La méthodologie\n1. Mélanger les protéines avec le sel, le koji et de l'eau\n2. Filmer le mélange et le maintenir à 60°C pendant 2 à 3 mois voire 4 mois selon le type de protéine en remuant de temps à autres\n3. Filtrer, mixer et conserver indéfiniment au frais.\n\n## Références littéraires\n\n@redzepiGuideFermentationNoma2018\n## Voir aussi\nGarum\nKoji\nSauce Amino\n## Recettes\n```dataview\nLIST FROM Garum moderne & !#experimentation & !#template & !#ouvrage & #recette \n```\n## Expérimentation\n```dataview\nLIST FROM Garum moderne  & #experimentation & !#template\n```"}, {"id": "Garum-traditionnel", "title": "Garum traditionnel", "tags": ["fermentation/amino", "recette/fermentation"], "cats": ["fermentation"], "origine": "Rome antique", "body": "Il s'agit ici de la recette traditionnelle qui représente une synthèse de ce qui a été observé dans les différentes sources (voir les références) et qui reprend le principe le plus élémentaire du Garum. A noter qu'il existait déjà dans l'antiquité de très nombreuses recettes différentes.\n\n## Ingrédients\n- 1 kg de poissons (maquereaux, chinchards, rougets barbets, anchois) frais (voir La criée de Palavas)\n- 250g de sel\n\n## Procédé\n1. Sans nettoyer, ni vider les poissons, les mélanger avec le sel et laisser reposer une nuit.\n2. Les tasser dans un récipient et laisser au soleil couvert d'une étamine.\n3. Remuer régulièrement et laisser exposé pendant 2 à 3 mois.\n4. Au terme de ce temps, filtrer et utiliser.\n5. Il est possible de prolonger la fermentation en rajoutant, après filtrage, une Saumure à 25% et en laissant la fermentation reprendre pendant 2 à 3 mois.\n\n## Références\nGarum\n@interCommentFaireGarum2020\n@grimalVeritableNatureGarum1952\n\n## Recettes\n```dataview\nLIST FROM Garum traditionnel & !#experimentation & !#template & !#ouvrage & #recette \n```\n## Expérimentation\n```dataview\nLIST FROM Garum traditionnel  & #experimentation & !#template\n```"}, {"id": "Gaude-Nouilles", "title": "Gaude Nouilles", "tags": [], "cats": [], "origine": "Japon", "body": "# Gaude Nouilles\n\nUne variation d'une recette sans oeuf des nouilles à ramen inspirée par la recette d'Amano (voir [@amanoRamenCuisineJaponaise2022]) qui substitue la farine complète par de la farine de gaude. Son aspect skinny est ici relativement volontaire.\n\n## Ingrédients\n- 190g d'eau (idéalement 175g d'eau serait meilleurs)\n- 475g de farine T60 (base)\n- 25g de Farine de Gaude\n- 5g de sel\n- 25g de kansui\n\n> [!Important] Pour ces quantités on obtient environs 5 à 6 portions\n\n### Tableau des %\n\n| Ingrédient                                          | %           |\n| --------------------------------------------------- | ----------- |\n| Farine totale (farine de base et farine de gaude)   | 100%        |\n| *Farine de gaude (par rapport à la farine de base)* | *5%*        |\n| Sel                                                 | 1%          |\n| Eau                                                 | 35 à 38% |\n| Kansui                                              | 5%          |\n\n>[!INFO] Le taux d'hydratation de cette pâte avoisine 43% dans le cas d'une quantité d'eau à 190g (déclinaison originelle) et 40% dans le cas d'une quantité d'eau à 175g (adaptation après-coup)\n\n## Recette\n1. Mélanger les farines d'une part, et le reste des ingrédients d'autre part (kansui, sel, eau)\n2. Ajouter le mélange liquide aux farines petit à petit, en formant des grumeaux.\n3. Quand l'eau commence à être intégré et que l'on obtient pas encore une pâte cohérente mais un ensemble grumeuleux, laisser reposer 30 à 60 minutes.\n4. Former une boule et diviser en nombre de portions souhaitée et abaisser progressivement en repliant régulièrement la pâte sur elle même.\n\t1. *A noter qu'une abaisse jusqu'au niveau 7 sur la machine a donné des ultra skinny noodle*\n\n## Références\n- Directement inspiré de la recette de [@amanoRamenCuisineJaponaise2022]\n\n## Voir aussi\n- Skinny Nouilles du Koyo\n- Master Nouilles du Koyo"}, {"id": "Glace-Fior-di-latte", "title": "Glace Fior di latte", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "Italie", "body": "Une recette de glace légère (ou plutôt *gelato*) italienne qui peut servir de bac à sable pour ajouter des saveurs qui sauront bien se marier avec la rondeur et la fraîcheur du lait de vache. A noter que dans les recettes comme celles-ci qui comptent peu d'ingrédients, la qualité finale revient à la maîtrise du processus, certes, mais surtout à la qualité des ingrédients. Il est nécessaire d'utiliser un lait et une crème de qualité pour faire ressortir les meilleures saveurs.\n## Ingrédients\n\n- 350g lait de vache\n- 250g crème liquide (30% ou plus)\n- 110g de sucre blanc (vraiment privilégier le sucre blanc plus neutre en goût)\n- *Variation Straciatella*\n\t- 50g de chocolat noir patissier\n\n## Recette\n\n1. Faire chauffer le lait, la crème et le sucre ensemble pendant 5 minutes à feu très doux. Puis réserver au frais 12h.\n2. Lancer la turbine avec le mélange et attendre qu'une texture légère se développe.\n3. *Si variante Straciatella*\n\t1. Faire fondre au bain marie le chocolat\n\t2. Avec une cuillère verser en filet le chocolat dans la glace (quand elle est sur le point d'être terminée)\n4. Servir immédiatement ou réserver au congel\n\n## Références\n\n- @navaFiorDiLatte2021\n\n## Voir aussi\n\n- Crème glacée au café supérieure"}, {"id": "Goma-Dare", "title": "Goma Dare", "tags": [], "cats": [], "origine": "Japon", "body": "Une sauce japonaise que j'ai appris à aimer au Koyo pour accompagner toutes sortes de recettes (principalement des salades cela dit mais ça fonctionne en dip pour un Shabu Shabu ou sur du tofu froid). Il ne s'agit pas de la version du Koyo car les grammages ne sont pas spécifiés dans cette dernière. Par ailleurs la version du Koyo intègre de la mayonnaise ce que j'ai préféré éviter en prenant inspiration de la recette @chenHowMakeSesame2024 .\n## Ingrédients\n\n- 80g de pâte de sésame (ou tahini)\n- 30g dashi (sous forme liquide donc 30g eau + dashi en poudre)\n- 20g vinaigre de riz\n- 15g de shoyu\n- 15g de sucre (possibilité de réduire à 10g)\n- 10g d'acidité complémentaire : jus de citron (si c'est le cas réduire le sucre) ou vinaigre blanc\n- 3g huile de sésame torréfiée\n- QS sel\n\n## Recette\n\n- Mélanger les ingrédients liquides avec le sucre et le sel\n- Ajouter la pâte de sésame\n- Ajouter l'huile de sésame torréfiée\n- Ajustez l’assaisonnent \n\n## Références\n\n- @chenHowMakeSesame2024\n\n## Voir aussi\n\n- Les sauces mères du Koyo"}, {"id": "Gomasio", "title": "Gomasio", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "Japon", "body": "# Gomasio\nCélèbre condiment japonais aisé à reproduire à la maison, il apporte une touche torréfiée à de nombreux plats, c'est un joker discret à utiliser généreusement. \n\n> [!INFO] Étymologiquement, goma veut dire sésame et shio veut dire sel en japonais.\n\n## Ingrédients\n- 15 part Graines de sésame\n- 1 part sel\n\n>[!HELP] Soit pour 1g de sel, 15g de sésame*\n\n## Recette\n1. Torréfier les graines de sésame jusqu'à ce qu'elles blondissent\n2. Les mixer ensuite au mortier (si t'es un.e vrai.e) ou au blender\n3. Déguster\n\n## Recettes l'utilisant\n```dataview\nLIST FROM Gomasio & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Expérimentation l'utilisant\n```dataview\nLIST FROM Gomasio  & #experimentation & !#template\n```"}, {"id": "Gyoza-kimchi-ail-des-ours-et-chataignes", "title": "Gyoza kimchi ail des ours et chataignes", "tags": [], "cats": [], "origine": "Fusion", "body": "La recette des gyozas, je dois l'inscrire au registre du site depuis des années je pense. Si les raviolis occupent une place toute particulière dans mon coeur, c'est sur les gyozas que j'ai forgé L'amour du geste repété, la fatigue aussi et ressentir le poids des erreurs. C'est aussi avec les gyozas que j'ai compris que j'avais réellement progressé en cuisine car j'étais capable d'envoyer de modestes fournées en peu de temps. C'est donc une recette iconique de ma transition professionnelle vers la cuisine.\n\nNéanmoins c'est au Maquis, une fois encore, avec le concours d'Agathe que nous avons formalisé une recette coquine à souhait, généreuse, amplement fermentée et puissante. Le concours de circonstance donc qui m'amène à mobiliser des pots d'Ail des ours façon pesto kimchi un peu loupé dans une farce surprenante mais équilibrée. L'intuition était donc bonne : farce de porc à laquelle on ajoute ces pots, et on obtient une farce express.\n\nRuben passant par là, pose les chataignons dans une casserolle, les arrose de beurre et 40 minutes plus tard je pense qu'avec Agathe nous tenons les meilleurs gyozas que j'ai pu préparer jusqu'à présent.\n\nJe dis cela parce que j'ai oublié le gout de ceux que nous faisions au Koyo au Poulet avec une proportion réfléchie de chaque partie du poulet. C'était quand meme quelque chose, m
