ais je ne crois pas etre autorisé à divulguer la recette. Vous devrez faire avec ceux ci, qui sont une version très spécifique.\n\nJ'imagine qu'il serait permis de remplacer le kimchi d'ail des ours par une autre sorte de pesto, ou meme du kimchi mixé finement avec de l'huile ? A vous d'essayer et de créer votre propre recette.\n## Ingrédients\n\n- 1kg chair à saucisse\n- 500g de kimchi d'ail des ours façon pesto\n- 250g de chataignons ou de chataignes cuites\n- 100 feuilles de gyoza environs\n\n## Recette\n\n- Mélanger la chair à saucisse avec le kimchi ail des ours ainsi que les chataignon cassés à la main en de petits bouts qu'on aura fait cuire une 40aine de minute dans de l'eau avec une bonne quantité de beurre.\n- La farce est prete il ne manque plus qu'à rouler les gyozas, pour se faire déposer une cuillière de 15g de farce au centre environ, puis roulez la farce par dessus. Vous pouvez réaliser des plis plus complexes mais ici, on a une petite cuisine et on doit aller vite alors le pli basique fera le pli.\n- Dans une poele chaude qu'on aura enduit d'huile neutre, ajoutez les gyozas de sorte qu'ils ne se collent pas trop, verser un peu d'eau puis couvrir. Quand l'eau est majoritairement absorbée, relever le couvercle et finir la cuisson.\n- Servir avec une vinaigrette basique ou un chili crisp des familles et de la ciboule hachée finement\n\n## Références\n\n- Koyo\n\n## Voir aussi\n\n- Gyozas de poulet"}, {"id": "Gyozas-de-poulet", "title": "Gyozas de poulet", "tags": ["recette/koyo", "recette/plat", "recette/tapas"], "cats": ["koyo", "plat", "tapas"], "origine": "Japonais", "body": "Les raviolis japonais mi-frits mi-cuits à la vapeur, qui se distinguent par leur croustillance. Savoureux et satisfaisants, on peut en manger sans s'arrêter. Ce sont des best-seller du Koyo\n\n## Ingrédients\n- Une farce de Tsukune du Koyo\n- 1 chou chinois\n- Huile de sésame\n- Sauce huître\n- 100 feuilles de gyozas\n\n## Recette\n1. Ajouter le chou chinois émincé et pressé au mélange à tsukune.\n6. Ajouter (à l’œil) l'huile de sésame et la sauce huître de sorte à obtenir une farce qui tire sur le jaune très léger (coloration due à l'ajout des sauces), qui sent le sésame (légèrement, il ne faut pas en ajouter trop à la fois) et la sauce huître.\n7. Déposer un morceau de farce dans une pâte à gyoza disposée pour l'occasion et rouler, plier, fermer le ravioli comme bon vous semble. Inutile d'ajouter de l'eau pour verrouiller le ravioli car la farce est suffisamment humide et la cuisson colmatera le tout.\n8. Déposer une poêle chaude couverte légèrement d'huile, faire revenir 30 secondes puis ajouter de l'eau de sorte à couvrir le fond de la poêle sans noyer les gyozas puis cuire 5 minutes avec un couvercle. Retirer le couvercle et laisser caraméliser pendant encore 3 à 4 minutes.\n9. Servir avec une Sauce Gyoza Koyo.\n\n## Voir aussi\n- Tsukune du Koyo\n```dataview\nLIST FROM Sans titre & #experimentation & !#template\n```"}, {"id": "Gâteau-Chocolat-Mascarpone", "title": "Gâteau Chocolat Mascarpone", "tags": [], "cats": [], "origine": "Italie", "body": "Un dessert à la texture incroyable et qui, par sa simplicité, convoque des saveurs élémentaires mais très efficaces et pertinentes. C'est moelleux, c'est doux, c'est généreux et c'est surtout très simple à faire.\n## Ingrédients\n\n- 200g Chocolat pâtissier\n- 250g Mascarpone\n- 4  oeufs moyens (à température ambiante)\n- 35g Sucre blanc\n- 20g Sucre rapadura ou sucre complet\n- 0,5 cc sel\n- 10g Amaretto\n- 35g Farine T60\n- Cacao amer pour le décor\n\n## Recette\n\n- Préchauffer le four à 150° chaleur traditionnelle. Graisser un moule rond de 20cm à charnière et chemiser le fond de papier cuisson.\n- Couper le chocolat en morceaux et faire fondre au bain-marie ou micro-ondes.\n- Dans un récipient, détendre le mascarpone au fouet/batteur.\n- Verser le chocolat fondu dans le mascarpone puis fouetter pour homogénéiser.\n- Dans un autre récipient, battre les oeufs avec les deux sucres, le sel et la vanille jusqu&amp;#39;à obtenir un mélange pâle et mousseux (4 min. environ), au batteur c&amp;#39;est plus facile.\n- Incorporer le mélange chocolat/mascarpone puis battre à nouveau.\n- Terminer en ajoutant la farine tamisée. Mélanger juste ce qu&amp;#39;il faut pour ne plus voir la farine, sans plus.\n- Verser la pâte dans le moule. Enfourner pour 25-28 minutes (cela varie selon les fours). Le centre doit rester tremblotant pour avoir une texture fondante à la dégustation. Saupoudrer de cacao amer avant de déguster.\n\n\n## Références\n\n- @bakeryGateauChocolatMascarpone2023\n\n## Voir aussi\n\n- Miso Chocolate Fudge dont les ingrédients pourraient inspirer une variation sur la recette (aka ajouter du miso)"}, {"id": "Gâteau-toscan-de-la-madre", "title": "Gâteau toscan de la madre", "tags": [], "cats": [], "origine": "Italie", "body": "Un gâteau toscan à base de pignon et de pomme qui est un classique de la cuisine de la madré. Il se décline facilement sous la forme de Cake. Sa base est d'ailleurs fortement similaire.\n## Ingrédients\n\n- 125g sucre blanc\n- 125g Beurre\n- 125g Farine T60\n- 5g Levure chimique\n- Zeste de citron\n- Pignon de pin\n- 4-5 pommes\n- 3 oeufs\n\n### Variante\n\n- 110g sucre blanc\n- 125g Beurre\n- 100g chocolat noir\n- 125g Farine T60\n- 10g cacao en poudre\n- 5g Levure chimique\n- 3 oeufs\n\n## Recette\n\n1. Mixer fortement les oeufs avec le sucre jusqu'à obtenir un mélange aérien\n2. Incorporer la farine puis le beurre fondu sans trop mélanger\n3. Ajouter les pignons ainsi que le zeste de citron\n4. Enfin ajouter les pommes coupées en gros quartiers\n5. Déposer dans un plat allant au four et ajouter sur le dessus quelques pignons de pin supplémentaires\n6. Cuire à 180°C pendant 30 minutes\n\n## Voir aussi\n\nRecettes de la madre\nToscano"}, {"id": "Hambagu", "title": "Hambagu", "tags": [], "cats": [], "origine": "Japon", "body": "Une recette fort surprenante, simple mais efficace et qui pétille en bouche, rappelant des souvenirs métisses.\n## Ingrédients\n\n- 1 Oignon\n- 340 g de bœuf haché (bien qu'une combinaison porc / bœuf soit tout à fait recommandée aussi)\n- Poivre et Sel\n- Noix de muscade\n- 20 g Panko\n- 30ml Lait\n- 2 petites prunes Umeboshi hachées\n- 1 Oeuf\n- 45ml de Vin rouge pour la cuisson\n\n## Recette\n\n1. Faire revenir les oignons après les avoir hachés finement.\n2. Mélanger les oignons, la viande et le reste des ingrédients puis proportionner en part égales.\n3. Laisser reposer au frais à minima 30 minutes\n4. Cuire à feu fort, en pressant au milieu avec le pouce pour uniformiser le développement du steak.\n5. Retourner et colorer de l'autre côté. Puis ajouter le vin rouge, mettre un couvercle et terminer la cuisson comme ça.\n6. Utiliser le fond de poêle pour déglacer et faire la sauce.\n\n## Références\n\n- @namiJapaneseHamburgerSteak2020\n\n## Voir aussi\n\n- Sauce Ume Hambagu\n\n## Notes complémentaires\n\nUne variation suivant la logique de Koji Alchemy (voir @umanskyKojiAlchemyRediscovering2020) incluant un temps de repos allongé avec de l'Amazaké pour remplacer le lait pour être très intéressant."}, {"id": "Haricots-borlotti-à-la-saumure-de-betterave", "title": "Haricots borlotti à la saumure de betterave", "tags": ["recette/plat"], "cats": ["plat"], "origine": "France", "body": "# Recette de haricots borlotti à la saumure de betterave\n\n- 300g de Haricots borlotti frais\n- 250g de Saumure de betterave fermentée\n- 1 Tomate\n- 1 Feuille de laurier\n- 1 branche de Sarriette\n- 3 feuille de Sauge\n\n1. Couvrir les haricots avec la saumure et ajouter de l'eau si nécessaire pour couvrir généreusement. \n2. Cuire à feu doux pendant 1h ou jusqu'à ce que les haricots soient tendres et que l'eau de cuisson ait réduit. S'il manque de l'eau au cours de la cuisson ne pas hésiter à en rajouter.\n3. Découper une tomate en petits cubes et l'ajouter aux haricots retirés du feu encore chaud.\n4. Laisser refroidir ou déguster immédiatement avec du riz et des légumes complémentaires.\n\n## Voir aussi\n- Fermentation\n\n## Références\n[@mlkcuisineCommentCuisinerLegumes2021]"}, {"id": "Jiuniang", "title": "Jiuniang", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Chine", "body": "# Jiuniang\nIl s'agit d'une boisson / porridge de riz fermenté, naturellement sucré et peu alcoolisé, à la base de nombreuses autre recette. En utilisant le Tianjiuqu, le Jiuniang se différencie de l'Amazaké par sa plus grande diversité bactérienne et fungique. On ne connaît pas la composition exacte mais on sait que du Rhizopus est présent également.\n\n### Ingrédients\n- Riz gluant 500g (ou une autre céréale, mais le meilleur pour moi reste vraiment le riz)\n- Tianjiuqu 4g\n- Eau 600ml\n\n### Méthode\n1. Laver le riz jusqu’à ce que l’eau soit claire et faire tremper 3-6h.\n3. Cuire le riz à la vapeur 30 à 40 minutes pour une cuisson al-dente\n4. Etaler le riz pour qu’il refroidisse en dessous de 30°C et mettre dans un plat à gratin\n5. Réduire le tianjiu qu en poudre, saupoudrer sur le riz et mélanger.\n6. Faire un trou au centre du plat dans le riz et y verser 200ml d’eau.\n7. Laisser fermenter dans un incubateur humide pendant 36 – 72h à 25 – 30°C\n10. Quand le trou est rempli d’eau et qu’il se dégage une douce odeur sucrée, la fermentation est terminée.\n11. Conserver au frigo ou utiliser pour faire les Jiuniang bing\nTu peux manger la préparation à ce stade, mais l’étape suivante permet de faire s’activer les levures un peu plus pour qu’elles produisent un peu d’alcool, mais surtout des bulles pour aérer nos crêpes.\n1. Mettre le riz fermenté dans un grand bol et rajouter 850ml d’eau\n2. Couvrir et laisser fermenter 24h\n3. Stocker au frais\n4. Boire/manger la boisson telle quelle ou en faire des jiuniang bing\n5. \n\n# Recipe of Jiuniang (from @ferment_nation (IG))\n\n## Ingredients\n- 500g Glutinous rice\n- 4g Tianjiu-qu or any other starter / leavan (Tape starter works well and in some regards classical Qu do work well too from my experience)\n- 1 L of water\n\n## Steps\n1. Wash the rice and let it soak up during a night (or from 3 to 6 hours)\n2. Steam cook the rice for about 30 minutes or until *al-dente*\n3. Spread the rice and allow it to cool below 30°C\n4. Put the cooled rice into a large and square shape dish\n5. Make a powder out of the Tianjiuqu, spread it on the rice and then mix it up with 200ml of water\n6. Flatten the rice and make a hole in the middle\n7. Let it ferment for about 36 to 72 hours at a temp of 25 to 30°C\n8. When water appears in the hole and a sweet smell emanates from the rice, it's ready. Taste it, it should be sugary as fudge and very good.\n9. **If you want to make it drinkable** : Mix the rice with 800ml of water or more (you know the main idea, more water = less sugar and all) and let it ferment at room temp between 24 to 48h.\n10. When done the secondary fermentation you can strain and either let it go alcoholic pursuing a fermentation with the wild yeast, or put it in the fridge for a slow carbonation that will preserve the sugars.\n11. I did put hops in it and then to the fridge, it is fantastical\n\ntags: #fermentation/qu #recette/fermentation\n\n# Référence\nLien vers la note originale : @sebastienderoanyInstructionsTianjiuquFuruqu2021\n\n# Journal de bord\n```dataview\nLIST FROM Jiuniang & #experimentation\n```\n\n# Recettes\n\n```dataview\nLIST FROM Jiuniang & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n# Experimentation\n```dataview\nLIST FROM Jiuniang  & #experimentation & !#template\n```"}, {"id": "Jiuniang-bing", "title": "Jiuniang bing", "tags": ["fermentation", "recette/vegan"], "cats": ["fermentation", "vegan"], "origine": "Chine", "body": "# Jiuniang bing\nRecette jiuniang bing (crêpes de riz naturellement sucrées, complètement vegan et très faciles à fabriquer.\n\n## Ingrédients\n- 200g Riz blanc\n- 200g Jiuniang\n\n## Méthode\n\n1. Faire tremper le riz 2h\n2. Egoutter le riz et le mixer avec la jiuniang pour obtenir une texture de pâte à crêpe\n3. Laisser fermenter 24h couvert (ou moins, je suis arrivé à 12h personnellement, voir 13821 Jiuniang bing improvisé) dans un endroit chaud, jusqu’à ce que ça fasse plein de bulles quand on mélange\n4. Faire chauffer une poêle à feu moyen, la graisser\n5. Verser des louches pour faire des crèpes d’une dizaine de cm de diamètres puis couvrir\n6. Retourner les crêpes les unes sur les autres et les déguster chaudes\n\n## Voir aussi\n- @sebastienderoanyJiuniangMifanBing2021 pour une jolie photo d'un résultat fini abouti\n- 13821 Jiuniang bing improvisé pour un exemple un peu raté\n\n## Journal de bord\n```dataview\nLIST FROM Jiuniang bing & #experimentation WHERE econtains(recette, Jiuniang bing)\n```\n\n\nLien vers la note originale : @sebastienderoanyInstructionsTianjiuquFuruqu2021"}, {"id": "Kani-no-Korokke", "title": "Kani no Korokke", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "Japon", "body": "Une croquette (korokke) japonaise de la mer dont l'origine remonte à Hokkaido mais qui semblerait être une fusion étrange de croquetas et d'une croquette classique. Très bon servi avec du yuzu kosho.\n## Ingrédients\n\n- 1,5l de lait\n- 200g beurre\n- 200g Farine T60\n- 200g oignon\n- 200g carotte\n- 200g maïs\n- 450g chair de crabe\n- 400g surimi\n- Zeste d'un citron\n- Qs sel et poivre\n## Recette\n\n1. Faire revenir l'oignon et la carotte coupé fin et ajouter le beurre quand ils sont cuits. Quand le beurre est fondu rajouter la farine.\n2. Quand le roux est bien cuit mais pas trop coloré, ajouter le lait bien froid puis faire épaissir le temps nécessaire.\n3. Assaisonner et ajouter les poissons ainsi que le zeste d'un citron.\n4. Refroidir puis portionner puis refroidir puis paner puis refroidir puis cuire à 180°C en friture.\n## Voir aussi\n- Koyo"}, {"id": "Kara-Age-façon-Koyo-Fried-Chicken", "title": "Kara Age façon Koyo Fried Chicken", "tags": ["recette/koyo", "recette/plat", "recette/tapas"], "cats": ["koyo", "plat", "tapas"], "origine": "Japon", "body": "# Koyo Fried Chicken\n\n## Ingrédients\n- Hauts de cuisse de poulet (les cuisses fonctionnent aussi)\n- Ail\n- Gingembre\n- Shoyu ou Sauce soja usukuchi si possible\n- Huile de sésame\n- Sichimi\n- Poivre noir\n- Fécule de pomme de terre\n- Eau\n\n## Recette\n\n1. Détailler les hauts de cuisse en bonnes bouchées après avoir retiré les peaux et les os.\n2. Hacher fin l'ail et le gingembre, ajuster en fonction de la quantité de poulet. L'idée est de parfumer le poulet sans le subjuguer pour autant.\n3. Ajouter l'huile de sésame et la sauce soja de sorte à ce que ces derniers imbibent le poulet sans le noyer dans la sauce.\n4. Ajouter enfin selon les envies de piquance le poivre noir et le sichimi.\n5. Préparer une huile de friture à 180°C / 190°C\n6. Préparer la panure en ajoutant de l'eau à la fécule et en remuant de sorte à créer des billes ou boules de taille moyenne. Il faut qu'à la friture cela permette au poulet de prendre du volume dans l'assiette.\n7. Sortir les morceaux de poulet de la marinade (un repos minimal d'une heure est souhaitable, plus c'est encore mieux) et les plonger dans la fécule pour les enrober.\n8. Procéder à deux cuissons, la première vise à cuire le poulet et la seconde à confirmer et apporter la croustillance nécessaire.\n9. Servir chaud avec de la mayonnaise ou de la Sauce Oni\n\n## Voir aussi\n- Koyo\n- Take Age"}, {"id": "Kasuzuke", "title": "Kasuzuke", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "", "body": "Le kasuzuke est un lit fabriqué principalement à partir de lie de Saké rustique pour faire mariner et fermenter légumes ainsi que protéines animales à la façon d'un Tsukemono.\n## Méthode de production\nPour fabriquer un kasuzuke il faut initialement des lies de sakés, du sel et éventuellement des aromates complémentaires.\n\n> [!NOTE] Selon la recette de Jessica Alonzo (voir [@yellowfarmhouseeducationcenterPicklesTsukemono]) on utilise agrémente ainsi le sakekasu des éléments suivants : 10% de sel  et 30% de sucre. On laisse reposer une nuit avant utilisation.\n\nLes légumes intégrant le lit sont préalablement salés en utilisant le Salage pour tsukemono.\n\n## Recettes\nKasuzuke d'oignons\n\n## Utilisation après fermentation\nIl se trouve que le lit servant à la fabrication du Kasuzuke est rempli de levures et de bactéries qui le rendent utilisable pour fabriquer des pâtes levées ou fermentées. Il se trouve que l'expérimentation 9921 Foccacia de Kasuzuke à l'aubergine a permis de découvrir une pâte pleine de goût qui était très complémentaire aux saveurs de l'aubergine.\n\n## Références\n- @kyungArtFermentation2016\n- @yellowfarmhouseeducationcenterPicklesTsukemono\n- @libbyreidZiWuTsukemonoLook2008"}, {"id": "Kasuzuke-d-oignons", "title": "Kasuzuke d'oignons", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Japon", "body": "Les oignons issus de cette Fermentation sont très savoureux et le lit de saké en lui-même est particulièrement bon.\n\n## Ingrédients\n- Sakekasu\n- Oignon\n- Saké rustique\n- Sel\n\n## Recette\n1. Saler les oignons en utilisant la méthode de Salage pour tsukemono\n2. Préparer le lit en mélangeant le Sakekasu et le sel. Si le mélange n'est pas assez liquide dilluer avec du Saké rustique.\n3. Rincer les oignons et les sécher avant de les disposer dans le lit.\n4. Laisser fermenter au frais entre 2 semaines à 1 mois.\n\n## Références\n- @yellowfarmhouseeducationcenterPicklesTsukemono\n```dataview\nLIST FROM Kasuzuke d'oignons & #experimentation & !#template WHERE econtains(recette, Kasuzuke d'oignons)\n```"}, {"id": "Ketchup-Pastèque-Ail-noir", "title": "Ketchup Pastèque Ail noir", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Fusion", "body": "Recette test à ajuster de sauce tonkatsu pour le Koyo dans le cadre du Menu Koyo Août 2023. Cette sauce vise à remplacer la sauce bulldog, en s'appuyant sur la synergie entre pastèque, Tomate et Ail noir dans pour produire un mélange pêchu.\n\n## Ingrédients\n\n- 1000g (voire plus si envie) de Pastèque\n- 5 gousses d'Ail confit dans l'huile ou ail cru\n- 420g de ketchup\n\t- 300g Concentré de tomate\n\t- 60g de dashi vegan\n\t- 60g de Miel simple\n\t- *Facultatif* Epices diverses (Cannelle et / ou Cardamome)\n- 40g de Miel \n- 70g Shoyu\n- 100g de Vinaigre de riz\n- 75g de pâte d'Ail noir\n- Sel\n- Poivre noir\n- Sichimi\n\n## Recette\n\n- Mixer la chair de pastèque et mélanger l'ensemble des ingrédients avec.\n- Porter à légère ébullition et laisser réduire quelques temps jusqu'à ce que le sauce soit plus épaisse. Ajouter de la maïzena si l'épaississement n'est pas suffisant.\n\n## Références\n\n- @mardereWatermelonHomemadeBBQ2019\n- @omuraBestHomemadeTonkatsu2022\n- @coucquytFoodpairingScienceGout2021\n\n## Voir aussi\n- Koyo"}, {"id": "Kimchi-d-écorce-de-pastèque", "title": "Kimchi d'écorce de pastèque", "tags": ["recette/koyo", "recette/fermentation"], "cats": ["fermentation", "koyo"], "origine": "Fusion", "body": "Une recette créée dans le cadre du Koyo pour faire suite à une envie identifiée par l'équipe sur Instagram. Cette recette s'inscrit dans les tendance de Upcycling.\n\n## Ingrédients\n\n- Écorces épluchées d'une Pastèque\n\t- 3 a 5% du poids en sel\n- Pâte à kimchi basique\n\t- Vegan si variante Koyo\n\t- Ajout de chair de Pastèque en supplément\n- Julienne de légume\n\t- Fonctionne bien avec une julienne de Poivron, Tomate en plus des combinaisons classiques\n- Ciboule ou Ciboulette\n\n## Recette\n\n1. Découper des tranches plutôt fines de morceaux d'écorce de pastèque que l'on aura épluché avec un économe pour retirer la peau.\n2. Saler au moins 1h en exerçant une pression équivalente au poids des écorces (si 1kg d'écorce, appliquer un poids de 1kg). Puis égoutter.\n3. Préparer la pâte à kimchi et les légumes complémentaires. Mélanger le tout et mettre à fermenter sous vide.\n4. Fermenter un minimum d'une semaine avant de consommer.\n\n## Références\n- 22723-K Kimchi d'écorce de pastèque\n\n## Voir aussi\n- Koyo\n\n## A noter\nD'autres itérations ont été menées avec des ingrédients et des proportions différentes. Celles avec 200ml de dashi et une Nectarine à la place de la pomme a connu un joli succès."}, {"id": "Kiroo-kosho", "title": "Kiroo kosho", "tags": ["recette/bizarre"], "cats": ["bizarre"], "origine": "", "body": "Il s'agit d'une variation du Yuzu Kosho qui est plus efficiente par rapport au temps et à l'argent (peu de pertes). Elle produit, si les ingrédients sont bons, un résultat tout en fraîcheur et agréable.\n\n\n> [!attention] Amertume\n> L'amertume est directement fonction de la finesse du mixage dans notre process. Ainsi le Kiroo Kosho, très grossier, pratiquement pas amer, le Negi Kosho, moyennement fin et le Koyo Kosho parfaitement fin representent la graduation empirique de cette \"règle\".\n\n## Ingrédients\n\n- 12,3kg Citron jaune de belle qualité (découpé et desquels on a retiré les excédents de ziste ainsi que les noyaux)\n- 1,9kg Abricot (sans les noyaux)\n- 708g pêche jaune / blanche (sans les noyaux)\n- 4,7kg Piment habanero (sans les tiges, on peut garder les graines)\n- 425g sel de mer (guérande ou camargue, non traité)\n\n### Variante\n| Ingrédients     | Poids (kg) | %      | % final |\n| --------------- | ---------- | ------ | ------- |\n| Citron jaune    | 7,938      | 77,95% | 78%     |\n| Poire           | 1,000      | 9,82%  | 10%     |\n| Piment habanero | 0,713      | 7,00%  | 7%      |\n| Sel             | 0,404      | 3,97%  | 3,75%   |\n| Eau             | 0,104      | 1,02%  | 1%      |\n| Kombu           | 0,025      | 0,25%  | 0,25%   |\n\n## Recette\n\n- Laver les citrons abondamment puis découper les excédents de ziste, les noyaux et les peaux\n- Laver les abricots et les pêches, découper les parties abimées et retirer les noyaux\n- Laver les piments, retirer les tiges et évacuer une partie des graines\n- Découper grossièrement l'ensemble des ingrédients et passer au mixeur dans un contenant approprié\n- On recherche une texture de purée bien texturée, avec des petits morceaux\n- On ajoute le sel et on repasse un coup au mixeur\n- Filmer au contact\n- Débarrasser dans un contenant de Fermentation et laisser fermenter dans une atmosphère à 20~25°C pendant 1 mois avant de conditionner.\n## Point de contrôle hygiène\n\n- Faible écart-type des température\n\t- Contrôle de l'atmosphère via dispositif Arduino\n- pH inférieur à 4,2\n- Apparition visible de poches de CO2 et gonflement de la préparation\n- Odeur fermentée caractéristiques du kimchi\n- Pas de développement de moisissures en surface ou ailleurs\n\n## Littérature & Références\n\n- Yuzu Kosho"}, {"id": "Korroke-Koyo", "title": "Korroke Koyo", "tags": ["recette/koyo", "recette/vegan", "recette/végétarien"], "cats": ["koyo", "vegan", "végétarien"], "origine": "Japon", "body": "Un plat populaire japonais qui a un côté réconfortant et qui est facile à produire. Servi par trois au Koyo c'est une recette également très populaire.\n\n## Ingrédients\n- 2,5kg de pomme de terre\n- 250g de carotte en brunoise\n- 250g d'oignon hachés\n- 250g de maïs en boîte\n- 100g de parmesan (voire plus au goût) (facultatif peut être remplacé par la levure maltée)\n- sel et poivre\n- *panure*\n\t- oeuf\n\t- Farine T60\n\t- panko\n\n## Recette\n1. Éplucher, couper et cuire les pommes de terre à la vapeur\n2. Les écraser (à la main ou au presse-purée) et ajouter les carottes, oignon que l'on aura fait cuire avec du sel et du poivre jusqu'à être tendres.\n3. Ajouter le maïs et le parmesan, bien mixer et goûter, ajuster l'assaisonnement\n4. Former des boules de 45g pour des petites Korokke, les rouler dans la farine assaisonnée, l'oeuf puis le panko\n5. Les aplatir avant friture et les cuire à 180°C jusqu'à une jolie coloration.\n6. Les servir avec une Mugi Miso Mayo"}, {"id": "Koso-Dorinku", "title": "Koso Dorinku", "tags": ["recette/boisson", "recette/fermentation"], "cats": ["boisson", "fermentation"], "origine": "Japon", "body": "Le koso dorinku est une boisson japonaise qui vante des mérites enzymatiques par le biais de la fermentation. En pratique il s'agit d'une boisson très similaire au cheong à ceci près que les temps de fermentation sont moins long. On aborde ici une recette générique puisque la formule est la même à chaque occasion.\n\nA noter que le koso dorinku sert finalement de sirop cru, son application se décline certainement dans la pâtisserie, les boissons et les boissons multi-fermentées (mixé avec du kombucha par exemple).\n\nLe principe de base consiste à mixer et laisser macérer un fruit avec son équivalent plus 10% en sucre. A ce fruit ou légume d'ailleurs, il est possible d'ajouter des plantes et épices. Par ailleurs, il est possible de tenter des boissons seulement à base de feuilles et de plantes mais il faut prévoir l'addition d'un fruit neutre pour apporter du corps et de l'eau au liquide.\n\n## Ingrédients\n- 1 part de Fruits\n- 1,1 part de sucre (soit 110% du poids en fruit)\n- QS d'herbes, épices ou autre\n\n## Recette\n\n1. Découper les fruits / légumes en morceaux fins\n2. Dans un bocal propre, superposer en lasagne une couche de sucre, puis une couche de fruit, une couche d'épices (ou autre) et une couche de sucre, et ainsi de suite, jusqu'au remplissage du bocal.\n3. Dans les premiers jours de la fermentation le sucre va, par osmose, extraire l'eau des fruits / légumes, il faut alors remuer fréquemment.\n4. Au bout de 10 à 14 jours, filtrer le koso, disposer des morceaux de fruits dans des yaourts ou autre et mettre au frais le sirop.\n5. Consommer tel quel ou dans une recette.\n\n## Références\n[@KosoMeilleurSirop2021]\n[@KosoDrink2021]\n\n## Journal de bord\n```dataview\nLIST FROM Koso Dorinku & #experimentation & !#template\n```"}, {"id": "Koyo-classic-shoyu-tare", "title": "Koyo classic shoyu tare", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "Un Tare pour Ramen efficace et qui remplit parfaitement son rôle Umami.\n## Ingrédients\n\n- 300g saké - 20g\n- 200g Mirin - 13g\n- 1600g Shoyu - 160g\n- 800g usukuchi\n- 50g sauce poisson - 4g\n- 10g Dashi en poudre -1g\n- 40g sel - 3g\n- 150g sirop d'agave / Miel / sirop de riz / Sucre blanc - 10g\n- 50g Gingembre - 4g\n- 50g Ail - 4g\n- 100g Oignon / cebette - 6g\n- 500g jus de viande concentré (résidu de cuisson de chachu ou bouillon concentré) - \n\n### Version végé rapide\n\n- 30g saké (ou vin blanc)\n- 20g mirin (ou vin doux)\n- 250g de shoyu\n- pincée de bouillon de champignon\n- 4g sel\n- 15g miel\n- 5g gingembre\n- 5g ail\n- 10g oignon\n- 50g de bouillon\n\n## Recette\n\n1. Faire évaporer le saké et mirin\n2. Ajouter le reste des ingrédients et mijoter à feu doux pendant 10-15 minutes\n## Voir aussi\n- Koyo"}, {"id": "Koyo-Menma", "title": "Koyo Menma", "tags": ["recette/koyo", "recette/condiment"], "cats": ["condiment", "koyo"], "origine": "Koyo", "body": "# Koyo Menma\n\nCette recette est totalement en mode QS, elle est donc à prendre avec des pincettes. Les quantités sont à réévaluer régulièrement en fonction du résultat précédent. L'idée en tous les cas demeure que le bambou cuise dans une marinade de soja qui va l'assaisonner.\n\n## Ingrédients\n- Pousse de bambou à l'eau (en boîte ou autre)\n- Shoyu (majoritaire)\n- Dashi en poudre (petite quantité)\n- Sucre (très petite quantité)\n- Mirin (petite quantité)\n- Eau\n\n## Recette\n1. Egouter les pousses de bambou et les déposer dans une casserole. Ajouter l'ensemble des ingrédients en gardant à l'esprit qu'il ne restera qu'un tiers du liquide. Il faut donc ajuster l'assaisonnement en conséquence.\n2. Mettre à cuire en en faisant pression sur le bambou afin qu'il soit bien immergé. Faire attention à ce que le liquide ne disparaisse pas, il est nécessaire de garder un œil dessus régulièrement.\n3. Lorsque le bambou est bien coloré et tendre, le retirer du feu et déguster. S'il n'est pas suffisamment tendre ajouter de l'eau.\n\n## Voir aussi\n- koyo\n- Menma"}, {"id": "Koyo-Shio-Koji-Ramen", "title": "Koyo Shio Koji Ramen", "tags": ["recette/koyo", "recette/plat"], "cats": ["koyo", "plat"], "origine": "Japon", "body": "# Shio Koji Ramen\nLe Ramen d'été du Koyo s'appuyant sur un bouillon Tori Chintan.\n\n## Ingrédients\n- Bouillon de poulet Koyo Shio Ramen\n- Shio Koji Koyo Tare\n- Chasu de poulet citronné\n- Oeuf Ajitama Koyo Style\n- Tomates rôties du Koyo\n- Koyo Menma\n- Shiso pourpre haché fin\n- Negi Oil Koyo\n- Skinny Nouilles du Koyo\n\n## Dressage\n\n!shio-ramen.png\n🖋 Edit in Excalidraw"}, {"id": "Kéfir-de-lait", "title": "Kéfir de lait", "tags": ["fermentation/boisson", "recette/boisson", "recette/fermentation"], "cats": ["boisson", "fermentation"], "origine": "Europe", "body": "- [ ] Remplir la note #task #personnel\n\n# Kéfir de lait\n\n## Ingrédients\n\n## Recette\n\n## Références\n- @katzFermentationsLegumesFruits2018 \n- @kyungArtFermentation2016\n\n## Voir aussi\n\n## Journal de bord\n```dataview\nLIST FROM Kéfir de lait & #experimentation & !#template WHERE econtains(recette, Kéfir de lait)\n```"}, {"id": "Lactofermentation-à-l-eau-de-riz-agropol-eat-2024", "title": "Lactofermentation à l'eau de riz agropol eat 2024", "tags": ["fermentation"], "cats": ["fermentation"], "origine": "", "body": "Une recette qui utilise l'eau de lavage de riz pour créer une saumure utilisée dans la fermentation courte de légumes divers. Cette recette économe en eau a l'avantage d'être délicieuse et rapide à mettre en oeuvre.\n## Petits condensé d'informations\n\n### La fermentation en question\n\nLa fermentation dans une application culinaire est un procédé de conservation et de transformation d'ingrédients (animaux ou végétaux) en utilisant l'activité microbienne et enzymatique par la création d'un environnement sélectif. \n\n### La lactofermentation plus précisément\n\nLa lactofermentation vise le développement d'une flore spécifique : les lactobactéries. Sans lien avec le lactose à part le nom, les lactobactéries sont présentes un peu partout, elles nous sont bénéfiques et si on leur prépare un environnement favorable, elles vont se développer en acidifiant (acide lactique) le milieu dans lequel elles progressent et en monopolisant les ressources. Elles empêchent ainsi par leur présence majoritaire et l'acidification le développement d'autres bactéries nocives.\n\n## Techniques de lactofermentation à l'eau de riz\n\nEn plus de créer un environnement sélectif avec une petite dose de sel, l'eau de lavage du riz est chargée en amidon, qui est un sucre simple et qui constitue par conséquent une source de nutriment facile d'accès. L'amidon va permettre le développement des lactobactéries et, comme le sucre est directement transformé en acide lactique par ces dernières, la saumure ainsi que les légumes vont s'acidifier rapidement.\n\nIl y a deux approches principales à l'utilisation de l'eau de riz, une simple et une plus experte.\n### Approche simple\n\n- Avantages\n\t- Méthode sûre, si la fermentation tourne mal vous le saurez : mauvaise odeur, moisissure sur le dessus\n\t- Faible consommation d'énergie et rapide à produire\n- Inconvénients\n\t- Légumes moins croquants que l'autre méthode\n\t- Un peu plus lent\n\n1. Conservez la deuxième eau de lavage du riz, pesez là et ajoutez 3% du poids de l'eau en sel.\n\t1. *Exemple : vous avez 500g d'eau de lavage de riz, vous ajoutez 15g de sel. Sur votre calculette vous multipliez par 0.03 la quantité d'eau (en gramme) dont vous disposez pour obtenir le résultat rapidement*\n2. Ajoutez les légumes que vous aurez choisi (ail, gingembre, chou chinois, concombre et carotte) dans la saumure puis enfermez tout cela dans un bocal hermétique.\n3. En été 3 à 5 jours suffisent pour que la fermentation soit finie. Plus vous attendez plus le résultat sera acide (on dit qu'il aura suri).\n\n### Approche experte\n\n- Avantages\n\t- Légumes plus croquants\n\t- Délais de fermentation plus court\n\t- Moins de sel\n- Inconvénients\n\t- Moins de sel = plus de risques que la fermentation ne se déroule pas comme prévues, si vous êtes débutants en fermentation, faîtes vos armes et aiguisez vos sens sur l'approche simple\n\n1. Conservez la deuxième eau de lavage du riz et ajoutez un peu de sucre (pour 25cl une cuillière à café de sucre blanc), portez à ébullition puis laissez refroidir.\n2. Le temps que l'eau refroidisse, découpez les légumes, pesez-les puis mettez-les au sel à 3% (même principe de calcul qu'avec l'eau de lavage). Pour que cette étape fonctionne bien, il est vraiment conseillé d'appliquer une pression (des poids, un plat allant au four un peu lourd, une casserole remplie d'eau) sur les légumes le temps du salage (30 à 60 minutes minimum). Avec cette méthode croquant garanti !\n3. Mélangez les deux éléments dans un bocal hermétique et laissez fermenter quelques jours. La concentration de sel est théoriquement plus faible dans cette recette donc cela va encore plus vite (moins il y a de sel, moins les lactobactéries sont empêchées dans leur développement).\n### Ingrédients recommandés\n\n- Chou chinois\n- Chou blanc\n- Carottes\n- Concombre\n- Ciboule\n- Gingembre\n- Ail\n\n### Debuggage\n\n- Si vous bocal développe une moisissure, ne le gardez pas. Le plus dangereux avec une moisissure n'est pas dans la \"croûte\" que l'on retire mais dans les hyphes (sortes de racines) qui ne sont pas visibles à l'oeil nu et qui libèrent parfois des composé toxiques. Soyez vigilant.e.s.\n- Si la saumure devient blanche, c'est bon signe.\n- Si des dépôts blancs se forment au fond du bocal, c'est bon signe également."}, {"id": "Lazy-kosho-jaune", "title": "Lazy kosho jaune", "tags": ["recette/bizarre"], "cats": ["bizarre"], "origine": "", "body": "Il s'agit d'une variation du Yuzu Kosho qui est plus efficiente par rapport au temps et à l'argent (peu de pertes). Elle produit, si les ingrédients sont bons, un résultat tout en fraîcheur et agréable.\n## Ingrédients\n\n- 12,3kg Citron jaune de belle qualité (découpé et desquels on a retiré les excédents de ziste ainsi que les noyaux)\n- 1,9kg Abricot (sans les noyaux)\n- 708g pêche jaune / blanche (sans les noyaux)\n- 4,7kg Piment habanero (sans les tiges, on peut garder les graines)\n- 425g sel de mer (guérande ou camargue, non traité)\n## Recette\n\n- Laver les citrons abondamment puis découper les excédents de ziste, les noyaux et les peaux\n- Laver les abricots et les pêches, découper les parties abimées et retirer les noyaux\n- Laver les piments, retirer les tiges et évacuer une partie des graines\n- Découper grossièrement l'ensemble des ingrédients et passer au mixeur dans un contenant approprié\n- On recherche une texture de purée bien texturée, avec des petits morceaux\n- On ajoute le sel et on repasse un coup au mixeur\n- Filmer au contact\n- Débarrasser dans un contenant de Fermentation et laisser fermenter dans une atmosphère à 20~25°C pendant 1 mois avant de conditionner.\n## Point de contrôle hygiène\n\n- Faible écart-type des température\n\t- Contrôle de l'atmosphère via dispositif Arduino\n- pH inférieur à 4,2\n- Apparition visible de poches de CO2 et gonflement de la préparation\n- Odeur fermentée caractéristiques du kimchi\n- Pas de développement de moisissures en surface ou ailleurs\n\n## Littérature & Références\n\n- Yuzu Kosho"}, {"id": "Les-caillettes-de-la-madre", "title": "Les caillettes de la madre", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Provencal", "body": "# Les caillettes de la madre\n\n## Origines sentimentales et géographiques\n\nLes caillettes représentent un plat nostalgique que ma mère préparait peu souvent mais rituellement. Préparée pour mon anniversaire, ces boulettes de viande de porc, étaient toujours appréciés de tous. Elles ont quelque chose de simple sur le papier, de modeste, mais ne sont pas si évidentes à préparer.\n\nDe toute évidence, la caillette que l'on connaît aujourd'hui, est une recette ardéchoise ou du moins, dans sa déclinaison avec de la sauce tomate, provencale. J'aime à le penser même si ce n'est pas complètement vérifié. De cette recette de caillette, je souhaite faire un plat ponctuel mais plein de bon sens, de goût et surtout de gourmandise.\n\n## Les ingrédients\n\nLes caillettes sont des boulettes de viandes de porc (un mélange de foie, poitrine pour le gras ou du pur gras et d'une partie maigre), d'épinards, d'épices et d'ail. Ce mélange est mixé, cuit et roulé puis enrobé dans une crépine.\n\nLa Crépine, c'est l'élément délicat de la recette, mais crucial. Très délicate, elle permet d'enrober la viande, de la tenir en place puis, la cuisson faisant son office, elle fond en consolidant l'ensemble.\n\nLa recette que je vous propose, inclut un léger temps de repos et un ajout de shio koji pour ajouter du goût supplémentaire. Vous pouvez remplacer le shio koji par de l'Amazaké classique si vous souhaitez un contrôle plus fin sur le sel et bénéficier d'un assaisonnement plus discret. De même, un Garum pourrait ajouter une note traditionnelle avec un condiment plus européen.\n\n-   500 g Filet mignon de porc ou de l'échine (pour le gras)\n-   500 g Foie de porc\n-   200 g Lard blanc sans la couenne idéalement\n-   1 grande Crépine de porc (très grande, sinon en demander deux)\n-   1 kg Epinard bien lavés\n-   2 Oeuf\n-   2 Oignon\n-   4 gousses d'Ail (il est possible d'en mettre moins)\n-   1 bouquet de Persil\n-   50 g de Shio koji facultatif\n\n## Recette\n\n1. Amont, faire cuire les épinards que vous aurez bien nettoyé. Une fois refroidi, les essorer à la main en les pressant de sorte à extirper un maximum d'humidité.\n2. Rincez et faire tremper la crépine (prendre soin à bien la nettoyer si elle n'est pas impeccable), la laisser dans de l'eau froide jusqu'à utilisation.\n3. Hachez finement (au robot mixeur ou idéalement au hachoir) tous les morceaux de viande. Il est aussi possible de demander à son boucher de s'en occuper en amont, mais il faudra alors faire la recette le jour même.\n4. Mélangez directement le shio koji dans la mixture si vous en avez et laissez reposer quelques minutes. Si vous utilisez du shio koji, il y aura déjà du sel dans la mixture, donc il faudra assaisonner en conséquence.\n5. Faites revenir un oignon. Une fois translucide, ajouter la viande de porc hachée.\n6. Une fois la viande colorée et cuite à l'extérieur, ajoutez les épinards bien essorés, les quatre gousses d'ail pressées (ou finement hachées) et la botte de persil ciselé (ou finement hachée). \n7. Cuire 5 minutes de façon à ce que tout les ingrédients soient bien mélangés les uns aux autres.\n8. Laisser bien refroidir le mélange avant d'y ajouter les œufs battus en omelette. S'assurer que l'ensemble soit bien homogène.\n9. Essorer la crépine soigneusement avec les mains pour retirer l'excédent d'eau sans la déchire. Étaler la crépine.\n10. Façonner des boulettes avec le mélange de viande et enveloppez-les dans un rectangle de crépine que vous aurez préalablement découpé aux ciseaux.\n11. Faire cuire au four 35 minutes à 180°C - 200°C selon votre four.\n12. Servir avec une sauce tomate douce et une céréale de votre choix."}, {"id": "Les-pickles-de-légume-anglo-saxons", "title": "Les pickles de légume anglo-saxons", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "USA", "body": "# Les pickles de légume anglo-saxons\n## Ingrédients\n- Légumes\n- Arômates (sariette, thym, baie de genièvre, sauge)\n- Sel\n- Sucre\n- Vinaigre (blanc le plus souvent, des mélanges sont possibles)\n\n## Matériel\n- Bocaux à fermeture hermétique\n\n## Etapes\n- Nettoyer consciencieusement le matériel et les légumes\n- Déposer les légumes découpés selon convenance et arômates dans les bocaux\n- Faire chauffer le sucre, vinaigre, eau, sel jusqu'à ébulition.\n- Verser la Saumure sur les légumes jusqu'à hauteur et fermer le bocal.\n- Laisser refroidir et reposer au moins 1 semaine, voire plus.\n\nLa conservation est vraiment bonne si on suit ces proportions et qu'on s'assure d'utiliser un vinaigre suffisamment acide.\n\n\nLien vers la note originale : Pickles"}, {"id": "Les-pickles-de-légume-français", "title": "Les pickles de légume français", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "Europe", "body": "# Les pickles de légume français\nAutrement, les cornichons, sans sucre et un peu de sel.\n\n## Ingrédients\n- Oignons grelots\n- Graines de moutarde\n- Vinaigre blanc\n- Sel\n- Légumes (petits cornichons ou concombres de préférence)\n\n ## Etape\n - Les étapes sont les mêmes que pour les pickles de légume anglo-saxon\n\t - Nettoyer consciencieusement le matériel et les légumes\n\t- Déposer les légumes découpés selon convenance et arômates dans les bocaux\n\t- Faire chauffer le vinaigre, eau, sel jusqu'à ébulition.\n\t- Verser la Saumure sur les légumes jusqu'à hauteur et fermer le bocal.\n\t- Laisser refroidir et reposer au moins 1 semaine, voire plus.\n\n\nLien vers la note originale : Pickles"}, {"id": "Madeleines", "title": "Madeleines", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "France", "body": "Une recette simple issue de la lunii de Noé. Probablement dupliquable en Cake.\n## Ingrédients\n\n- 200g farine\n- 100g beurre\n- 50g sucre blanc *facultatif*\n- 100g miel\n- 1 sachet de levure chimique (~10g)\n- 3 oeufs\n- 5cl de lait (50g)\n- une cuillière à café d'eau de fleur d'oranger, d'extrait d'amande amère ou d'un autre arome quelconque (amaretti et tutti quanti)\n\n## Recette\n\n- mélanger la farine avec la levure et une pincée de sel\n- à part, mélanger les oeufs avec le sucre jusqu'à ce que le mélange mousse bien\n- ajouter le lait et l'arôme, mélanger\n- ajouter la farine et levure, mélanger pour amalgamer mais sans trop travailler\n- ajouter le beurre fondu, noisette de préférence, remuer pour finaliser le mélange\n- cuire dans un four très chaud (240°C) pendant 5 minutes, puis 5 minutes encore à 180°C\n\n## Références\n\nhttps://lunii.com/fr-fr/products/la-cuisine-a-remonter-le-temps\n\n## Voir aussi\n\n- Cake"}, {"id": "Mak-baechu-kimchi-vegan", "title": "Mak baechu kimchi vegan", "tags": ["[]"], "cats": ["[]"], "origine": "", "body": "#recette/bizarre #recette/fermentation \n\nDirectement importé de la recette Pâte à kimchi fruitée#Version végétarienne qui semble être la plus aboutie, il n'en demeure pas que des versions plus audacieuses pourront voir le jour. En l'état, on conserve une vraie qualité globale de goût sans entrer dans le dur de la Fermentation aigre.\n\n# Ingrédients\n\n| Ingrédient                         | Identifiant               | Quantité nette |\n| ---------------------------------- | ------------------------- | -------------- |\n| Chou chinois                   |                           | 18,845         |\n| Sel                                | proca51124selgue          | 0,56535        |\n| Eau                                |                           | 0,86           |\n| Kombu                          | chinavina51124kombu1      | 0,013          |\n| Shiitaké secs        | parisstore51124shiitake   | 0,002          |\n| Tamari dashi                   | 010062846                 | 0,04           |\n| Ail pelé                       | proca51124ailpele         | 0,3            |\n| Gingembre                          |                           | 0,314          |\n| Oignon doux                        |                           | 1,034          |\n| Tamari pâte                        | 010062846                 | 0,3            |\n| 18924ER1 Umeboshi Reine Claude |                           | 0,035          |\n| Carotte                            |                           | 0,85           |\n| Daikon                             |                           | 0,688          |\n| 24324 Cheong Orange Amère      |                           | 0,35           |\n| 8924I2 Cheong Pêche blanche    |                           | 0,25           |\n| 301223 Cheong Coing            |                           | 0,25           |\n| Farine Caputo                      | proca51124farinecaputo    | 0,2            |\n| Gochugaru                          | parisstore51124gochugaru1 | 0,5            |\n| Poire                              | proca51124poireguyot      | 0,655          |\n\n# Recette\n\n## Préparation du chou\n\n- Laver soigneusement les chou à l'eau courante\n- Débarrasser les feuilles abimées\n- Couper la base du légume à moins d'un centimètre\n- Découper ensuite les feuilles en gros carrés\n- Peser le tout et saler à 5%\n- Appliquer un poids important dessus et laisser décanter une nuit au frais idéalement\n- Faire ensuite égoutter et réserver\n\n## Préparation des légumes\n\n- Hacher la ciboule très finement\n- L'immerger dans un bain d'eau froide et la masser sans la déchirer\n- Répéter l'opération 2 à 3 fois en changeant l'eau\n- Egoutter 15 minutes puis réserver\n- Détailler les carottes et le radis en julienne\n- Réserver\n\n## Préparation de la pâte\n\n### Bouillon et empois\n\n- La veille de la préparation du bouillon faire tremper shiitaké et autre champignons (cepes notamment) dans 1,5l d'eau froide. Réserver au frais\n- Toujours la veille dans 0.5l d'eau fraîche, faire infuser 10g de kombu. Réserver au frais\n- Préparer le bouillon végétarien avec les chutes des légumes des préparation précédentes et 1l d'eau\n- Ajouter les shiitaké et autre champignons séchés ainsi que l'eau de trempage au bouillon chaud puis porter à ébullition\n- Après ébullition, filtrer et remettre sur feu très doux, ajouter le kombu et l'eau de trempage. Faire mijoter à très faible température pendant 1h.\n- Filtrer puis mélanger à la farine et refaire cuire doucement jusqu'à la création d'un empois consistant.\n\n### Condiments\n\n- Eplucher le gingembre, l'ail, l'oignon doux (découpé grossièrement) et les disposer dans un récipient compatible avec un mixeur plongeant.\n- Laver les fruits et les découper grossièrement, les ajouter au contenant.\n- Ajouter le reste des ingrédients (sauf le bouillon / empois) et mixer jusqu'à l'apparition d'une pâte fine\n- Ajouter l'empois et mélanger un dernier coup au blender.\n\n## Assemblage final\n\n- Mélanger la pâte condiment aux légumes ainsi qu'au chou égoutté\n- Déposer dans un contenant propre à la fermentation désinfecté, effectuer une lecture de pH\n- Filmer au contact ou presser à l'aide de feuilles de chou\n- Déposer le contenant dans une atmosphère à 25°C jusqu'à 28°C et mettre en fermentation pour 1 semaine si fourchette haute de température moyenne (>28°C) et 2 à 3 semaines en cas de fourchette basse de température (<24°C)\n- Finir la fermentation une semaine au frais après le déroulement de la fermentation à température\n- Conditionner et déguster\n\n## Point de contrôle hygiène\n\n- Faible écart-type des température\n\t- Contrôle de l'atmosphère via dispositif Arduino\n- pH inférieur à 4,2\n- Apparition visible de poches de CO2 et gonflement de la préparation\n- Odeur fermentée caractéristiques du kimchi\n- Pas de développement de moisissures en surface ou ailleurs\n\n## Production\n\n```dataview\n\nTABLE start-date AS \"Début\", end-date AS \"FIN\", volume AS \"Vol (kg)\", status AS \"Statut\" FROM Mak baechu kimchi vegan & #bizarre/prod \n\n```\n\n## Littérature\n\n### Archives\n\n#### Ingrédients\n\n##### Base de chou\n\n- 15kg de Chou chinois détaillés en gros carrés\n- 1kg de sel de mer (Guérande ou Camargue) *soit 5%*\n\n##### Base de légumes\n\n- 2kg carottes épluchées détaillées en julienne\n- 2kg radis blanc / daikon épluchés détaillés en julienne\n- 5 bottes de ciboule coupées finement (koyo style)\n\n##### Base de condiment\n\n- 1kg poire\n- 1kg orange\n- 500g pomme\n- 400g Gingembre\n- 300g Ail\n- 500g 24324 Cheong Orange Amère\n- 500g Cheong de coing (voir 301223 Cheong Coing)\n- 2kg Oignon jaune\n- 500g 29224 Sauce Alter-poisson\n- 300g Shiro Miso\n- 800g Gochugaru\n- 200g paprika fort\n- Pâte\n\t- Bouillon végé 2l\n\t\t- Epluchures et chute de fabrication du kimchi\n\t\t- 20g kombu\n\t\t- 100g shiitaké (ou mélange de champignons)\n\t- 400g farine / ou farine de Riz gluant"}, {"id": "Mame-miso", "title": "Mame miso", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "", "body": "Un miso fabriqué uniquement à partir de koji de soja et de sel. Ces misos sont riches en umami et très forts en goût. On les fait maturer plus longtemps par ailleurs (entre 1 et 2 ans le plus souvent). On utilise un ratio élevé de sel (plus de 10%) en vue d'une conservation longue.\n\n## Références\n[@wikipediaSetier2021]\n\n## Voir aussi\n- Miso\n- Miso de fève\n- Koji"}, {"id": "Mapo-Nasu", "title": "Mapo Nasu", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Fusion", "body": "Proche cousin du mapo tofu, cette recette substitue le Tofu par de l'aubergine. La recette qui résonne comme une interprétation d'été, fonctionne très bien ainsi et est fortement paramétrée pour les goûts français avec une piquance légère. La version originale, chinoise, originaire de la région de Sichuan est nécessairement plus piquante.\n\n## Ingrédients\n- 300g Aubergine\n- Cébette\n- 1 morceau (taille pouce en gros) de Gingembre\n- 1 gousse d’Ail\n- 9g fécule\n- 15g\tHuile de sésame\n- 100g Porc / poulet haché\n\t- en l'occurence des restes de farce à Gyozas de poulet, ça marche aussi\n- 15ml saké\n- 18g\tGochujang (ou traditionnellement doubanjiang)\n- 5g Shiro Miso (ou traditionnellement tienmienjiang)\n- 240ml Bouillon\n- 5g Mame miso (ou un Aka Miso)\n- 5g\tSucre roux\n- Poivre de sichuan\n- Cannelle de ceylan\n- Baie de Cardamome\n- 15ml Shoyu\n- 10ml Vinaigre de riz (ou autre type plutôt léger en goût)\n\n## Recette\n1. Découper les aubergines dans la longueur ou en cube, puis les faire tremper dans l'eau 5 minutes, essorez et plongez les dans la fécule avant de les frire ou des les faire revenir à la poêle pour atteindre une juste cuisson. Faire reposer sur une grille.\n2. Faire sauter le gingembre, l'ail et les épices (poivre de sichuan, cannelle et cardamome) dans un fond d'huile dans une poêle ou une sauteuse assez large.\n3. Quand le tout est dégage une odeur parfumée (assez vite généralement), ajoutez la viande (porc ou poulet).\n4. Quand la viande est presque cuite ajoutez le saké.\n5. Quand le saké a commencé à réduire, ajoutez la moitié des cébettes, le shiro miso et le gochujang. Mélangez jusqu'à ce que tout soit bien homogène et veillez à ce que ça ne brûle pas.\n6. Ajoutez le bouillon, le aka miso, le sucre et le shoyu.\n7. Portez à frémissement puis ajoutez les aubergines cuites.\n8. Une fois les aubergines bien immergées dans la sauce ajoutez un mélange de fécule (9g et 30ml  d'eau), mélangez et portez à frémissement léger.\n9. Quand la consistance de la sauce vous plait, stoppez la cuisson et ajusté avec des épices (sichuan et consort) si elles manquent. Ajoutez également le vinaigre et l'huile de sésame ainsi le reste des cébettes.\n10. Servez chaud de préférence avec du riz.\n\n## Références\n- @chenMapoEggplantMabo2020\n- Inspiration partielle du Koyo sur l'aspect sucré notamment.\n\n## Voir aussi\n- Sauce Mapo Koyo\n- @mikeWhyDoesSichuan2025"}, {"id": "Masala-Chaï", "title": "Masala Chaï", "tags": ["recette/boisson"], "cats": ["boisson"], "origine": "Inde", "body": "## Ingrédients\n- 2 Clous de girofle\n- 4 Cardamome ou 5g (sans la peau)\n- Une pincée de Poivre de sichuan (*facultatif*)\n- 1g de poivre noir\n- Un morceau de Cannelle ou 3g\n- 1g de Graines de fenouil\n- 1/3 de noix de muscade\n- QS de Gingembre frais\n- Du thé noir fort\n\t- J'ai utilisé avec succès un mélange de Thé Darjeeling First Flush et de Thé Lapsang Souchong\n- Une cuillère de Sucre blanc ou autre source de glucose\n- 125ml de Lait de vache\n- 360ml d'eau\n\nOn peut considérer le ratio suivant : pour 90 d'eau, 30 de lait, 1 cardamome, 1/2 clou de girofle et le reste en ajustement à la louche.\n\n## Recette\n1. Faire bouillir l'eau avec le thé tout en écrasant les épices ou en les réduisant en poudre\n2. Quand l'eau bout et que les épices sont prêtes, les ajouter au thé et laisser bouillir 3 minutes\n3. Ajouter le lait et porter à nouveau à ébullition. Faire ensuite mijoter 5 minutes\n4. Ajouter le sucre, faire mijoter encore le temps de diluer le sucre.\n5. La consistance finale doit être légèrement épaisse (c'est pas de la crème non plus mais il ne faut pas que ce soit trop aqueux).\n\n## Références\n- https://www.indianhealthyrecipes.com/masala-tea-chai/#wprm-recipe-container-38384\n\n## Voir aussi\n\n- Garam Masala\n- Masala Dahl à la française"}, {"id": "Masala-Dahl-à-la-française", "title": "Masala Dahl à la française", "tags": ["recette/plat", "recette/vegan"], "cats": ["plat", "vegan"], "origine": "Inde", "body": "# Masala Dahl à la française\nEn France on l'appelle simplement Dahl et on retrouve de nombreuses déclinaisons axées autour de l'utilisation de lentilles corail, d'épices et de lait de coco. Outre-Atlantique ou dans les recettes dîtes authentique, on retrouve moins l'utilisation du lait de coco. Il s'agit cependant d'un choix heureux qui apporte beaucoup d'onctuosité à la recette.\n\n## Ingrédients\n**Obligatoires**\n- 300g de lentilles corail\n- 1 Oignon\n- 3 gousses d'Ail\n- 10g de Gingembre râpé ou QS (ou plus selon les préférences toi-même tu sais)\n- 50cl de lait de coco\n- 50cl de bouillon de légume (ou autre)\n- Huile d'olive et / ou Huile de coco\n- **Des épices**\n\t- Le curcuma apporte de la couleur donc l'utilisation d'un curcuma frais et en poudre peut apporter une jolie teinte\n\t- Du Cumin (des pincées)\n\t- Du poivre blanc (deux trois tours de moulin)\n\t- Du fenouil en petite quantité\n\t- Deux pincées de Poudre de cinq épices\n*Facultatif mais ça aide bien quand même* \n- Un peu de ciboule\n- Du céleri branche ou de la Coriandre feuille\n- Des Carotte\n- Du Persil\n- Le jus d'un demi-Citron\n\n## Recette\n\n1. Faire suer les oignons avec l'ail et le gingembre émincés dans une poêle avec un fond d'huile végétale ou de ghee. Ajouter la moitié des épices au démarrage de la cuisson.\n2. Lorsque la coloration se complète, ajouter la garniture de légume (si prévu), les lentilles corail et faire revenir quelques instants avant d'ajouter le bouillon et le lait de coco.\n3. Porter à ébullition puis baisser le feu pour amener à frémissement et ajouter le reste des épices\n4. Quand les lentilles sont cuites, arrêter la cuisson, ajouter le jus d'un demi-citron et du persil ou de la coriandre émincés finement.\n5. Servir avec du riz ou sans féculent selon les envies."}, {"id": "Master-Nouilles-du-Koyo", "title": "Master Nouilles du Koyo", "tags": ["recette/koyo", "recette/pate"], "cats": ["koyo", "pate"], "origine": "Japon", "body": "# Master Nouilles du Koyo\n\nLa recette de base utilisée au Koyo et qui sert de fondement pour les variations mises en œuvre par la suite.\n\n## Ingrédients\n- 6640g de Farine T45 \n- 300g de Farine complémentaire, à choisir en fonction du style de nouilles 🍜 \n- 900g d'Oeuf\n- 2000g d'eau\n- 360g de Kansui liquide (à voir les équivalences avec un kansui sec)\n- 120g de sel\n- 220g de Gluten\n\n### Tableau de %\n| Ingrédient                                              | Pourcentage |\n| ------------------------------------------------------- | ----------- |\n| Farine totale (quantité de base + complément + gluten)  | 100%        |\n| *Gluten (par rapport à la quantité de base)*            | *3%*        |\n| *Farine Complément (par rapport à la quantité de base)* | *4%*        |\n| Oeuf (par rapport à la farine totale)                   | 12%         |\n| Eau (par rapport à la farine totale)                    | 28%         |\n| Kansui (par rapport à la farine totale)                 | 5%          |\n| Sel (par rapport à la farine totale)                    | 1,6%        |\n\n>[!INFO] Le taux d'hydratation de cette pâte avoisine les 42%\n\n## Recette\n1. Mélanger et tamiser les farines ainsi que le gluten d'une part et mélanger le reste des ingrédients d'autre part.\n2. Ajouter le mélange liquide à la farine petit à petit en petrissant dès qu'un amalgame se forme.\n3. Une fois qu'une boule apparaît, on étale la pâte, puis on la replie sur elle même, on fait un quart de tour et on l'étale à nouveau.\n4. On répète le procédé jusqu'à l'obtention d'une pâte lisse dans le bac duquel, il ne reste pas d'éléments secs.\n5. On laisse la pâte reposer une heure à température ambiante, puis une nuit ai frigo.\n6. On portionne des tranches de 130g à 140g qu'on abaisse à la machine à pâte au plus large une première fois.\n7. Replier la portion pour former un joli rectangle et abaisser à nouveau. Répéter jusqu'à obtention d'une portion abaissée régulière et rectangulaire.\n8. Abaisser ensuite au deuxième réglage le plus fin puis laminer en nouille. **Sur cette dernière étape des variations peuvent avoir lieu.**\n9. Selon l'épaisseur des nouilles cuire entre 1 minute 30 et 2 minutes dans de l'eau bouillante.\n\n## Variations\n- Skinny Nouilles du Koyo\n\n## Références\n\n## Voir aussi"}, {"id": "Meatballs-swedish-style-kéfir-variation", "title": "Meatballs swedish style kéfir variation", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Fusion", "body": "## Ingrédients\n\n- Viande (55%)\n\t- Plat de côte 2kg\n\t- Basse côte 2kg\n- Garniture interne\n\t- Oignon 16\n\t- Kéfir de lait (yaourt + kéfir ou petit lait) : 1700g\n\t- Panure ou pain haché : 600g\n\n## Recette\n\n- Mixer les oignons grossièrement et les passer à la l'étamine pour enlever le jus et ne garder que la chair\n- Mélanger la panure / panko et le kéfir, laisser imprégner pendant 30 minutes\n- Hacher les viandes\n- Mixer le tout avec le sel et les épices\n- Former des boules uniformes\n- Passer en friture à 180°C\n- Puis finir au four à l'envoi\n\n## Références\n- https://www.frenchguycooking.com/my-perfect-meatball-recipe\n\n## Voir aussi\n\n- Retroplanning Bizarre x Maquis 16aout25"}, {"id": "Mentsuyu", "title": "Mentsuyu", "tags": ["recette/plat", "recette/sauce"], "cats": ["plat", "sauce"], "origine": "Japon", "body": "# Mentsuyu\nLe Mentsuyu est un bouillon ou une sauce souvent utilisé en tant que condiment au Japon. Il peut servir autant pour assaisonner les Tempura que servir de base pour des soupes froides Tsuketsuyu et chaudes Kaketsuyu\n\nLa recette présentée plus bas ainsi que les versions commerciales demandent souvent à être diluées suivant\n\n## Ratio de dillution Tsuyu : Eau\n-   Tsuketsuyu  - 1 : 3\n-   Kaketsuyu - 1 : 6-8\n-   Donburi et Tentsuyu – 1 : 3-4\n-   Oden ou Nabemono (hot pot) – 1 : 8-10\n-   Nimono – 1 : 4-6\n\n## Ingrédients\n-   120 ml Saké rustique\n-   260 ml Mirin\n-   240 ml Shoyu\n-   1 morceau de Kombu (5g)\n-   10 g de Katsuoboshi ou du cèpe séché\n\n## Etapes\n1. Mélanger les ingrédients ensemble et amener à ébulition.\n2. Baisser le feu et laisser mijoter 5 minutes\n3. Filtrer et presser pour extraire un maximum du goût.\n4. Diluer en fonction de l'usage\n\nIl est possible de transformer les résidus de katsuobushi et de kombu pour faire du Furikake.\n\n## Voir aussi\n- Umami\n\n## Recettes\n```dataview\nLIST FROM Mentsuyu & !#experimentation & !#template & !#ouvrage & #recette \n```\n## Experimentation\n```dataview\nLIST FROM Mentsuyu  & #experimentation & !#template\n```\n\n## Références\n@chenHomemadeMentsuyuNoodle2013"}, {"id": "Mirin", "title": "Mirin", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Japon", "body": "# Mirin\nLe mirin est une liqueur de riz qui est principalement utilisée en cuisine asiatique. On la retrouve dans la sauce teriyaki ou sukiyaki.\n\nLe mirin est un produit alcoolisé fabriqué en mixant du riz gluant, du koji de riz Koji et du sochu (saké distillé à 20%). De nos jours il sert principalement pour ajouter du goût et de la douceur à des sauces et bouillons mais historiquement il était également apprécié comme une boisson sucrée.\n\n## Brassage\n\n^cc3bcd\n\nLe mirin est brassé par l'action enzymatique du koji Les enzymes du koji qui agit sur l'amidon du riz gluant pour le saccharifier. L'alcool présent en quantité permet de prévenir l'émergence d'une fermentation qui consommerait ces sucres et assure la conservation du mirin.\n\nLe goût particulier du mirin provient également de l'action des autres Enzymes koji qui va ajouter des acides aminés et des esthers contribuant à sa richesse arômatique.\n\nLa couleur brune ou dorée du mirin provient de la présence de sucre livres et d'acides aminés.\n\nUne fois mixé le mirin est vieilli pendant 3 mois entre 20 et 30°C mais le temps peut varier largement. Une fois finalisé, le mirin est filtré. Les lies (kobore-ume) sont utilisées dans les pâtisseries et les Tsukemono.\n\n## Ingrédients\nMême si les ingrédients traditionnels sont le riz gluant, le koji de riz (Koji) et le sochu, le mirin peut être fabriqué à partir de n'importe qu'elle combinaison de céréale haute en amidonLe substrat du koji, de koji avec une forte production d'amylase et n'importe quel alcool qu'on dilue à 25 / 35%.\n\n## Références\n@umanskyPracticalKoji2021\n@umanskyKojiAlchemyRediscovering2020\n\n## Recettes\n\n```dataview\nLIST FROM Mirin & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Mirin  & #experimentation & !#template\n```"}, {"id": "Miso", "title": "Miso", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "", "body": "# Miso\nLa pâte (au sens de _paste_) amino est une terminologie qui provient du livre Koji Alchemy (voir @umanskyKojiAlchemyRediscovering2020 ) de Shih et Umansky qui désigne globalement tous les misos et équivalent, soit des pâtes de protéines fermentées sous l'effet de l'action enzymatique du Koji et avec le concours de la Lactofermentation.\n\nDerrière le miso se trouve une quantité importante de recettes et de sous-recettes, des plus originales au plus simple. On retrouve souvent une combinaison de Koji de riz ou d'orge avec des Graines de soja.\n\nIl existe plusieurs types de miso traditionnels :\n- Mame miso plus fort qui, s'il est affiné plus longtemps, devient du Hatcho Miso\n- Mugi Miso à base d'orge\n- Genmaï Miso à partir de Riz complet\n- Aka Miso, soit un miso rouge, fermenté longtemps\n- Shiro Miso ou Kome Miso, un miso blanc, moins salé et plus sucré, fermenté moins longtemps.\n\n## Références\n- [@wikipediaSetier2021]\n\n## Journal de bord\n```dataview\nLIST FROM Miso & #experimentation & !#template\n```"}, {"id": "Miso-Chocolate-Fudge", "title": "Miso Chocolate Fudge", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "USA Japon", "body": "Un gâteau intense en goût qui amène une vraie originalité et complémentarité avec le brownie habituel.\n\n## Ingrédients\n\n- 115g de Beurre\n- 10g de cacao non sucré\n- 130g de Chocolat pâtissier 70%\n- 1 cuillère à soupe de Shiro Miso\n- 1 cuilière à café de Doenjang\n- 80g de cassonade ou vergeoise brune ou rapadura\n- 80g de Sucre blanc\n- 2 Oeuf\n- 65g de Farine T45\n- Une pincée de Bicarbonate de soude\n\n## Recette\n\n1. Préchauffer le four à 180°C\n2. Mettre le cacao, le beurre et le chocolat à fondre au bain marie\n3. Ajouter les misos, mélanger puis incorporer les sucres\n4. Ajouter les oeufs l'un après l'autre\n5. Enfin ajouter la farine et le bicarbonate en mélangeant sans forcer et sans insister (viser la juste dissolution de la farine)\n6. Déposer dans un moule graissé puis cuire moins de 20 minutes\n\n## Références\n[@VeganBrothNoodles]\n\n### Variantes\n\n- 50g farine t55\n- 15g farine de seigle\n- penser à incorporer de la poudre de cèpes"}, {"id": "Miso-de-fève", "title": "Miso de fève", "tags": ["fermentation/amino", "recette/fermentation"], "cats": ["fermentation"], "origine": "Japon", "body": "Élaboré à la mode d'un Mame miso, il se base uniquement sur des fèves, du sel et de l'aspergillus sojae (voir Le koji-kin (spores)).\n\n## Ingrédients\n- Koji de fève (utilisant a. sojae)\n- Sel (12%)\n\nUne fermentation de 6 mois au moins est nécessaire. \n\n## Log\n- La première itération de ce ferment a déroulé de Mars 2021 jusqu'à Juillet 2021 (soit environs 4 mois). Une partie de la fermentation a continué au frais. Le miso est très salé (un ajustement de - 1% peut être largement envisageable). Le goût est fort, très prononcé, proche du parmesan. Grosse puissance en umami. Accompagne parfaitement des asperges en Misozuke.\n\n## Références\n- @umanskyKojiAlchemyRediscovering2020\n- @kyungArtFermentation2016\n\n## Voir aussi\nMiso\nKoji\n\n## Recettes\n\n```dataview\nLIST FROM Miso de fève & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Miso de fève  & #experimentation & !#template\n```"}, {"id": "Misozuke", "title": "Misozuke", "tags": ["recette/condiment"], "cats": ["condiment"], "origine": "", "body": "# Misozuke\nLes misozuke sont des légumes (ou autre, fruits et viandes sont possibles) préservés dans un mélange de miso, de mirin, saké, shoyu et condiment complémentaires. Ce mélange constitue un lit dans lequel on plonge des légumes préalablement salés et pressés Salage pour tsukemono. Ils font partie de la famille des Tsukemono.\n\n## Proportions habituelles\nSelon les références, les proportions varient. L'ingrédient commun à la constitution du \"lit\" est le miso. Il peut exister des mélanges tant pour tant de miso jeunes ou vieux. Ma préférence va pour un miso agé, avec du caractère, j'utilise souvent un Miso de fève très puissant en Umami.\n\nLe miso est mélangé à du mirin, saké. Il m'est arrivé d'intégrer du shoyu pour diluer le miso sans trop perdre en umami et en sel.\n\nLes proportions varient énormément de recettes en recettes :\n\n| Sources                                               | Miso                            | Mirin ou Saké par rapport au miso |\n| ----------------------------------------------------- | ------------------------------- | --------------------------------- |\n| @kyungArtFermentation2016                                   | Miso fort                       | 50%                               |\n| @libbyreidZiWuTsukemonoLook2008                                 | Miso (peu importe)              | 25% (50/50 mirin et saké)         |\n| @yellowfarmhouseeducationcenterPicklesTsukemono | 2/3 Miso fort et 1/3 miso jeune | 3,5%                              |\n| JustOneCookbook^@chenTsukemonoMisozukeMiso2019                                       | Miso (peu importe)              | 10%                               |\n\nDes condiments complémentaires peuvent être ajoutés :\n- Libby Reid ajoute de l'ail en quantité\n- JustOneCookbook ajoute du kombu et du Gingembre ainsi que du sucre (optionnel)\n- Jessica Alonzo propose d'ajouter des piments séchés en plus des propositions ci-dessus\n\n## Recettes et expérimentations\nMisozuke d'oignons\nMisozuke d'asperges\n\n## Références\n- @kyungArtFermentation2016\n- @yellowfarmhouseeducationcenterPicklesTsukemono\n- @libbyreidZiWuTsukemonoLook2008"}, {"id": "Misozuke-d-asperges", "title": "Misozuke d'asperges", "tags": ["recette/condiment", "recette/fermentation"], "cats": ["condiment", "fermentation"], "origine": "Japon", "body": "# Misozuke d'asperges\n\n## Ingrédients\n- 300g d'Asperge (une botte en somme)\n- 300g de Miso de fève\n- 100g de Mirin ou 100g de saké (ou vin blanc sec) avec quelques cuillières de sucre\n- du Tamari (ou équivalent) pour diluer le cas échéant\n- des condiments si souhaité : Gingembre, Ail, Kombu\n- du sel fin\n\n## Méthode et étapes\nVoir !Misozuke d'oignons#Méthode et temps de fermentation\n\n## Résultats\nLe misozuke d'asperge est un point de référence tant la version seulement crue sert efficacement de pickles en apéro ou en accompagnement d'un riz blanc. C'est une fusion plus que valide de la cuisine française et japonaise en un sens.\n\n## Références\n- @kyungArtFermentation2016 -> La recette originelle\n- @chenTsukemonoMisozukeMiso2019\n- @libbyreidZiWuTsukemonoLook2008\n- @yellowfarmhouseeducationcenterPicklesTsukemono\n\n## Voir aussi\n- Tsukemono\n- Misozuke\n- Misozuke d'oignons\n\n## Recettes\n\n```dataview\nLIST FROM Misozuke d'asperges & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Misozuke d'asperges  & #experimentation & !#template\n```"}, {"id": "Misozuke-d-oignons", "title": "Misozuke d'oignons", "tags": ["recette/condiment", "recette/fermentation"], "cats": ["condiment", "fermentation"], "origine": "Japon", "body": "# Misozuke d'oignons\nConservation des oignons utilisant la technique du Misozuke.\n\n## Ingrédients\n- Oignons salés suivant la technique de Salage pour tsukemono\n- Miso de fève\n- Saké rustique (mais du Mirin serait plus approprié)\n\n## Méthode et temps de fermentation\nLes oignons ont été pressé pendant 2 heures avant de rejoindre un lit de Misozuke plutôt liquide, détendu à grand renforts de saké, de Mirin et de Shoyu. Ils ont fermenté pendant 2 semaines au frais.\n\n## Résultats et utilisations\nLe rendu cru n'est pas excellent (les oignons ont conservé leur aspect piquant et peu digeste) mais après cuisson Oignons caramélisés au miso, ils sont merveilleux, proche du goût des anchois. Un véritable atout dans la cuisine vegan.\n\n## Références\n- @kyungArtFermentation2016\n- @chenTsukemonoMisozukeMiso2019\n- @libbyreidZiWuTsukemonoLook2008\n- @yellowfarmhouseeducationcenterPicklesTsukemono\n\n## Recettes\n\n```dataview\nLIST FROM Misozuke d'oignons & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Misozuke d'oignons  & #experimentation & !#template\n```\n\n\n## Voir aussi"}, {"id": "Mochi-hawaien-du-koyo", "title": "Mochi hawaien du koyo", "tags": [], "cats": [], "origine": "Fusion", "body": "Un dessert longtemps resté à la carte du Koyo, extrêmement simple à la préparation et à l'envoi, il est facile de le reproduire simplement.\n\n## Ingrédients\n- 450g de farine de Riz gluant\n- 450g de Lait (quelconque)\n- 250g de Sucre blanc\n- 350g de Courge Butternut (ou patate douce)\n- 150g de Beurre fondu ou huile de coco\n- 4 oeufs\n\n## Recette\n\n1. Mélanger l'ensemble des ingrédients dans un blender et mixer longtemps\n2. Cuire dans un four préchauffé à 180°C pendant une trentaine de minutes\n\n## Références \n\n- [@staffordGorgeousHawaiianButter2022]"}, {"id": "Moule-Mapo", "title": "Moule Mapo", "tags": ["recette/bizarre", "bizarre", "recette/tapas"], "cats": ["bizarre", "tapas"], "origine": "", "body": "Une recette à base de moules cuites et un condiment sichuanais inspiré par la préparation du mapo tofu\n## Ingrédients\n- Carottes\n- Céleri\n- Poudre de poivre de sichuan\n- 5 épices\n- Moules cuites façon marinières et décortiquées\n- Gochujang ou kazujang\n- Huile neutre\n- Vinaigre\n- Eau\n- Sucre\n- Ail\n- Gingembre\n\n## Recette\n- Faire une brunoise fine de carottes et céleri\n- Dans une sauteuse napper d'huile et ajouter l'ail et le gingembre hachés fins ainsi que la poudre de poivre de sichuan, les 5 épices\n- Quand la coloration démarre, ajoute le gochujang et mélanger activement, pour plus de complexité possibilité d'ajouter du piment, de la pâte de haricot fermenté (doubanjiang ou miso)\n- Quand le gochujang est bien frit, ajouter les carottes et céleri puis déglacer avec du vinaigre légèrement sucré\n- Faire refroidir le mélange et plonger les moules cuites dedans pour mariner.\n- Servir tel quel ou avec du riz.\n\n## Références\n- Mapo Nasu\n\n## Voir aussi\n- Atelier bizarre\n- Gochujang"}, {"id": "Mousse-au-chocolat-de-la-madre", "title": "Mousse au chocolat de la madre", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "Europe", "body": "Un nouvel épisode dans les Recettes de la madre : une mousse au chocolat simple mais efficace qui gagne en légèreté sans perdre en gourmandise.\n## Ingrédients\n\n- 6 blanc d'Oeuf\n- 200g Chocolat pâtissier (50%)\n- Un peu d'eau\n- *Facultatif car ajout personnel* : Beurre\n\n## Recette\n\n1. Faire fondre au bain marie le chocolat avec un peu d'eau et un peu de beurre (si souhaité)\n2. Monter les blancs en neige bien ferme\n3. Incorporer sans casser les blancs petit à petit et à la Maryse au chocolat fondu.\n4. Faire reposer au nuit au frais pour qu'elle prenne bien\n\n## Références\n\n- Recettes de la madre\n\n## Voir aussi\n\n- Les caillettes de la madre"}, {"id": "Mousse-au-chocolat-shoyu", "title": "Mousse au chocolat-shoyu", "tags": ["recette/koyo", "recette/dessert"], "cats": ["dessert", "koyo"], "origine": "Fusion", "body": "Un riff de la Mousse au chocolat de la madre incluant du Beurre et du Shoyu pour plus de complexité.\n## Ingrédients\n\n- 600g Chocolat pâtissier 70%\n- 550g blanc d'Oeuf\n- 150g Sucre blanc\n- 50g Beurre\n- 30g Shoyu\n## Recette\n\n1. Faire fondre le chocolat au bain marie avec le beurre et le shoyu, mélanger pour obtenir un ensemble lisse et brillant.\n2. Monter les blancs en neige et serrer avec le sucre.\n3. Incorporer les blancs petits à petits dans le chocolat sans les casser.\n4. Laisser figer 3h minimum au frais.\n## Références\n\n- Mousse au chocolat de la madre\n## Voir aussi\n- Koyo"}, {"id": "Mousse-ganachée-au-chocolat-vegan", "title": "Mousse ganachée au chocolat vegan", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "Europe", "body": "Une recette utilisée à l'occasion de la Journée fermentée aux Halles Tropisme 4-11-23 et revisitée ici en suivant un post Instagram. Elle reste gourmande et s'accomoderait bien d'un supplément craquant.\n## Ingrédients\n\n - 200g Chocolat pâtissier\n- 450g lait amande\n- 25g Miel ou 20g de sucre brun ou 25g de Sirop d'érable\n- 20g Sucre blanc\n- 10g Miso\n- 1g Huile de sésame\n## Recette\n\n1. Chauffer le Lait d'amande et fouetter jusqu'à ébullition.\n2. Verser dans un blender dans lequel on aura disposé le chocolat, le sucre, le Miso et l'Huile de sésame.\n3. Mixer à haute vitesse pendant 3 minutes.\n4. Puis faire reposer au frais 6h.\n## Références\n\n- Journée fermentée aux Halles Tropisme 4-11-23\n- Screenshot_20231218-101959.png\n- @ManekiRamenInstagram2023\n\n## Voir Aussi\n\n- Mousse au chocolat-shoyu"}, {"id": "Muffin-Fluffy", "title": "Muffin Fluffy", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "USA", "body": "Une recette de muffin qui respecte réellement l'aspect bien fluffy des muffins originaux. A noter qu'une recette avec de la poudre d'amande permet également un résultat qualitatif de ce point de vue.\n\n## Ingrédients\n\n-   315g Farine T60\n-  10g de Levure chimique\n-   5g de Bicarbonate de soude\n-   3g de Sel\n-   115g de Beurre\n-   200g de sucre\n-   2 Oeuf\n-   250ml de Kéfir de lait (ou à défaut Lait)\n-   5g d'extrait de vanille ou autre arôme (amaretto par exemple) ou rien du tout\n-  275g de Chocolat pâtissier (ou un mélange avec du Chocolat blanc)\n\n## Recette\n1. Préchauffer le four à 220°C\n2. Mélanger la farine, la levure chimique et le bicarbonate avec le sel et les morceaux de chocolat.\n3.  Mélanger dans un bol séparé le beurre fondu, le sucre, les oeufs, le lait et l'arôme supplémentaire (vanille ou autre).\n4. Assembler les deux mélanges en s'assurant de travailler la pâte le moins possible. Faire cette opération à la dernière minute et seulement une fois que le four est chaud.\n5. Cuire les muffins à 220°C pendant 5 minutes puis 190°C pendant 12-15 minutes.\n\n## Référence\n- [@ernstBakeryStyleChocolate2014]"}, {"id": "Mugi-Miso-Mayo", "title": "Mugi Miso Mayo", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Koyo", "body": "Une sauce pour certaines fritures du Koyo qui nous permet d'augmenter une mayonnaise déjà fort bonne et d'apporter une touche d'originalité.\n\n## Ingrédients\n- Mayonnaise Kewpie ou maison\n- Mugi Miso\n- Jus de citron\n- Crème liquide\n\n## Recette\n1. Mélanger l'ensemble des ingrédients sauf la crème, ajuster pour que le goût du miso soit bien présent et que le citron équilibre les saveurs générales en réduisant la sensation de sel.\n2. Ajouter la crème pour assouplir et rendre le tout plus léger en texture."}, {"id": "Mélange-de-base-pour-Curry-Japonais", "title": "Mélange de base pour Curry Japonais", "tags": [], "cats": [], "origine": "Japon", "body": "Un mélange gagnant directement inspiré par le site [NoRecipe](https://norecipes.com/). A noter que d'autres sites pourront alimenter à l'avenir des modifications majeures concernant le mélange d'épice. L'équilibre est ici très satisfaisant et représente une base solide sur laquelle on peut élaborer des recettes plus complexes.\n\nCette recette pourra donc servir à l'élaboration de curry japonais végétariens ou non, doux ou fort (l'ajout d'épice pouvant être fait à postériori).\n\n>[! Info] A noter que le Piment de cayenne a été remplacé par du paprika doux, la peau d'orange supprimée (malheureusement car difficile à sourcer) et le allspice plus ou moins écarté (difficile à sourcer également).\n\n## Ingrédients\n\n- 20 g Curcuma \n- 14 g Cumin\n- 12 g Graines de coriandre\n- 10 g peau d'orange ou de mandarine séchée\n- 5 g Graines de Fenugrec\n- 5 g Graines de fenouil\n- 4 g Cannelle\n- 4 g Paprika doux\n- 3 g Ail séché\n- 3 g Gingembre séché\n- 3 g Aneth séchée\n- 2 g Allspice\n- 2 g Cardamome\n- 2 g Clous de girofle\n- 2 g Anis étoilé\n- 2 g Sauge séchée\n- 2 g Thym\n- 2 g noix de muscade\n- 2 g poivre noir\n- 2 g Feuille de laurier\n\n## Recette\n\n- Moudre les épices et les passer au tamis, puis moudre les restes\n- Mélanger l'ensemble des épices et les passer à la poêle bien chaude avec un peu d'huile\n- Toujours mélanger et arrêter la cuisson quand une odeur marquée émane de la poêle\n- Laisser retourner à température puis transférer dans un bol\n\n## Références\n\n[@marcHowMakeJapanese2021]\n\n## Voir aussi\n\n- Poudre de cinq épices\n- Garam Masala"}, {"id": "Nanbanzuke-de-Maquereau", "title": "Nanbanzuke de Maquereau", "tags": [], "cats": [], "origine": "Japon", "body": "Une recette fraîche et agréable qui gagne à être dégustée en été ou au printemps. Simple à préparer, elle est aussi facile à l'envoi. Une recette a certainement considérer pour le Koyo. Le maquereau peut être échangé avec les poissons qui supportent bien la friture ou même (à vérifier) avec du tofu frit.\n\n## Ingrédients\n\n- 250g filets de Maquereau coupés en morceaux d'une bouchée\n- 60g Carotte en julienne\n- 60g Concombre en julienne\n- 90g oignons émincés finement (ou de la ciboule finement coupée)\n- 1  Piment rouge séché (*facultatif*)\n- Marinade\n\t- 45ml de Bouillon dashi\n\t- 45ml de Shoyu\n\t- 45ml de Vinaigre de riz\n\t- 30ml de saké\n\t- 15ml de Mirin\n\t- 18g de Sucre blanc\n- QS Farine\n- Huile neutre\n\n## Recette\n\n- Préparer la marinade et mélanger les légumes avec.\n- Préparer la friture autour de 180°C\n- Fariner les morceaux de maquereau et les faire frire. Déposer sur un papier absorbant ou une grille.\n- Mélanger le maquereau frit dans les légumes et la marinade, laisser reposer 15 minutes au minimum et toute la nuit de préférence.\n- Servir froid ou à température.\n\n## Références\n-  [@yumikoNanbanzukeMarinatedFried2017]\n\n## Voir aussi\n- Saba no Misoni"}, {"id": "Nanbanzuke-sauce-du-Koyo", "title": "Nanbanzuke sauce du Koyo", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "Sauce marinade pour le nanbanzuke du Koyo, ici ce sont les proportions d'Ayaka. C'est clairement une autre approche que le Nanbanzuke de Maquereau qui est plus complexe. Ici on supprime le temps de marinade du poisson, en le trempant après cuisson et en le servant ensuite. La même logique de julienne de légume dans la marinade s'applique avec ce qui semble pertinent en l'état.\n## Ingrédients\n\n- 60g eau dashi ou bouillon poisson\n- 30g vinaigre de riz\n- 20g sucre\n- 10g shoyu\n- Julienne de légume à hauteur\n\n## Voir aussi\n- Koyo\n- Nanbanzuke de Maquereau"}, {"id": "Nasu-Donburi", "title": "Nasu Donburi", "tags": ["recette/koyo", "recette/plat", "recette/vegan"], "cats": ["koyo", "plat", "vegan"], "origine": "Japon", "body": "# Nasu Donburi\n\nUn Donburi vegan adapté à la
