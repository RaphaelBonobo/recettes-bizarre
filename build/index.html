cre blanc\n- 2 part d'eau\n- 10% (du poids en eau) de Gochugaru\n## Recette\n- Porter à ébullition et laisser infuser\n- Filtrer et utiliser\n- Possibilité d'ajouter, comme pour le Rayu, d'autres éléments complémentaires\n\n## Référence\n- Pour le coup la référence vient de Hugo de myfermentation à Paris qui, en partageant son kombucha pimenté, a permis des idées originales.\n\n## Journal de bord\n```dataview\nLIST FROM Sirop de gochugaru & #experimentation & !#template\n```"}, {"id": "Sirop-de-shiso-x-perilla", "title": "Sirop de shiso x perilla", "tags": ["recette/boisson"], "cats": ["boisson"], "origine": "Asie", "body": "Un sirop simple, directement inspiré du Koyo et qui se veut rafraîchissant.\n## Ingrédients\n\n- 600g d'eau\n- 500g de sucre blanc\n- 40g de feuilles de shiso (perilla)\n## Recette\n\n1. Faire bouillir le sucre et l'eau\n2. Jeter les feuilles dans la casserole, et reporter à ébulition.\n3. Arrêter et laisser reposer une nuit ou plus (au frais de préférence) pour obtenir une belle infusion.\n4. Conserver au frais.\n## Voir aussi\n\n- Une version en mode Cheong ou Koso Dorinku devrait être envisagée en intégrant un fruit qui obtient une bonne synergie avec le shiso (une poire probablement)."}, {"id": "Skinny-Nouilles-du-Koyo", "title": "Skinny Nouilles du Koyo", "tags": ["recette/koyo", "recette/pate"], "cats": ["koyo", "pate"], "origine": "Japon", "body": "# Skinny Nouilles du Koyo\n\nUne variation des nouilles classiques du Koyo plus orienté sur la finesse en cohérence avec un bouillon chintan et plus globalement un Shio Ramen. Bien que la master recette puisse contenir du seigle, ici il s'agit d'une recette pure en blé blanc pour un Slurp maximal.\n\n## Ingrédients\n- Master recette des nouilles sans ajout de seigle ou de torréfaction\n\n## Recette\n1. Conserver la Master recette avec de la farine T45 pour la partie complémentaire.\n2. Abaisser une première fois au maximum puis pour la seconde abaisse, utiliser le réglage le plus fin puis laminer.\n3. Cuire entre 1min30 et 1min40 au maximum.\n\n## Références\nMaster Nouilles du Koyo"}, {"id": "Sorbet-au-chocolat", "title": "Sorbet au chocolat", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "Merveilleux", "body": "## Ingrédients\n- 550ml d'eau ou de Lait\n- 100g de sucre complet (muscovado ou rapadura)\n- 50g de Sucre blanc\n- Pincée de sel\n- 75g de cacao en poudre\n- 170g de Chocolat pâtissier le plus noir et intense possible\n- 30g de Chocolat pâtissier découpé en copeaux\n- 15ml de Mirin\n\n## Recette\n- Porter l'eau à ébulition avec le sucre, le cacao, le sel et le mirin\n- Mélanger au fouet et verser sur le chocolat dessert (170g) découpé en morceaux et mélanger jusqu'à ce qu'il est complètement fondu\n- Laisser refroidir complètement au frigo puis passer à la sorbetière, ajouter à la fin les copeaux de chocolat\n\n## Références\n[@davidChocolateSorbetRecipe2009]"}, {"id": "Sorbet-de-fraise-et-cardamome", "title": "Sorbet de fraise et cardamome", "tags": [], "cats": [], "origine": "Europe", "body": "## Ingrédients\n\n- 750g de pulpe de fraise obtenue en passant près d'1 kilos de fraises à l'extracteur de jus\n- 150g de sucre\n- 20g gélifiant pectine\n- une pincée de cardamome\n\n## Recette\n\n## Références\n\n## Voir aussi\n- Glace Fior di latte"}, {"id": "Soupe-de-maïs", "title": "Soupe de maïs", "tags": [], "cats": [], "origine": "Asie", "body": "La soupe de Maïs n'est pas vraiment une recette à l'adn japonais en principe mais quand on réalise le principe de ce plat, on réalise plutôt vite la composante nippone. C'est doux, c'est léger, c'est sucré et c'est chaud, on comprend que ce soit aussi populaire et particulièrement au Japon où la saveur unique et approfondie est un must[^1]. Il s'agit également d'une recette à l'essai au Koyo.\n## Ingrédients\n\n- 2 Maïs frais \n- 1 Oignon doux\n- QS Saké\n- QS Beurre\n- QS Crème liquide\n## Recette\n\n1. A l'aide d'un couteau retirer les grains de maïs du coeur et les mettre à cuire sur une plaque au four pendant 15 minutes en ayant préalablement arrosé d'Huile d'olive et de sel.\n2. Pendant ce temps faire revenir les oignons dans du beurre et avec le coeur des maïs, quand les oignons sont translucides, ajouter du saké pour déglacer.\n3. Verser le maïs sur les oignons, faire revenir 30 secondes avant d'ajouter l'eau de sorte à bien immerger les ingrédients.\n4. Faire mijoter +30minutes (en fonction du temps disponible) puis passer au blender en ayant pris soin de retirer les coeurs de maïs.\n5. Filtrer, faire réduire et ajouter la crème pour atteindre la consistance souhaitée.\n\n## Références\n\n- @namiCornPotageKonpotaziyu2017\n\n\n[^1]: Voir à ce sujet Approche japonaise du goût vs Approche chinoise"}, {"id": "Soupe-de-poisson-parfumée", "title": "Soupe de poisson parfumée", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Sud de France", "body": "# Soupe de poisson parfumée\n\n## Ingrédients\n- 6 Crabes enragés\n- 1 carcasse de Congre\n- 2 carcasse de Mulet\n- 15 cl de Vin blanc\n- Le moût d'un Jiuniang (500g environ)\n\n## Recette\n1. Faire revenir dans de l'huile d'olive les crabes et les carcasses puis mouiller à hauteur avec le vin blanc et de l'eau.\n2. Faire mijoter le plus longtemps possible à feu doux.\n3. Mixer le tout au blender, passer et filtrer\n4. Faire mijoter à feu doux avec du safran et déguster.\n\n```ad-note\ntitle: Facultatif\n\nSi possible en fin de cuisson avant de mixer ajouter du riz ou du moût d'Amazaké ou encore de Jiuniang qui va apporter une sucrosité complémentaire en fin de cuisson ainsi que du corps à l'ensemble.\n\n```\n\n## Références\nLe pêcheur de La criée de Palavas et la Cuisine provençale\n\n## Voir aussi\n\n## Journal de bord\n```dataview\nLIST FROM Soupe de poisson parfumée & #experimentation & !#template\n```"}, {"id": "Sweet-Dark-Japanese-Curry-Sauce", "title": "Sweet Dark Japanese Curry Sauce", "tags": ["recette/koyo", "recette/vegan", "recette/sauce"], "cats": ["koyo", "sauce", "vegan"], "origine": "Japon", "body": "Un curry polyvalent, végétarien et plein de saveurs. Il se repose fortement sur l'utilisation de bloc de roux de curry Java Curry et appelle forcément au développement d'une version complètement maison. Servi au Koyo dans plusieurs versions végétarienne.\n## Ingrédients\n\n> [!i] Pour 5-6L de préparation\n\n- 5L de Bouillon végétarien\n\t- Kombu\n\t- Shiitake\n\t- Cèpes séchés\n\t- Légumes multiples :\n\t\t- Oignon\n\t\t- Ail\n\t\t- Gingembre\n\t\t- Verts de Poireau\n\t\t- Carotte\n- Base aromatique\n\t- 100g Ail\n\t- 100g Gingembre\n\t- 5 gros oignons\n\t- 100g Concentré de tomate\n\t- 100g pâte Ail noir\n\t- 15cl Shoyu\n\t- 15cl Mirin\n\t- 10cl saké\n\t- 1 pomme gala (de préférence plutôt portée sur le sucre et la saveur douce)\n- Ajustement aromatiques\n\t- Poivre\n\t- Cannelle\n\t- Dark mushroom soy sauce\n- Roux de curry\n\t- 500g de Java Curry\n\t- 1 expresso café\n\t- 50 à 100g de chocolat noir\n## Recette\n\n1. Lancer le Bouillon et porter à léger frémissement et maintenir pendant 1h idéalement\n2. Emincer finement les oignons et les faire sauter dans une casserole avec beaucoup d'huile avec une bonne pincée de sel, de Poivre et de sucre ainsi qu'un batonnet de Cannelle (voire de la badiane aussi) jusqu'à belle coloration.\n3. Préparer la pâte aromatique en mixant l'ensemble des ingrédients de la base aromatique.\n4. Ajouter la pâte aromatique et faire réduire jusqu'à obtenir une belle caramélisation. Ajouter ensuite le Bouillon filtré et porter à ébulition.\n\t1. Il est possible de faire cuire les légumes directement dedans.\n5. Ajouter les éléments du roux de curry et porter à nouveau à ébullition. Corriger l'assaisonnement avec de la dark mushroom soy sauce jusqu'à obtenir le bon équilibre.\n6. Servir avec des légumes rôtis et un Oeuf (soit un Oeuf Onsen soit une omelette)\n\n## Voir aussi\n- Koyo\n- Recherche pour un Omu Curry\n- Mélange de base pour Curry Japonais"}, {"id": "Sweet-Lazy-Kosho-Sauce", "title": "Sweet Lazy Kosho Sauce", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Corée", "body": "Une variation de la sauce Orenji Sauce plus accentuée côté yuzu kosho notamment et le côté citron. Développée pendant le Menu Koyo Janvier 2024.\n## Ingrédients\n\n- 60g Beurre\n- 14g Miel\n- 50g sucre\n- 2 gousses d'Ail\n- 10g Shoyu\n- Mélange Yuzu kosho\n\t- Maison\n\t\t- 40g Yuzu Kosho (en l'occurence du 141123-K Lazy Kosho Jalapeno Edition)\n\t\t- 40g jus de citron ou ponzu (ajuster en fonction de l'acidité voulue)\n\t- Déjà préparé\n\t\t- 30g sauce yuzu kosho liquide\n\n## Recette\n\n1. Faire cuire doucement l'ail haché dans le beurre jusqu'à ce qu'il soit doré\n2. Le débarrasser (filtrer à la passoire) et ajouter le reste des ingrédients\n3. Porter à ébullition et caramélisation\n4. Réserver avant utilisation\n## Références\n\n- @maangchiHoneyButterFried\n\n## Voir aussi\n- Koyo"}, {"id": "Sweet-Miso-Koyo-Tare", "title": "Sweet Miso Koyo Tare", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "Un miso Tare inspiré par RamenLord et modifié en suivant les préceptes du Koyo : more meat 🍖.  Un bon succès jusqu'à présent, des notes sucrées. Servi avec une Negi oil ou une Rayu et un Bouillon riche.\n\n## Ingrédients\n- 500g de Shiro Miso\n- 200g de Saikyo Miso\n- 50g Mame miso\n- 100g de Mirin\n- 100g de Shoyu\n- 100g de jus de cuisson de porc\n- 100g de Bouillon dashi (on pratique avec 1% de Dashi en poudre)\n- 200g de saké\n- 40g de Tahini\n- 20g de sel\n- 30g d'Huile de sésame\n- 30g d'huile neutre\n- 15g de Rayu\n- Poivre noir\n- Sichimi\n\n### Variations pour la maison\n#### Divisé par 4\n- 125g Shiro Miso\n- 50g de Saikyo Miso\n- 12g de mame Miso\n- 25g de Mirin\n- 25g de shoyu\n- 25g de Bouillon\n- 25g de dashi\n- 50g de saké\n- 10g de Tahini\n- 5g de sel\n- 7g d'Huile de sésame\n- 7g d'huile neutre\n- 4g de Rayu\n- Poivre noir\n- Sichimi \n\n\n## Recette\n1. Mélanger et faire cuire doucement pour viser l'évaporation\n\n## Références\n- @satinoverBookRamen2020\n\n## Voir aussi\n- Shio Koji Koyo Tare\n- Sake Shio Koyo Tare\n- Variation vegan :\n\t- Sweet Miso Koyo Tare Vegan Edition"}, {"id": "Sweet-Miso-Koyo-Tare-Vegan-Edition", "title": "Sweet Miso Koyo Tare Vegan Edition", "tags": ["recette/koyo", "recette/sauce", "recette/vegan"], "cats": ["koyo", "sauce", "vegan"], "origine": "Japon", "body": "Une version amendée et modifiée d'une base miso classique (voir Sweet Miso Koyo Tare) pour cadrer avec le profil de goût du Bouillon Vegan Savoureux du Koyo. Elle apporte du corps et de la force au bouillon, de sorte que le résultat devient très satisfaisant.\n\n## Ingrédients\n\n### Nouvelle version\n- 2,5kg de Aka Miso\n- 1kg shiro miso\n- 500g de dark shiro miso\n- 1000g de bouillon vegan ou de dashi kombu\n- 800g de saké\n- 400g de Mirin\n- 600g de usukuchi\n- 150g sucre\n- 400g de Shoyu\n- 200g de Tahini\n- 100g de sel\n- 150g d'Huile de sésame\n- 150g Negi Oil Koyo\n- 50g de Levure maltée\n- Poivre noir\n- Sichimi\n\n### Ancienne version\n- 1kg de Shiro Miso\n- 200g de mugi miso\n- 200g de aka miso\n- 100g Mame miso\n- 500g de bouillon vegan ou de dashi kombu\n- 200g de Mirin\n- 200g de Shoyu\n- 200g de usukuchi\n- 400g de saké\n- 100g de Tahini\n- 50g de sel\n- 60g d'Huile de sésame\n- 60g d'huile neutre\n- 30g de Rayu\n- 30g de Levure maltée\n- Poivre noir\n- Sichimi\n- *Variation adoucie*\n\t- 1L de Lait de soja\n\n## Recette\n1. Mélanger et faire cuire doucement pour viser l'évaporation\n\n## Références\n- @satinoverBookRamen2020\n\n## Voir aussi\n- Koyo\n- Sweet Miso Koyo Tare\n- Bouillon Vegan Savoureux du Koyo"}, {"id": "Take-Age", "title": "Take Age", "tags": ["recette/koyo", "recette/vegan", "recette/tapas"], "cats": ["koyo", "tapas", "vegan"], "origine": "Japon", "body": "Plat testé à la maison puis proposé au Koyo avec succès.\n\n## Ingrédients\n- Pleurote \n- Ail (haché fin)\n- Gingembre (haché fin)\n- Huile de sésame\n- Sauce soja\n- Sichimi\n- Fécule de pomme de terre\n\n## Recette\n1. Détailler grossièrement les pleurotes en de grosses branches en les déchirant à la main dans le sens des fibres.\n2. Les faire mariner avec le reste des ingrédients pendant une petite heure puis conserver au frais jusqu'à utilisation.\n3. Fabriquer des grumeaux de fécule de pomme de terre comme on le ferait pour les kara age du koyo, enrober les champignons et les mettre à frire.\n4. Une seule friture est nécessaire mais il faut bien pousser pour obtenir une belle caramélisation.\n5. Il est absolument nécessaire de bien enrober les pleurotes de fécule pour éviter qu'elles n'absorbent trop d'huile.\n6. Servi avec une Mugi Miso Mayo\n\n## Références\n- Le compte instagram de Sampanzer qui m'a inspiré\n\n## Voir aussi\n- Kara Age façon Koyo Fried Chicken"}, {"id": "Takoyaki", "title": "Takoyaki", "tags": ["recette/plat"], "cats": ["plat"], "origine": "Japon", "body": "Petite boule cuites japonaises fourrées traditionnellement au Poulpe blanchi mais qui peuvent connaître un grand nombre de déclinaisons. Ces petites boules m'ont accompagnées pendant tout mon master 2 et représentaient un grand moment de réconfort pour moi, surtout celles au Thon émietté et aux crevettes. Peut connaître une déclinaison vegan ou végétarienne en subsituant le dashi par un Bouillon de Kombu shiitaké.\n## Ingrédients\n\n### Pâte à Takoyaki (pour 2 personnes)\n\n- 120g de Farine T60\n- 360ml de dashi\n- 5ml de Shoyu\n- Une pincée de sel\n- 5g de Levure chimique\n- 2 Oeuf\n\n### Fillings\n\n- Crevettes (crues idéalement)\n- Thon en boîte\n- comte\n- Kimchi (Kimchi d'écorce de pastèque par exemple)\n- Champignons\n\n## Recette\n\n- Réunir l'ensemble des ingrédients de la pâte au blender et utiliser directement ou conserver au frais avant utilisation.\n\n## Références\n\n- @chenTakoyakiRecipeVideo2016 > Comme d'habitude, la marmiton japonaise : namiko chen\n## Voir aussi\n\n- Okonomiyaki"}, {"id": "Tantanmen-bizarre", "title": "Tantanmen bizarre", "tags": ["recette/bizarre"], "cats": ["bizarre"], "origine": "Bizarre", "body": "# Présentation\n\nLes ramens sont un point important de ma vie de Raphaël. Ayant effectué sa reconversion heureuse au sein du Koyo Izakaya, ces derniers sont un des plats que j'ai le plus préparé, toujours avec amour et passion.\n\nNous n'allons pas faire ici l'historique des ramens, ce serait trop long et bien d'autres ouvrages le font, mais sachez que pour la petite histoire cette recette bizarre trouve sa raison d'être à la suite d'un \"affrontement\" ou d'une \"battle\" durant laquelle, alors que j'étais récemment parti du Koyo, je faisait face à l'un de ses nouveaux cuisiniers, le très talentueux Fred Titaud.\n\nPris de peur à l'idée de perdre, j'ai choisis une recette populaire et je l'ai pimpée pour que l'ensemble de mes produits trouvent leur place dans ce mix. En me reposant sur des fondations stables modifiées pour l'occasion, j'ai pu apporter avec mes produits un parfum floral sur un ramen habituellement très gras.\n\nSatisfait de ce mix, je vous propose ici une version totale dans la mesure où chaque élément contient des éléments fermentés. La recette est longue car meme si les ramens sont un plat du quotidien, ils sont rarement préparés en de petites quantités. Mais si le plaisir de manger cet itération bizarre vous emporte, voici comment faire.\n\n### En préambule, une petite explications des fondamenteux des ramens\n\nLes ramens sont constitués par la rencontre heureuse de cinq éléments : le bouillon, le tare, l'huile aromatique, le chachu (ou plus généralement le topping principal protéiné), les nouilles. L'approche japonaise prete une attention scrupuleuse aux détails et au respect de ces éléments. Pour être respecté, un ramen se doit d'être minimaliste dans ses toppings, sans que cela ne veuille dire radin. C'est ainsi qu'un choisit trois à quatre topping maximum et c'est tout.\n\nLes ramens ne laissent pas la place aux bouillons typiques de l'asie du sud est fantasmée par l'Europe, donc non, Jamie Oliver : pas de citronelle dans le ramen, du moins si vous souhaitez préparer la version traditionnelle, roborative, réconfortante, satisfaisante et, finalement, relaxante.\n\nMes modifications, je le crois, sont acceptables dans un cadre japonais et n'introduisent pas trop de bruit ni de nuisance à l'harmonie des gouts et des saveurs. En espérant que ce long processus ne vous paraisse pas trop interminable.\n\n### Le cas spécifique du Tantanmen\n\nLa variante japonaise du tantanmen est un Ramen qui a été influencée par la cuisine de la région de Sichuan en Chine, mais elle a évolué pour s'adapter aux préférences gustatives japonaises.\n\nLe tantanmen japonais se caractérise par des nouilles servies dans un Bouillon épicé et crémeux (plutôt kotteri) à base de pâte de sésame et d'huile de Piment.\n\nLes garnitures comprennent généralement du porc haché, du bok-choi ou des épinards ainsi que de la ciboule. Il offre un mélange unique de saveurs audacieuses, d'épices et de textures, ce qui en fait une expérience culinaire délicieusement gratifiante pour ceux qui aiment les plats épicés.\n\n# Recette\n\n## Ingrédients\n\n- Nouilles au Levain (voir nouilles-au-levain-agropol-eat-2024)\n\t- 280g eau\n\t- 950g farine\n\t- 50g Kansui liquide\n\t- 100g levain liquide\n\t- 40g Gluten\n\t- 10g sel\n- Bouilon de qualité\n\t- 1 carcasse de poulet\n\t- des os de porc (Pieds de porc idéalement aussi)\n- Topping selon vos spécificités :\n\t- 250g Tofu soyeux\n\t- 250g Shio koji\n\t- 250g champignon de paris\n\t- 1kg chair à saucisse non assaisonnée\n\t- 20g ail\n\t- 20g Gingembre\n\t- 1 Oignon\n- Tare Shio Pas Poisson\n\t- 30cl de sauce pas poisson\n\t- 10cl bouillon d'algue\n\t- 50g mirin\n\t- 100g saké\n\t- 50g sel\n\t- 10g sucre\n- Lait de soja\n- Huile aromatique\n\t- 1 petit bâton de Cannelle cassia\n\t- Une petite pincée de Poivre de Sichuan\n\t- Quelques branche Anis étoilé\n\t- 4 gousse d'Ail\n\t- Une pincée de Poivre noir non moulu\n\t- 10g de Gochugaru\n\t- 1g sel\n\t- 2g Sucre blanc\n\t- 220g huile neutre\n\t- 200g Bizarissa\n\n## Recette\n\nLa spécificité du Tantanmen Bizarre est qu'il se focalise sur les esthers floraux des différents composants. Une déclinaision entièrement végétarienne est possible ici bien que allons favoriser l'approche avec du porc en premier lieu.\n\n### Bouillon\n\n1. Faire chauffer les carcasses de poulet et les os de porc dans un premier bain, quand tout arrive à ébullition, égoutter et se débarasser de la première eau. Rincer et remouiller à hauteur. Une fois la première ébullition atteinte, baisser le feu et ajouter les légumes, laisser mijoter quelques heures, autant que vous pouvez.\n2. Filtrer, et réserver au frais assez rapidement.\n\n*voir Bouillon de poulet Koyo Shio Ramen*\n\n### Nouilles\n\n1. Assembler les ingrédients liquides\n2. Assembler les ingrédients solides\n3. Mélanger les deux sans essayer de former une boule tout de suite. Prendre le temps de bien disperser l'eau et de bien humidifier toute la farine. Utiliser les méthodes de sablage avec le bout des doigts.\n4. Une fois que tout est bien dispersé, former une boule et bien écraser.\n5. Aplatir d'abord au rouleau à pâtisserie puis abaisser progressivement de plus en plus serrés dans la machine à pâte.\n6. Replier la machine sur elle même de sorte à former un carré qui fait la largeur de la machine.\n7. Abaisser plusieurs fois jusqu'à l'épaisseur souhaitée (2 ou 3 derniers crans des machines).\n8. Passer à laminoir à spaghetti, fariner légèrement avec de la fécule de pomme de terre, puis replier et mettre au frais.\n\n### Tare\n\n1. Faire évaporer le mirin et le saké en les faisant bouillir à grand feu, vous pouvez faire flamber si vous n'avez pas peur des flammes. Débarasser, ajouter la sauce pas poisson, le sel et le sucre. Remuer hors du feu jusqu'à dissolution et laisser reposer une nuit. Pour un extra boost de saveur ajoutez un peu de kombu et de shiitaké déshydraté.\n\nvoir Sake Shio Koyo Tare\n\n### Rayu Spéciale\n\n1. Préparer une rayu\n\t1. Faire revenir la Cannelle et l'anis étoilé ainsi que le Poivre noir, puis arroser d'un peu d'eau et amener à réduction.\n\t2. Verser l'huile froide et ajouter la gousse d'Ail puis amener l'huile jusqu'à une température haute mais pas bouillante.\n\t3. Quand l'huile est bien chaude la verser sur le Gochugaru mélangé à l'huile neutre, au sel, au sucre, au Shoyu et au Poivre de sichuan.\n\t4. Laisser redescendre à température puis infuser une nuit idéalement.\n2. Mélanger tant pour tant avec la bizarissa pour obtenir votre huile aromatique\n\nvoir Rayu\n\n### Topping principal\n\n1. Mélanger le porc haché avec le shio koji et laisser mariner au frais pendant une nuit.\n2. Préparer une duxelle de champignon, et si vous en avez, vous pouvez ajouter des champignons noirs réhydratés au mix.\n3. Hacher l'ail, le gingembre et l'oignon\n4. Faire revenir le tout dans un wok idéalement en commencant par le mélange ail, gingembre, pomme et oignon, puis ajoutez la duxelle et enfin le porc ainsi que le tofu\n5. Quand le porc a bien rendu son eau et qu'il a correctement caramelisé, ajustez l'assaisonnement avec du sel, du sucre, potentiellement de la pâte de miso et surtout du poivre\n6. Débarrasser et réchauffer doucement avant l'envoi\n\n### Assemblage\n\n1. Réchauffer le bouillon\n2. Déposer dans les bols à ramen 5cl de tare, 1cl de rayu, 8cl de lait de soja\n3. Lancer la cuisson des nouilles dans des paniers prévus à cet effet pendant 1 minute et 30 secondes\n4. Déposer 33cl de bouillon dans les bols le temps de la cuisson des nouilles\n5. Egoutter les nouilles proprement et nettement\n6. Les déposer dans le bol et les arranger aussitot avec un geste net\n7. Ajouter porc haché, une bonne cuillière, des boks choi tout juste pochés, des kikurage si vous le souhaitez et un oeuf ajitama ainsi que de la ciboule\n8. Servez rapidement\n\n## Références\n\n- @satinoverBookRamen2020\n\n## Voir aussi\n\n- Ramen"}, {"id": "Tantanmen-Koyo-Tare", "title": "Tantanmen Koyo Tare", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "Il s'agit d'un Tare visant à assaisonner un Tantanmen du Koyo. Il représente un embranchement suite à une première proposition de base par ailleurs trop complexe et trop diluée. Ce tare est plus abouti et propose un ramen final équilibré et puissant. Les notes piquantes pourraient être augmentées par l'augmentation de gochujang. Par ailleurs, une pointe d'acidité se retrouve généralement dans les tare de tantanmen, il y a donc une réflexion à avoir pour intégrer du Vinaigre par exemple.\n\n## Ingrédients\n\n- 500g Shoyu\n- 450g Tahini\n- 200g Mirin\n- 100g Beurre de cacahuète\n- 100g Huile de sésame\n- 50g Gochujang\n- 50g sel\n- 20g Sucre blanc\n- 10g Dashi en poudre\n\n## Recette\n\n1. Assembler les éléments\n2. 10cl pour 350ml de bouillon environ\n\n## Voir aussi\n\n- Koyo"}, {"id": "Tartare-de-saumon-estival", "title": "Tartare de saumon estival", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "Fusion", "body": "Le tartare de Saumon est simple à exécuter mais trouver un équilibre n'est pas toujours aisé. Le gras du saumon appelle l'acidité, le sel et l'Umami mais la balance peut vite s'effondrer. Léo a alors soumis au Koyo l'idée d'intégrer au saumon coupé en dés une huile vierge au Shiso dans laquelle on ajouterait une brunoise de fruit et légume ainsi que des pointes de sauce Abricot fermentée (en l'occurrence 18723 Spicy Apricot x Sichuan). Heureux malentendu Goffre se propose pour exécuter le plat mais effectue une huile verte et non une sauce vierge. On obtient alors une huile verte au shiso à laquelle on intègre de l'umesu (issue de 20723-K Abricoboshi), dunjus de yuzu et une brunoise de fruit. Le saumon est mis à mariner avec l'ensemble et cela donne un très bon résultat.\n\n## Ingrédients\n\n- 500g Saumon frais et cru, plutôt éviter la ventreche\n- Une Nectarine\n- Un demi Oignon rouge\n- Un quart de Poivron jaune\n- Une demie pomme verte\n- Huile verte de Shiso\n- Huile d'olive\n- Concentré de yuzu\n- Graines de sésame\n- Daikon cress pour le dressage\n- 18723 Spicy Apricot x Sichuan\n- Ume-su\n- Sel\n\n## Recette\n\n1. Détailler les fruits et légumes en brunoise\n2. Détailler le saumon en petits cubes\n3. Préparer la sauce vierge en assemblant l'huile verte, l'huile d'olive, le yuzu, le sel, l'umesu, les graines de sésame et la brunoise.\n4. Diviser le saumon en cinq portions égales et verser la sauce vierge équitablement sur ces portions. Laisser mariner deux minutes avant dressage.\n5. Au dressage, verser un trait d'huile verte autour du saumon et ajouter des pointes de sauce abricot, finaliser avec du Sichimi, du bubu arare et des feuilles de daikon cress.\n\n## Référence visuelle\n\n!PXL_20230825_172107992~2.jpg\n\n## Voir aussi\n- Koyo"}, {"id": "Tebamoto-Age", "title": "Tebamoto Age", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "Japon", "body": "Des pilons d'aile de Poulet (ou des ailes de poulet tout simplement) marinés 48h avant d'être frits puis servis avec des toppings variables ou une sauce généreuse.\n## Ingrédients\n\nMarinade pour 60 ailes :\n- 400g saké\n- 400g Mirin\n- 180g Shoyu\n- 20g sel\n## Recette\n\n1. Mettre les ailes en marinades au frais pendant 48h\n2. Les éponger assidûment à la sortie de la marinade et les mettre en friture à 150°C pendant 3 minutes ou jusqu'à une première belle coloration.\n3. Laisser reposer puis relancer une friture à 160°C pendant 1 minutes ou jusqu'à une coloration bien avancée\n4. Saupoudrer d'un mélange sel, sucre, sichimi ou simplement arroser d'une sauce style Orenji Sauce ou Sweet Lazy Kosho Sauce.\n\n## Voir aussi\n- Koyo"}, {"id": "Tepache", "title": "Tepache", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "Amérique du sud", "body": "Une boisson fermentée délicieuse qui pétille fortement et se transforme vite avec un goût acidulé puissant. Elle incarne à la perfection la démarche de réduction des déchets. Elle est relativement ancienne et date de la période pré-colombienne. Originellement fabriquée avec du maïs cette recette a évolué avec le temps. Elle est très populaire à Mexico où elle est vendue dans la rue.\n## Ingrédients\n\n### Recette\n\n- Une écorce et cœur d'Ananas\n- 160g de sucre muscovado (idéalement)\n- 1l d'eau\n- Un bâton de Cannelle\n- Un clou de girofle\n- Un Anis étoilé\n- Un fruit supplémentaire en fonction des besoins\n\n### Ratio\n\n- Un ananas par litre d'eau\n- 16% de sucre par litre d'eau\n\n## Recette\n\n1. Faire un sirop avec de l'eau et le sucre\n2. Déposer les écorces dans le bocal et verser le sirop refroidit dessus, fermer hermétiquement et laisser fermenter\n\n## Références\n\n- @katzFermentationsLegumesFruits2018\n\n## Voir Aussi\n\n- 26823-K Orange Tepache\n- 19124 Tepache Ananas Mangue"}, {"id": "Terrine-de-foie-de-poulet-du-Koyo", "title": "Terrine de foie de poulet du Koyo", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "Fusion", "body": "Une terrine de foie de Poulet qui est vendue dans le cadre de l'omakase Yakitori au Koyo. La recette est directement inspirée par Kono.\n## Ingrédients\n\n- 500g Foie de Poulet\n- 500g de Haut de cuisse (et / ou blanc de Poulet)\n- 125g Champignon (déjà cuit, confits à l'huile ou autre)\n- 125g de Kikurage\n- 150g de Shiro Miso\n- 80g échalottes\n- 100g Gésier de poulet confit\n- Umeshu pour déglacer\n- 2g Poivre\n- 100g Beurre\n\n## Recette\n\n1. Emincer finement les échalotes et les faire blondir avant d'ajouter les foies de poulet. On marque de chaque côté dans une poêle très chaude avant de déglacer à l'umeshu.\n2. A part on hache grossièrement les champignons et kikurage ainsi que la chair de poulet que l'on détaille en gros morceaux.\n3. On mélange ces deux préparations ensemble que l'on passe au hachoir grosse grille.\n4. Une fois la farce prête, ajouter le beurre fondu, le miso, les gésiers découpés en morceaux grossiers ainsi que le poivre. Bien mélanger à la main.\n5. Etaler finement sur une plaque ou dans un moule plat et aplanir au maximum avant de faire cuire 45 minutes à 165°C.\n6. Faire refroidir et servir avec des pickles.\n\n## Références\n\n@eaterHowChefAtsushi2023\n@bonappetit14Seats162023\n## Voir aussi\n- Koyo"}, {"id": "Terrine-de-gorge-de-porc", "title": "Terrine de gorge de porc", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "", "body": "Une recette prévue pour passer de la gorge de porc que nous avons en excédent au Koyo.\n## Ingrédients\n\n- 1 kg de Gorge de porc\n- 200 g de Foie de porc\n- 5 cl d'Umeshu\n- 1 Oignon\n- 2 g d'épices (à trouver)\n- Poivre sancho\n- 10 à 18 g de sel\n\n## Recette\n\n- Epluchez votre oignon (150 g environ) ou 2 belles échalotes, hachez.\n- Si vous avez un hachoir puissant, hachez la gorge de porc. Dans le cas contraire, découpez votre gorge de porc en dés, cela prend un peu de temps puis hachez au mini hachoir la gorge, pas plus de 150 g à la fois pour ne pas \"casser\" votre appareil en surchauffant.\n- Coupez grossièrement votre foie de porc. Hachez-le.\n- Mélangez gorge de porc et foie de porc.\n- Ajoutez l'oignon haché ou l'échalote.\n- Versez le calvados, la sariette (ou une autre herbe), poivrez abondamment, on compte environ 5 g de poivre au kilo.\n- Ajoutez le sel. 10 g vous aurez une terrine peu salée. 15-18 g est environ la quantité habituelle.\n- Mélangez bien et laissez reposer au réfrigérateur plusieurs heures. Idéalement la veille pour le lendemain.\n- Pour la cuisson, préchauffez votre four à 150°. Plusieurs manières de cuire votre  pâté. Dans une terrine au bain-marie, la terrine est immergée à moitié dans un plat rempli d'eau. Vous pouvez aussi mettre votre pâté dans des bocaux que vous avez récupéré, vous les refermez et vous les immergez complètement dans l'eau pendant la cuisson, votre pâté sera stérilisé et vous pourrez le garder longtemps. Troisième méthode, vous mettez votre farce dans des ramequins, vous emballez dans du papier aluminium l'ensemble et vous faîtes cuire au bain marie, les ramequins immergés à moitié.\n- Pour le temps de cuisson : une terrine seule avec vos 1.2 g de pâté, comptez 2 heures au four à 150. Pour des formats moyens : 1h30 et pour des plus petits formats, comptez 1 heure de cuisson.\n\n## Références\n\n- [@nurraTerrinesPatesCroute2022]\n- [@VeganBrothNoodles]\n\n## Voir aussi\n- Koyo"}, {"id": "The-Simcake", "title": "The Simcake", "tags": ["recette/dessert/cake"], "cats": ["dessert"], "origine": "France", "body": "Un gâteau favoris de Simon à la crème de marron, fort savoureux. C'est un Cake.\n## Ingrédients\n\n- 100g Chocolat pâtissier\n- 100g de Beurre\n- 500g de crème de marron\n- 3 œufs\n\n## Recette\n\n1. Faire fondre le chocolat noir et le beurre ensemble, puis y ajouter la crème de marron et les 3 oeufs\n2. Mélanger vigoureusement puis cuire à 150°C pendant 20 à 30 minutes."}, {"id": "Tiramisu-du-Koyo", "title": "Tiramisu du Koyo", "tags": ["recette/koyo", "recette/dessert"], "cats": ["dessert", "koyo"], "origine": "Fusion", "body": "Un tiramisu qui prend le parti de sortir des clichés habituels dès lors qu'on souhaite japoniser un dessert. Ici on prend le parti d'insérer d'autres thés et saveurs tout aussi, voir plus, compatible avec le principe du tiramisu originel. Le choix d'un appareil sans oeufs crus sert surtout l'idée d'un dessert stable sur le temps.\n## Ingrédients\n\n- Un Castella dont les proportions sont doublées\n- Crème mascarpone\n\t- 1kg mascarpone\n\t- 1kg crème fouettée\n\t- 500g de sirop de thé hojicha fixé à la gélatine\n\t\t- 500g d'eau\n\t\t- 300g de sucre\n\t\t- 6 feuilles de gélatine\n\t\t- 10g sachet hojicha (soit 20g environ de hojicha)\n- Poudre de kinako torrefiée\n\n## Recette\n\n1. Préparer le sirop de thé en faisant infuser les sachets, puis bien fondre de le sucre. Il faut faire réduire un peu et ajouter les feuilles de gélatine essorées. Réserver un peu de sirop (100g environ)\n2. Mélanger le sirop au mascarpone\n3. Ajouter ce mélange à la crème fouettée\n4. Faire une ou plusieurs couche de castella et imbiber le gâteau de sirop\n5. Déposer l'appareil à tiramisu sur une ou plusieurs couche et finir en saupoudrant de kinako torrefié.\n\n## Références\n\n- Ajouter une référence à Alba et au livre sur les recettes de Ghibli\n\n## Voir aussi\n- Koyo"}, {"id": "Tiramisu-grassois", "title": "Tiramisu grassois", "tags": [], "cats": [], "origine": "Ultra fusion", "body": "Une déclinaison de la recette de Tiramisu du Koyo en modifiant l'ensemble des éléments pour être plus portés sur une version agrume.\n## Ingrédients\n\n- Un demi castella (voir la recette)\n\t- 12g lait \n\t- 22g miel (ou sirop d'érable)\n\t- 50g farine \n\t- 62 sucre \n\t- 3 œufs & 2 jaunes\n- Sirop fondateur\n\t- 25g eau de fleur d'oranger\n\t- 25g eau\n\t- 75g 24324 Cheong Orange Amère\n\t- 25g mugicha\n\t- 1,5 feuille de gélatine\n\t- 50g sucre\n\t- 60g de jus d'orange\n\t- zeste de d'orange\n- 250g crème liquide 30%\n- 250g mascarpone\n- *Facultatif* : Zeste d'un citron de Menton\n\n## Recette\n\n- Préparer le Castella\n- Préparer le sirop\n\t- Faire bouillir ensemble l'eau, le sucre, le cheong, le mugicha, filtrer après ébullition \n\t- Remettre sur le feu puis incorporer les feuilles de gélatine trempée\n\t- Ajouter ensuite l'eau de fleur d'oranger puis laisser reposer à température\n- Incorporer 2/3 du sirop au mascarpone puis ajouter la crème montée en chantilly\n- Ajuster le sucre et incorporer le zeste de citron de menton\n- Procéder au montage et saupoudrer de matcha, d'une poudre de mugicha ou de cacao\n## Voir aussi\n\n- Tiramisu du Koyo"}, {"id": "Tofu", "title": "Tofu", "tags": [], "cats": [], "origine": "Asie", "body": "# Tofu\nLe tofu est une sorte de \"fromage\" de soja. Il s'agit de lait de soja que l'on a fait coaguler et dont on ne garde après pressage que les résidus solides, à l'image d'un fromage par exemple. Selon comment il est préparé, il peut être soyeux ou ferme. On le pratique tel quel, mais d'après Sébastien de Roany (voir @sebastienderoanyInstructionsTianjiuquFuruqu2021|Diverses interventions de Sébastien sur Facebook et par voie de document]]), le tofu est meilleur et plus digeste après Fermentation. Il existe plusieurs moyen de faire fermenter le tofu, mais le Mucor fonctionne fort bien.\n\n## Préparation du tofu\n\n### Ingrédients\n- 300g Graines de soja\n- Nigari\n- 3L Eau\n\n### Méthode\n1. Faire tremper les graines de soja\n2. Mixer avec un d'eau jusqu'à obtenir une consistance crémeuse.\n3. Ajouter le reste d'eau et cuire.\n4. Filtrer pour séparer l'okara du lait. Faire chauffer le lait et enlever du feu avant ébulition.\n5. Faire cailler le lait avec le nigari et filtrer à nouveau dans une étamine, presser doucement et en continu avec un couvercle et des poids pour obtenir un tofu ferme.\n\n## Recettes\n\n```dataview\nLIST FROM Tofu & !#experimentation & !#template & !#ouvrage & #recette \n```\n\n## Experimentation\n```dataview\nLIST FROM Tofu  & #experimentation & !#template\n```\n\n## Référence\n[@veganfreestyleCommentFaireSon2016]"}, {"id": "Tomates-rôties-du-Koyo", "title": "Tomates rôties du Koyo", "tags": ["recette/koyo", "recette/condiment"], "cats": ["condiment", "koyo"], "origine": "Fusion", "body": "# Tomates rôties du Koyo\n\nLes tomates qui accompagnent le Ramen du Koyo. Il s'agit clairement d'un topping inspiré d'Ivan Ramen.\n\n## Ingrédients\n- Tomate de petit calibre idéalement\n- Sucre roux ou blanc\n- Sel\n- Poivre noir\n- Huile d'olive\n\n## Recette\n1. Couper les tomates en deux dans le sens de la largeur.\n2. Les disposer sur un plat allant au four, face plate vers le haut. Arroser d'une pincée de sel, de sucre et d'un tour de moulin à poivre. Finir en arrosant du  filet d'huile d'olive.\n3. Enfourner dans un four chaud pendant au moins 1 heure ou jusqu'à ce que les tomates soient confites voire presque trop cuites.\n4. Disposer dans des plats ou sur des ramens. Le jus du plat est merveilleux et peut servir dans une sauce ou vinaigrette.\n\n## Références\n- @orkinIvanRamenLove2013"}, {"id": "Toscano", "title": "Toscano", "tags": ["recette/koyo", "recette/dessert"], "cats": ["dessert", "koyo"], "origine": "Italie", "body": "Encore un riff d'un dessert de la madré (voir Gâteau toscan de la madre) façon Koyo, en utilisant des zestes de Yuzu infusés dans du beurre et une plus grande quantité de pâte pour obtenir un gâteau plus moelleux. Il appartient, dans sa déclinaison globale à la catégorie des Cake à mon sens.\n## Ingrédients\n\n- 165g Farine T60\n- 165g de Beurre\n- 165g de Sucre blanc\n- 4 oeufs\n- 5 pommes\n- Zestes de yuzu   \n\n## Recette\n\n1. Faire fondre le beurre et infuser doucement les zestes de yuzu dedans et mixer fortement les oeufs avec le sucre jusqu'à obtenir un mélange aérien\n2. Incorporer la farine puis le beurre fondu sans trop mélanger\n3. Enfin ajouter les pommes coupées en gros quartiers\n4. Déposer dans un plat allant au four et ajouter sur le dessus quelques pignons de pin supplémentaires\n5. Cuire à 180°C pendant 30 minutes\n\n## Références\n\n- Gâteau toscan de la madre\n\n## Voir aussi\n- Koyo"}, {"id": "Tsukune-du-Koyo", "title": "Tsukune du Koyo", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "Japon", "body": "Une Yakitori emblématique du Koyo. Simple à réaliser, la méthode de piquage n'est pas si aisée. Une brochette seule compte 45g de farce. Elle est finit à la sauce yakitori.\n\n## Ingrédients\n- 1200g de Hauts de cuisse de poulet\n- 450g de Blancs de poulet\n- 250g de Peaux de poulet (blanchies 10 minutes)\n- 350g d'Oignon ou de ciboule ou de Cébette\n- 250g de Panko ou de Chapelure à défaut\n- 60g Ail\n- 60g Gingembre\n- 24g sel\n- 20g de sucre\n- 5g Poivre\n\n| Ingrédient | Base | Ajusté |\n| ---------- | ---- | ------ |\n| HdC        | 1200 |        |\n| Blanc      | 450  |        |\n| Peaux      | 250  |        |\n| Oignon     | 350  |        |\n| Panko      | 250  |        |\n| Ail        | 60   |        |\n| Gingembre  | 60   |        |\n| Sel        | 24   |        |\n| Sucre      | 20   |        |\n| Poivre     | 5    |        |\n\n## Recette\n1. Passer la viande, les oignons, l'ail et le gingembre une première fois au hachoir.\n2. Mélanger le premier mix avec le panko, le sel et le poivre\n3. Passer une seconde fois le mélange au hachoir.\n4. Il est possible, si on coupe suffisamment fin les différents éléments de ne faire qu'un seul passage\n\n## Voir aussi\n- Gyozas de poulet"}, {"id": "Tuiles-de-sésame", "title": "Tuiles de sésame", "tags": ["recette/dessert"], "cats": ["dessert"], "origine": "Fusion", "body": "## Ingrédients\n30 g de Sucre glace\n5 g Farine T60 (ou farine blanche globalement)\n25 g Graines de sésame\n20 g de Blanc d’œuf (le blanc d'un Oeuf environ)\n15 g Beurre fondu\n## Recette\n1. Mélanger le sucre, la farine et les graines de sésame.\n2. Ajouter au mélange le blanc d'oeuf et le beurre fondu.\n3. Etaler sur une toile de cuisson ou papier sulfurisé au dessus d'une plaque à trous ou à griller pour laisser passer la chaleur et mettre **au four à 180°C pendant 5 minutes et jusqu'à ce que la tuile soit cuite, brunie et croustillante**.\n## Références\n\n[@VeganBrothNoodles]\n\n## Voir aussi\n\n- Crème glacée au café supérieure pour accompagner"}, {"id": "Umepacho", "title": "Umepacho", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "Fusion", "body": "Un gaspacho somme toute assez classique avec un twist orienté sur l'umeboshi. A servir au Koyo avec des Tempura de Nori.\n## Ingrédients\n\nPour environs 1,7l \n- 750 g de Tomate\n- 200 g de Panko\n- 200g de pâte Umeboshi\n- 3 Poivron rouge\n- 1 Concombre\n- 1 Oignon blanc\n- 3 gousse d’Ail\n- 75g d'huile neutre\n- 25g d'Huile de sésame\n- 125g de Vinaigre de riz\n- sel et poivre et poivre\n- QS Usukuchi (aka  Shoyu)\n\n## Recette\n\n1. Blanchir les poivrons et émonder les tomates.\n2. Eplucher les concombres et réunir l'ensemble des ingrédients dans un blender.\n3. Servir bien froid avec de la ciboulette, des tomates cerises confites et d'autre fioritures.\n\n## Références\n\n- [@VeganBrothNoodles]\n\n## Voir aussi\n- Koyo"}, {"id": "Unagi-Sauce", "title": "Unagi Sauce", "tags": [], "cats": [], "origine": "Japon", "body": "Une sauce épaisse, proche de la teriyaki dans l'idée et très intense qui permet de laquer l'Anguille ou le Congre (façon Unagi ou Anago) mais qui se prête aussi bien à d'autres laquage et assaisonnements.\n\n## Ingrédients\n\n- 60g Mirin\n- 60g Shoyu\n- 30g sucre brun ou sucre complet ou rapadura voire Sucre blanc\n\n## Recette\n\n- Porter le tout à ébullition puis laisser mijoter 15 minutes\n\n## Références\n\n- [@namiHomemadeEelSauce2019]\n- [@jeffSauceUnagiPour2019]\n\n## Voir aussi\n\n- Yakitori Tare du Koyo"}, {"id": "Velouté-de-Chou-fleur-Kéfir", "title": "Velouté de Chou fleur Kéfir", "tags": ["recette/koyo", "recette/tapas"], "cats": ["koyo", "tapas"], "origine": "Fusion", "body": "Une entrée simple mais satisfaisante, qui tire le parti de la complémentarité de chacun des éléments.\n## Ingrédients\n\n- 1 chou fleur\n- 25cl crème liquide\n- 25cl kéfir de lait\n- QS Rayu\n- QS Furikake\n- QS Sel\n## Recette\n\n1. Cuire le chou fleur dans la crème liquide jusqu'à ce qu'il soit fondant. Il faut que le chou fleur soit bien immergé donc ajuster la quantité de crème en fonction.\n2. Passer au blender en ajoutant le kéfir de lait. Ajuster à nouveau pour le goût fermenté en fonction du résultat.\n3. Si le velouté est épais ajouter du lait pour délayer, ajuster l'assaisonnement et servir avec un trait de Rayu, un oeuf onsen et du furikake.\n## Voir aussi\n- Koyo"}, {"id": "Vinaigre-à-sushi-du-Koyo", "title": "Vinaigre à sushi du Koyo", "tags": ["recette/condiment", "recette/koyo"], "cats": ["condiment", "koyo"], "origine": "Koyo Japon", "body": "Un vinaigre assaisonné qui sert pour faire le riz à sushi mais aussi pour des sauces et condiments.j\n\n## Ingrédients\n- 500 ml  de vinaigre de riz\n- 200g de Sucre blanc\n- 25g de sel\n- 3g de Dashi en poudre\n\n## Recette\n1. Chauffer légèrement l'ensemble des ingrédients pour faire fondre le sucre puis conserver l'ensemble\n\n## Référence\n- Koyo"}, {"id": "Vinaigrette-Sancho-Miso", "title": "Vinaigrette Sancho Miso", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Koyo", "body": "## Ingrédients\n\n- 100 ml de Vinaigre à sushi Koyo\n- 100ml d'huile neutre\n- 10ml d'Huile de sésame\n- 150g de Miso sancho\n- 50ml de Tamari ou Shoyu usukuchi ou à défaut shoyu classique\n\n## Recette\n1. Mélanger le vinaigre et l'huile puis ajouter le reste des ingrédients\n2. Ajuster en fonction du goût\n\n## Voir aussi\n- Sauce Gyoza Koyo\n- Koyo\n\n## Référence\n[@koyoizakayaBoiteAuxRecettes2022]"}, {"id": "Yakitori-Tare-du-Koyo", "title": "Yakitori Tare du Koyo", "tags": ["recette/koyo", "recette/sauce"], "cats": ["koyo", "sauce"], "origine": "Japon", "body": "L'une des sauces mère du Koyo, elle sert exclusivement aux brochettes yakitori. Comment chasur batch est mélangée avec la précédente fournée m, le goût de viande est assuré. \n\n## Ingrédients\n- 450g saké\n- 375g Mirin\n- 250g Sucre blanc \n- 500g Shoyu\n- 150g Tamari\n- 100g Cébette\n- 100g Gingembre \n\n## Recette\n1. Flamber le mirin et le saké\n2. Ajouter et mijoter le reste des ingrédients a feu doux\n3. Il est possible de faire durer lema cuisson pour obtenir une texture sirupeuse.\n\n## Voir aussi\n- Koyo\n- Yakitori"}, {"id": "Yaourt", "title": "Yaourt", "tags": ["recette/fermentation"], "cats": ["fermentation"], "origine": "", "body": "# Yaourt\nTel que nous le connaissons aujourd'hui, le yaourt est un Lait fermenté solidifié, non-essoré (donc ni passé à l'étamine, ni séparé du liquide). Il a une consistance générale plutôt solide, mais les caractéristiques d'un yaourt peuvent beaucoup varier d'une fournée à une autre. \n\nSelon la loi française, un yaourt peut être considéré comme tel dès lors que l'on constate la présence des bactéries suivantes : \"Lacto-bacillus bulgaricus et Streptococcus thermophilus\". Ceci étant, le yaourt comme acception plus générale rejoint largement le Kéfir de lait notamment.\n\n## Techniques de préparation du yaourt\n\nLe yaourt se prépare en chauffant du lait puis en l'ensemmençant avec une culture de bactéries provenant généralement d'un yaourt pré-existant, puis en l'incubant durant une douzaine d'heures dans un coin chaud.\n\n### Chauffer le lait\nOn chauffe le lait à 82°C doucement afin, d'une part d'éleminer les bactéries indigènes et d'autre part préparer le lait en lui-même, en le concentrant de sorte à disposer d'une texture plus solide après incubation. Si on le chauffe trop vite, les protéines du lait vont être impactées et vont se solidier un peu trop, donnant des amalgames.\n\nIl est possible de ne pas faire chauffer le lait à 82°C mais l'évaporation n'ayant pas eu lieu, le résultat final sera certainement plus liquide.\n\n### Ensemmencement\nOn fait refroidir le lait jusqu'à 46°C et on le mélange avec un peu de yaourt de la fournée précédente (généralement 5% / litre de lait ensemmencé). Si on utilise un yaourt du commerce comme culture de base, on risque de ne pas pouvoir maintenir une longue lignée de fournée. Les bactéries étant elévées en laboratoire, elles sont instables *in vivo* et se dégradent après quelques générations. Si c'est possible de trouver une culture authentique issue d'une vraie longue lignée de fabrication de yaourt, le résultat final sera certainement plus stable et durable. Il y a un véritable lien à faire avec la question posée par les Semences Hybrides. L'optimisation et la stabilisation des résultats a entraîné une déperdition des cultures locales, adaptées à un environnement.\n\n### Incubation\nOn incube le tout idéalement à 40°C pendant 12 heures ou 42°C pendant 10h. Il est possible de faire fermenter moins longtemps encore à 46°C. Ou plus longtemps à moins de 40°C. \n\nEn somme, plus la température est élevée et plus le temps est long, plus le résultat final sera probablement solide et acide.\n\n```ad-hint\ntitle: Conseil de fabrication\n\nPour un résultat solide il faut :\n\n- Chauffer doucement le lait à 82°C\n- Incuber entre 42°C et 46°C pendant 3 à 10h en général (c'est donc mieux de faire le matin) \n\n```\n\n## Références\n[@wikipediaSetier2021]\n[@Decret88120330]\n@katzFermentationsLegumesFruits2018 -> pages 186 à 192"}, {"id": "Œuf-de-printemps-de-kamozawa", "title": "Œuf de printemps de kamozawa", "tags": ["recette/sousvide"], "cats": ["sousvide"], "origine": "", "body": "Une variation express de l'oeuf parfait qui est fort savoureuse.\n## Ingrédients\n\n- Oeuf frais\n## Recette\n\n- Cuire les oeufs avec un thermoplongeur pendant **13min à 75°C**\n- Réchauffer à 55°C au service\n## Références\n\n@vegetalgraphikOEufOnsen64\n## Voir aussi\n\n- Oeuf Onsen"}];
const CATEGORIES = [{"id": "koyo", "label": "Koyo", "count": 60, "color": "#4f46e5"}, {"id": "plat", "label": "Plats", "count": 36, "color": "#2563eb"}, {"id": "dessert", "label": "Desserts", "count": 30, "color": "#db2777"}, {"id": "sauce", "label": "Sauces", "count": 28, "color": "#dc2626"}, {"id": "fermentation", "label": "Fermentation", "count": 26, "color": "#16a34a"}, {"id": "condiment", "label": "Condiments", "count": 17, "color": "#d97706"}, {"id": "vegan", "label": "Végétal", "count": 16, "color": "#65a30d"}, {"id": "tapas", "label": "Tapas", "count": 14, "color": "#9333ea"}, {"id": "bizarre", "label": "Bizarre", "count": 7, "color": "#7c3aed"}, {"id": "sousvide", "label": "Sous-vide", "count": 4, "color": "#0369a1"}, {"id": "boisson", "label": "Boissons", "count": 4, "color": "#0891b2"}, {"id": "concept", "label": "Concept", "count": 3, "color": "#6b7280"}, {"id": "pate", "label": "Pate", "count": 3, "color": "#6b7280"}, {"id": "pain", "label": "Pain", "count": 2, "color": "#6b7280"}, {"id": "végétarien", "label": "Végétarien", "count": 2, "color": "#6b7280"}, {"id": "[]", "label": "[]", "count": 2, "color": "#6b7280"}];
const CAT_COLORS = {"fermentation": "#16a34a", "dessert": "#db2777", "sauce": "#dc2626", "koyo": "#4f46e5", "plat": "#2563eb", "condiment": "#d97706", "boisson": "#0891b2", "vegan": "#65a30d", "tapas": "#9333ea", "bizarre": "#7c3aed", "sousvide": "#0369a1", "amino": "#047857"};

let state = { cat: null, query: '', recipe: null };

const $sidebar = document.getElementById('sidebar');
const $grid    = document.getElementById('grid');
const $meta    = document.getElementById('meta');
const $detail  = document.getElementById('detail');
const $search  = document.getElementById('search');

// ── Sidebar ────────────────────────────────────────────────────────────────

function buildSidebar() {
  let h = '<div class="side-section"><div class="side-label">Catégories</div>';
  const allActive = state.cat === null ? 'active' : '';
  h += `<button class="cat-btn ${allActive}" data-cat="">
    <span class="cat-dot" style="background:#52525B"></span>
    Toutes <span class="cat-count">${RECIPES.length}</span>
  </button>`;
  for (const c of CATEGORIES) {
    const active = state.cat === c.id ? 'active' : '';
    h += `<button class="cat-btn ${active}" data-cat="${c.id}">
      <span class="cat-dot" style="background:${c.color}"></span>
      ${c.label} <span class="cat-count">${c.count}</span>
    </button>`;
  }
  h += '</div>';
  $sidebar.innerHTML = h;
  $sidebar.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat    = btn.dataset.cat || null;
      state.recipe = null;
      render();
    });
  });
}

// ── Filter ─────────────────────────────────────────────────────────────────

function filtered() {
  let r = RECIPES;
  if (state.cat)   r = r.filter(x => x.cats.includes(state.cat));
  if (state.query) {
    const q = state.query.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    r = r.filter(x => {
      const t = (x.title + ' ' + x.body).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
      return t.includes(q);
    });
  }
  return r;
}

// ── Tag chip ───────────────────────────────────────────────────────────────

function chip(cat) {
  const color = CAT_COLORS[cat] || '#6b7280';
  const meta  = CATEGORIES.find(c => c.id === cat);
  const label = meta ? meta.label : cat;
  return `<span class="tag" style="background:${color}">${label}</span>`;
}

// ── Grid ───────────────────────────────────────────────────────────────────

function renderGrid() {
  const list = filtered();
  $meta.textContent = `${list.length} recette${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    $grid.innerHTML = `<div class="empty">
      <div style="font-size:40px">🍽</div>
      <div class="empty-title">Aucune recette trouvée</div>
      <div>Essayez d'autres mots ou d'autres filtres.</div>
    </div>`;
    return;
  }

  $grid.innerHTML = list.map(r => {
    const origine = r.origine ? `<div class="card-origine">${r.origine}</div>` : '';
    const tags    = r.cats.map(chip).join('');
    return `<div class="card" data-id="${r.id}">
      <div class="card-title">${r.title}</div>
      ${origine}
      <div class="tags">${tags}</div>
    </div>`;
  }).join('');

  $grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const r = RECIPES.find(x => x.id === card.dataset.id);
      if (r) openDetail(r);
    });
  });
}

// ── Detail ─────────────────────────────────────────────────────────────────

function openDetail(r) {
  state.recipe = r;
  const origine = r.origine ? `<div class="detail-origine">${r.origine}</div>` : '';
  const tags    = r.cats.map(chip).join('');
  const body    = marked.parse(r.body || '_Aucun contenu._');
  $detail.innerHTML = `<div class="detail-inner">
    <button class="detail-back" id="back">← Retour</button>
    <h1 class="detail-title">${r.title}</h1>
    ${origine}
    <div class="detail-tags">${tags}</div>
    <div class="body">${body}</div>
  </div>`;
  $detail.classList.add('open');
  $detail.scrollTop = 0;
  document.getElementById('back').addEventListener('click', closeDetail);
}

function closeDetail() {
  state.recipe = null;
  $detail.classList.remove('open');
}

// ── Render ─────────────────────────────────────────────────────────────────

function render() {
  buildSidebar();
  renderGrid();
}

// ── Events ─────────────────────────────────────────────────────────────────

$search.addEventListener('input', () => {
  state.query  = $search.value.trim();
  state.recipe = null;
  closeDetail();
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
